body:
  text: 卷五土運年甲寅少陽司天中運太宮厥陰在泉土齊木化左尺不應初氣大寒交主厥陰客少陰二氣春分交主少陰客太陰三氣小滿交主少陽客少陽四氣大暑交主太陰客陽明障五氣秋分交主陽明客太陽終氣小雪交主太陽客厥陰初運太寒交主太角客太宮二運春分後十三日交主少徵客少商三運芒種後十日交主太宮客太羽四運處暑後七日交主少商客少角終運立冬後四日交主太羽客太徵李子三歲痰喘痙厥久治不效勢已垂危脈伏案觀其神色系風邪鬱滯牢固邪熾正虛之候也紫蘇二錢廣木香五分澤瀉一錢乾薑一錢鬱金一錢淡豆豉一錢薑汁三匙釋此甲寅年穀雨前五日方也土齊木化之年又逢水歸土庫之月加以太陰濕土主事太陰之土不順承而太陽之水欠健運風邪無從得解此邪之所以熾正之所以虛也幸有天運之少商猶可借其金氣以泄土而生水故用為此方之關鍵其用胃藥者應辰月也後三日換方案雪山朱子曰內證稍平但濕熱猶未清也陳佛手五分乾葛一錢澤瀉一錢白茯苓二錢大麥冬一錢神麯一錢砂仁五分生薑皮四分藕節二錢釋二方皆有兼理陽明之意蓋陽明屬戊土乃月建之主氣況與少商之金相配偶而又與太陰之土為表裡故亦為此證之樞紐藕生水土之中性能和心氣而散血用其節以行血分之結滯以脾胃俱兼統血氣也又火為土母藕節神麯皆有火能生土之意火以燥之金以泄之而濕熱有不平者乎程氏卅四妊娠便血脈浮緩案當用助胃攝元清肺壯水之劑通草四兩北五味一兩白芷一兩大麥冬二兩金櫻子一兩神麯二兩杜仲二兩大砂仁五錢姜皮一錢醋和薑汁泛丸每服三錢釋此甲寅年芒種後四日方也土齊木化之年木氣必弱況少陽司天又逢月建之已火火勝則泄木之氣太甚以弱木而生強火火炎木燥庚辛之金均受其爍丸方借天運之少商太羽以為金水相涵之本蓋已火者太陽之丙火也太陽合肺氣而行周身之皮毛所謂丙辛化水者是也故方用通草為君太陽之標熱合於心火故兼用神麯為佐其餘則固攝金水之味為多既壯水以涵金復清金以固水皆所以防相火而攝胃經之血也尤氏卅五妊娠患熱病醫以白虎等湯治之忽然發厥脈數濡案蓮峰李子曰鬱熱上壅包絡而肺經受鑠已甚也貝母二錢香薷一錢香附米錢半廣木香一錢木通二錢燈心一錢夏枯草二錢車前子錢半麥冬錢半竹葉十片釋此甲寅年大暑日方也月建未土天運太羽客氣新換陽明病起於少陽主令之時相火鑠金已甚故以保肺清金為主陽明與月建之未土相為表裡正可借為生金之用至於天運之太羽則前醫之白虎諸方已足滋之無庸再復矣後三日換方淨銀花四錢薤白三錢車前子二錢黃柏二錢甘草節一錢半夏一錢遠志肉一錢桑皮二錢白荷花一支釋方仍前意但陽明之味較重於太陰者陽明之氣交足也荷花根出濕土華於未月已足為月建之引而更有巧焉者得水中之陽精合天運之太羽而色白屬金卻又能保肺而清火不但如遠志黃柏而已後四日換方青皮一錢大麥冬五錢薤白三錢鱉甲三錢黃芩二錢菖蒲根二錢知母二錢荷莖五錢犀角磨水三匙釋令雖久屬陽明而病究起於少陽故仍參用少陽之味以補前醫所未及至於用菖蒲荷莖兼顧月建之濕土及天運之壬水尤為細緻無遺又換方案此厥陰餘熱也清之可矣醋炒白芍二錢醋炒細生地二錢白茯苓二錢北五味一錢炒山梔二錢知母二錢青皮八分竹根一錢燈心三十寸釋此白露前三日方也月建申金天運少角客氣仍屬陽明主事前令之少陽移熱於厥陰已久今因天運之少角感之而動也然究系衰木余焰亦不必重味剋制只宜用清火之味引以甘酸以和之緩之而已矣吳姓廿六風邪外感日久醫汗之不解反致胸膈不寬腹中便硬遍身筋骨拘攣醫又用承氣法下之不效脈數濡案濕熱固結三焦以致營氣格絕而枯悶也難矣哉大豆黃卷四錢竹茹三錢通草五錢澤瀉二錢淨銀花三錢瓜蔞仁二錢車前三錢枳實一錢案此甲寅年白露前六日方也月建申金天運初交少角客氣陽明主事此時客氣與月建相時治法當以陽明為主固已而少角為乙木實管周身之筋脈又前運之太羽失於滋養則水氣不能滋木不得不急用補干之法使太羽之水氣流通無滯而後乙木可條達庚金可傳布也黑豆本屬水又經水浸而生芽勾萌甲坼得水木相生之意仲景薯蕷丸用之治虛勞風氣理可推矣後三日換方案木氣少舒金氣尚多壅滯藿香三錢白芥子二錢豬苓二錢川鬱金一錢葛根二錢阿魏二錢青皮一錢枳實二錢半夏二錢釋純以開散陽明為主只青皮兼有舒木之意但月建將近酉金亦須兼理急用芥子以清辛金之痰治法實為周密後四日換方赤茯苓二錢白茯苓二錢木通四錢木香一錢瓜蔞皮二錢宣木瓜二錢神麯二錢阿魏二錢黑芝麻一錢淨銀花一錢釋此白露後一日方也酉金為濕金故白露亦稱濕令況證本由於濕熱自當以利濕為主而降痰導滯清理陽明又為此時切要但木通木瓜兼理少角耳木通藤蔓中空形本乙木也徐霽山記後三日換方案邪氣盤踞陰分過虛急脈緩收可也鮮首烏五錢赤苓三錢柏子仁三錢枳實二錢半藿香二錢楂肉二錢稻根二兩煎湯代水加薑汁三匙釋重用首烏稻根滋金水二臟因辛當月建癸能化戊也而柏仁楂肉又有火土相生之意蓋久病枯悶之證不能專用克伐故耳後四日換方案氣漸平復但痰熱未清耳玄明粉一錢牛膝一錢白蘇子一錢木香一錢萊菔子二錢炒厚朴一錢生山梔二錢紅花六分赤石脂錢半釋用金水之味以盪滌中土之痰熱又恐清降太過致成虛怯復用重鎮收攝之味以監之佐以紅花兼解血分之鬱滯陽明固兼統血氣而少角實為藏血之臟此用紅花石脂之義也曹氏廿五從五月起嗽痰嘔酸飲食減少瀉利血水脈浮弦案此肝木侮脾又兼膽經火鬱也代赭石一錢熊膽一錢桑白皮二錢萸肉二錢海螵蛸三錢鬱金三錢樗根皮二錢香附一錢杜仲二錢焦白朮二錢蘆根二錢紋銀二兩釋此甲寅年秋分前一日方也月建酉金天運少角客氣將交太陽土齊木化之年土勝則剋水亦甚水弱之人遇火令而致病遷延日久少陽之火未得清理又加少角之風木感之是以金土均受其克方用鎮靜肝膽益金扶土人所易知而太陽之水實為制火之源重用海螵佐以杜仲用法之妙不可方物後四日換方前方去樗皮海螵蘆根加木瓜一錢麥冬三錢金石斛二錢北五味一錢南星八分鮮生地錢半釋雖曰膽經有鬱火而膽經非真有餘也以水弱不足以相生相養耳故前方有萸肉之酸以助木火而固其氣今復加五味以固水而斂木也客氣雖換太陽而前令之陽明尚未清理故前用蘆根以清大腸此用麥冬南星以清胃腑至於壯水以滋太陽舒木以理少角猶其易曉者耳後五日換方代赭石二錢熊膽一錢天南星一錢陳皮二錢山萸肉二錢杜仲二錢廣木香一錢木瓜二錢山茨菇二錢蛤粉二錢牡丹皮二錢黃柏二錢醋炒北五味一錢白芍二錢醋炒服七劑釋清酉金壯陽水斂木氣大致與前方相似又換方案外象雖平而腹痛下血未已仍因土虛木浮之故白蘇子三錢木瓜三錢赤石脂錢半半夏二錢自然銅二錢焦術二錢嫩黃耆二錢杜仲二錢桑白皮三錢服十劑釋此霜降前五日方也天運少角客氣太陽主事太陽之氣上合辛金金氣不降水無從生此重用蘇子桑皮杜仲之意也然木氣猶浮非石以壓之金以鎮之雖用木瓜不效若徒視為散血止痢之用猶淺之乎論醫者矣又換方案木氣漸和剋制之中當寓生扶之意不法另起爐灶也香附米二錢土炒廣木香一錢土炒建神麯二錢桑螵蛸二錢海螵蛸二錢自然銅二錢爐甘石一錢天南星一錢桑白皮二錢赤茯苓二錢白石英一錢絲瓜瓤二錢炙存性服十劑釋此霜降後六日方也用法同前甘石從戊土以燥濕而平木石英降金氣以生壬水桑螵固壬水以生乙木海螵從太陽以和少角一則以水弱之年當乘太陽以滋水臟一則以木衰之月當用水氣以養木根也大凡治病至後半場即宜瞻前顧後使元氣易復為要按本年土齊木化應見土氣滯重等證然中元甲子木為統運甲寅流年八白主事於統運為死氣故反覺木強土弱即非土運太過諸歲比吾師前後各證俱無峻克中土之味是真能審元運而立方者沾沾於五運太過不及之說猶為不善用經者也魯姓四九自夏季患三日瘧醫用表散寒涼攻下諸方食減體羸脈洪大而澀案營衛不流氣滯中下二焦膈膜不透也前用峻劑致傷中土今且緩為清理不能驟用攻擊矣木香一錢車前子錢半木通三錢桑寄生二錢楂肉二錢大麥冬三錢蒼朮二錢生地炭一錢砂仁一錢炒山梔一錢紅曲錢半陳倉米一撮竹瀝三匙鮮蘆根錢半釋此甲寅年霜降前一日方也天運少角客氣太陽主事病恰起於陽明主令之時今月建又臨戌土故以陽明為主治之經而少角之木與太陽之水不能不兼理也方用木通為君戊土乙木壬水固已包舉無遺更加臣佐之味或推或挽以開陽明之郁則濕痰不攻自破矣何必爭奇於一戰哉後五日換方案雲濤司馬子曰金氣不清不能生水而水中之真陽不旺也桑白皮二錢石菖蒲一錢木香一錢陳皮一錢肉蓯蓉一錢沙蒺藜錢半茯苓二錢藕節錢半白蔻仁一錢薑汁四匙和服釋蓯蓉蒺藜水中生陽太陽之本體也太陽之用外合辛金更佐以茯苓蔻仁而太陽之體用悉備太陽之標熱合於心經故復用石菖蒲藕節以為使然必取桑皮為君者何也桑為箕星之精木情而金性色兼黃白行於陽明胃腑又能燥濕行水乃戊土乙木壬水兼管之味也蓋太陽之日光不透總由陽明主氣正值土旺用事耳後五日換方案霽山徐子曰濕痰壅滯宜清降之陳皮一錢赤茯苓二錢桑皮二錢威靈仙一錢黃柏三錢大砂仁二錢薤白二錢澤蘭葉一錢天冬二錢鱉甲二錢木通一錢降香末一錢釋營衛不流本因痰涎阻滯而痰涎實由濕熱而生土齊木化之年陽明主勝之疾太陽寒水一時難起熱何由清而痰何由祛乎在地為土在天為濕土剋水濕勝寒是不可因水弱之年而不重去濕也蓋正水宜滋邪水宜卻去邪即所以扶正原自並行不悖耳前三方服後飲食漸進精神漸起但瘧猶未已案胃火尚未全清蓋陰分久虧而土氣不能施養攝之功也生熟首烏各二錢抱木茯神二錢天花粉二錢醋炙鱉甲二錢土炒紅曲錢半連心麥冬二錢乾葛一錢白扁豆二錢橘紅一錢半夏一錢釋此立冬後五日方也月建亥水天運少徵客氣仍屬太陽此時主客氣運俱在水火二臟然陽明卻為致病之由胃火未清則水火俱不能歸其部故欲乘此陽水陽火之令以強腎而平胃以腎為胃之關也後五日換方案郁痰未清陰分久傷須兼顧之赤白茯苓各二錢生熟首烏各二錢黃連六分醋炙鱉甲二錢生山梔二錢西洋佛蘭參一錢橘紅二錢半夏二錢常山二錢當歸身二錢水菖蒲根三寸釋運氣如前故仍以扶正滋陰為主而以清火利濕卻痰為用但客氣將近厥陰在泉之令故早用黃連鱉甲以迎而治之兵法所謂半渡而擊之者也後五日換方黃連一錢乾薑八分蔓菁子錢半塊茯苓三錢杏仁一錢半夏二錢茶石斛二錢西黨參二錢半楂肉一錢麥冬三錢熟首烏二錢鱉甲三錢醋煅釋此小雪日方也厥陰之令新交仍用黃連鱉甲宜矣復用乾薑楂肉何也以水木之令久行今地氣又交厥陰誠恐土氣受傷致生他變故借太徵之火氣以為釜底之薪況利濕行痰為治已久賊寇既久急需安撫此間不容髮之會也以上三方俱不離陽明之味者以太徵屬戊實胃中之陽火也殷月峰記己未太陰司天中運少官太陽在泉木兼上化左寸不應太乙天符初氣太寒交主厥陰客厥陰二氣春分交主少陰客少陰三氣小滿交主少陽客太陰四氣大暑交主太陰客少陽五氣秋分交主陽明客陽明終氣小雪交主太陽客太陽初運太寒交主少角客少宮二運春分後十三日交主太徵客太商三運芒種後十日交主少宮客少羽四運處暑後七日交主太商客太角終運立冬後四日交主少羽客少徵于姓十六咳嗽吐血勞熱氣急多汗脈洪實案心包絡之火下起於太陽而上煽於陽明當以治絡為主亦須旁及二經浮小麥五錢蘇梗節五錢黃芩三錢麥冬錢半地骨皮二錢女貞子二錢茯神二錢香附錢半遠志肉二錢淨棗仁三錢木香二錢青皮一錢紅花炭一錢甘草一錢釋此己未年清明前三日方也月建卯木天運太商客氣屬少陰君火卯木本屬厥陰因君火主令故移熱於手厥陰又少陰之火合於太陽之標熱而天運之太商又屬陽明之燥土燥火熱三者合併煽於包絡之分此火之所以盛也其用蘇梗木香者何也太乙天符之歲又逢火令土氣滯重已極若不早為平治恐氣至司天之候壅極而潰不可救藥矣前方服後氣平汗止血亦漸少但虛熱未清案此心火證也心為清虛之府宜用清虛之味淨棗仁四錢炒研澤蘭葉二錢赤芍錢半紅花一錢桑寄生錢半陳佛手六分青蒿二錢赤豆二錢紫蘇葉二錢牡丹皮二錢當歸三錢防風二錢綠豆粉四錢側柏葉錢半竹葉心錢半飛面二錢服八劑釋此穀雨前二日方也運氣如前但月建改屬辰土厥陰卯木退令故專以少陰為主蓋包絡附於丁而非其正位也用桑寄生綠豆粉者兼平太商也用青蒿竹葉以少陽配少陰也至用澤蘭佛手防風亦預防太乙天符之意爾冬季復發案腎水不足以制心火故當旺之時而反弱反客為主之象理當治少陰而兼舒太陰之滯柿蒂霜三錢黑芝麻三錢血竭八分木香一錢黑豆皮二錢冬青子三錢神麯二錢白芍二錢醋焙側柏葉一錢霜桑葉二錢紫蘇錢半酒焙歸尾二錢紫花地丁一錢醋炙龜板二錢服六劑釋此大雪後六日方也太乙天符之歲土氣反弱為強況兼少徵之運燥上而爟水故雖值太陽在泉主事而水氣終不能敵也此時雖用滋水制火之味其如土氣壅滯而水氣不能上行何計惟有用木味以化土用金味以泄土溝澮既成水道庶可流通耳婁氏卅乳疾醫治不效脈浮洪有力案此疾初起之時只解毒發汗足矣今定須用舒肝發郁之劑庶不致內潰耳銀花四錢甘菊二錢人中黃三錢天花粉二錢沒藥二錢乳香二錢鹿角尖一錢煅焦羚角尖錢半醋炒角針一錢黃柏一錢大麥冬錢半大貝母三錢麥芽三錢川芎二錢獨活錢半陳酒半杯為引服三劑後若有微汗銖兩可以少減釋此己未年清明前三日方也月建卯木天運太商客氣少陰主事方用卯木及太商之味宜矣其不用少陰而反用太陽者何也或謂此證本屬表邪且地步亦在陽分或謂太陽之標熱合於少陰治太陽而少陰自在其中愚意是固然矣而更有進焉者己未天符之歲土強水弱計都蔽塞太陽之光故疏通水道為己未年治病通例不以節氣拘也又換方案前只肝經之郁今則宜兼胃經矣仍用疏散法可也紫蘇梗四錢皮硝三錢紅花炭二錢蘇木四錢粉丹皮二錢連翹二錢大貝母四錢橘核三錢炒杵紫厚朴三錢米泔水浸炒蓮房四錢酒焙人中黃四錢服三劑後加青皮二錢青木香錢半朴硝一錢再服三劑釋此清明後十日方也天運地氣如前但月建改屬辰土與天運之少商相比故方內用胃藥較重亦以乳房為陽明之分野也然君主之味仍在太陽益見土運貴人之歲當以疏通太陽配合太陰為要至於客氣少陰前因重在散表故未理及今表邪稍解自宜急用丹皮連翹以平丁火也陳氏廿七血崩腰疼虛熱忡怔不眠神疲食少服養榮湯及歸脾湯十餘劑不效脈虛浮而芤案脾氣為生化之主布胃經而行遍身之血脈者也因火炎故脾燥其實亦由水不能制火之故蓋衝任之根蒂不攝也當用丸調之白茯苓六兩用黃柏煎汁浸三日夜取出曬乾研末五花龍骨四兩阿膠三兩蠣粉炒成珠白芍三兩黃芩三兩枳殼二兩種白朮三兩土炒益母膏四兩神麯二兩卷柏二兩白歸身四兩酒炒桑寄生三兩李根白皮三兩炙甘草四兩用豬腰子二三對煎汁濾過和蜜煉丸每服五錢淡鹽湯下釋此己未年立夏前四日方也月建將交巳火天運太商客氣少陰而丸料服時較久自當以司天為主況土運天符之歲土滯水衰人同此理而此證因水不制火是以衝任不固以致血崩血崩之後水氣愈弱火氣愈浮並土氣之根亦不固矣方用黃柏制茯苓以滋太商之燥火佐以固水之味以安將來之巳火至土氣雖弱究系天符所在易於起復故用甘溫以補之仍用苦泄以疏之並用甲木以化己土使得安其順承之性乃不至有意外之虞至於少陰之火方內壯水之味原可制伏而心氣不足之人又當培養故重用歸身龍骨第使上下相交水火相濟不致妄行飛越而已鄒姓卅三久患房勞咳嗽陰虛腰脊疼痛氣急多汗脈浮洪有力案陽明少陰二火相爍故肺俞不清也大麥冬六錢連心連翹心一錢桔梗二錢苡仁三錢竹葉心錢半沙苑蒺藜二錢黑豆皮三錢黑芝麻二錢去油女貞子三錢苦楝子一錢胡桃肉錢半浮小麥一撮釋此己未清明後十日方也客氣少陰主事月建與天運俱在陽明陽明者二火合併之區也又有少陰之君火同惡相濟此肺金之所以受灼也方用壯水之味以制火而涵金人所易曉惟用少陽之味以配少陰而和其氣兼寓用甲化己之意以防太乙貴人之禍則有神妙不測之機在焉讀者詳之又換方案當丁火主令之時而乙木不足以生之由壬水不能生乙木也壬水泛故庚金虧庚金虧則愈不能生壬水而壬水反欺之其理如環也學此者最宜留心於子母顛倒主客凌駕之處知母四錢土炒丹參三錢茺蔚子三錢菟絲子二錢麥冬五錢土拌熏黑料豆六錢炒茯神四錢白芍二錢金石斛三錢炙草二錢扁豆二錢半土炒女貞子四錢燈心三十寸一劑分早晚服服八劑釋此小暑前五日方也月建午火天運少羽客氣正當太陰之令丁火為土母壬水為土妻而庚又為土子皆貴人一家眷屬也調和貴人最難既不敢克又不可補惟有略用穀類炒香以悅之兼養其眷屬以安之庶幾不冒犯貴人而水火可潛歸其度耳然少羽屬癸水實貴人之所惡也故用戊土以化之使歸併於丁火為生土之用則不患其凌駕矣金生水者也乃水上泛而金反沉此之謂子母顛倒火土為此證之病而反居主位水為此證之藥而反居客位居主位者不宜直折居客位者不便援引此之謂主客凌駕此時欲求調和於主客之間者舍庚金無從也又換方案肺火正盛之時腎火亦隨之而起心火不下交肝火不上養當仍用前方加麥冬如前制共六錢制首烏三錢土炒白及二錢酒蒸三次丹皮一錢金狗脊三錢白扁豆如前炒共五錢枸杞子三錢燈心用五分再服八劑釋此小暑後五日方也月建換交未土併入太陰貴人為一氣太陰固應濕土而手太陰濕金之氣亦感之而起故兼理之其法不外導金以生水而已又換方案雲濤司馬子曰先生嘗與馥等論此證矣如孤軍將潰四面楚歌計惟有靜以鎮之或可轉客為主今幸中央一軍尚未騷動其西北兩軍譁囂少戢亦此六十日內安撫之力耳未足恃也愚於先生之大法不敢移易今准而用之湯批此證五臟皆虛惟土髒得太乙天符之助故中宮稍覺安靜耳貝母二錢酒焙制首烏四錢龜板四錢用醋洗薰紅花一錢薤白二錢金石斛錢半黑山梔錢半茯神三錢芡實四錢女貞子三錢枯荷蒂四個白朮二錢土炒桔梗二錢黑料豆四錢鹽水洗炒絲瓜花蒂二錢燈心三分旱蓮草根一錢釋此大暑前五日方也論時當以火土二臟為主治而論證則以金水二臟為切要今云西北兩軍少戢則金水稍有根基矣借濕土之氣以生金而壯水亦自然之理也後五日換方案宜去浮蕩之火而存真實之火亦大法也小子識之胡桃肉搗拌益智仁同炒各四錢炙甘草三錢枸杞子三錢土炒女貞子三錢黃芩二錢茯苓二錢冬葵子二錢炒杵益母草二錢酒炒苡仁錢半鉤藤三錢蜜炙黑豆皮二錢覆盆子一錢糯米汁炒黃柏二錢鹽水焙雞內金四個四為金數也自記服六劑釋客氣換交少陽若在他手第見其形證脈象而不能參透氣運之理則必純用清涼以戕其生火者皆必由丁火以發其機況酉金屬肺又為心舍故方內多用滋降心火之味為主而以平木火清燥火之味為用大凡肺腎虛燥之證最難調治況此證實由房勞過度而起腎水乾枯虛陽上越非我師之識力過人其能閱半載而起沉疴乎至用方之理法旁見側出圓通周密有不能刻舟求劍者讀者合前後而熟玩之苟有會心軒岐經旨庶不絕於人間耳朱姓卅四腹脹氣喘發熱咽痛脈浮緊案此濕金之浮火因濕土之氣蒸之而起也白芷一錢防風一錢半夏曲二錢山豆根一錢紅曲二錢土炒神麯二錢青蒿珠錢半白茯苓一錢鬱金錢半枳實錢半炙甘草一錢浮小麥一錢薤白錢半釋此己未年寒露前四日方也濕土天符之歲本應上半年司天之氣今因酉金月建應手太陰故謂之濕金之令天運更逢太角甲木相火上蒸客氣之陽明亦因而生火甲木與己土為夫婦陽明又與脾土相表裡此濕土之氣所以起也濕土上蒸而肺金壅滯此脹與喘之所由來也方用手足陽明之藥兼清手足太陰之氣而復以半夏青蒿疏理太角有不應手立愈者乎陸姓四二從秋季起腰疼筋痛胸膈不寬醫誤用寒峻藥致中氣下陷津液枯竭脈細如絲奄奄待斃殷月峰用補中益氣法倍當歸加杜仲柏子仁首烏五味子十餘劑脈氣稍起飲食少進但腰疼筋痛日久不除案土衰金鬱之疾而此時莫要於補陽明之土何也胃與大腸相吐納而亦與肺金相貫注也況陽土順則陰土順陰金亦順矣湯批天符歲會已屬強弩之末盛於上者必虛於下故下平歲間有土衰之疾學者宜潛玩焉白扁豆四兩土炒苡仁三兩炒雞內金一兩炒香蘇梗兩半肉蓯蓉兩半蒼朮二兩廣木香兩半麥冬二兩炒麻仁二兩共為細末沸水沖服釋此己未年大雪後六日方也月建子水天運少徵客氣太陽主事而病卻起於陽明主令之時病在陽明日久不瘥以致胃氣虧弱不能輸轉而旁及於金土二臟故此方惟以助運陽明為主其於水火二臟從略者非惟前方屢用當歸杜仲首烏柏仁五味亦以防運氣之過盛或致鑠金而濘土也金運年乙卯陽明司天中運少商少陰在泉火兼金化兩寸不應天符初氣大寒交主厥陰客太陰二氣春分交主少陰客少陽三氣小滿交主少陽客陽明四氣大暑交主太陰客太陽五氣秋分交主陽明客厥陰終氣小雪交主太陽客少陰初運大寒交主太角客少商二運春分後十三日交主少徵客太羽三運芒種後十日交主太宮客少角四運處暑後七日交主少商客太徵終運立冬後四日交主太羽客少宮葛妻廿六頭暈脅痛飲食減少月候不調脈弦細案木強金弱當以扶金為要澤瀉二錢冬瓜子二錢牡丹皮一錢紅花一錢杜仲一錢當歸身一錢葛根一錢薏苡仁二錢萱花一錢馬齒莧錢半服十劑釋此乙卯年雨水前五日方也月建寅木天運少商乙年客氣逆行三度湯批乙庚內辛之歲天氣逆行一度注見圖解初氣當屬陽明火兼金化之年火氣勝而金氣弱不宜扶益寅木致助相火而奪君權也少商屬辛金陽明屬庚金但云扶金而庚辛俱在其中矣或問此方多用陽明及用苦溫以助心吾知之矣其右寸正應少商歲在北政本當不應今見弦細肺受鑠也何未見養肺之味乎曰澤瀉色白味甘易云兌為澤兌者陰金也經云能行水上言能行在下之水使之上交於肺而復瀉之使下也又云益氣面生光非金水相生之義乎與冬瓜子同用以金水制木火也非少商而何又換方案此時卻以調陰為要白芍雲苓各二錢俱用青荷葉包蒸黃芩二錢木香五分貝母一錢丹皮一錢醋炒益智仁一錢金櫻子錢半當歸身一錢酒炒女貞子錢半黃連水炒服十二劑釋此夏至後十日方也天運少角客氣逆行屬太陰主事火兼金化之年月建又逢午火火盛土焦法莫善於導火以生土至於平少角以殺火勢固金氣以防火焰其法尤密嚴婦廿七休息血痢日久不愈脈寸關數濡案甲屬陽而乙屬陰下宜固而上宜清茯苓皮三兩土炒萸肉一兩洋肉果五錢麵煨黃芩二兩秦皮二兩白蒺藜一兩當歸尾二兩酒炒粟殼一兩天花粉一兩地榆二兩木香八錢青蒿珠一兩血餘炭五錢膽星五錢共為細末滾水沖服釋此乙卯年春分後六日方也月建卯木客氣少陽主事火兼金化之年木火乘時之令用花粉蒺藜以助金色是已其不壯水以制火而反用茯苓皮以泄之者恐雷龍之火得水而愈熾也復用肉果收相火於釜底而導以生土火既生土則不復剋金相安其位則權歸於君矣吳姓三十咳嗽舊疾舉發脈虛數注兩寸不沉火鑠金也案蓮峰李子曰固屬陰虛之疾然此時卻以清降為宜麥冬三錢木通二錢馬兜鈴錢半北沙參一錢天冬錢半鬱金四錢山萸肉二錢降香末二錢黃柏一錢服五劑後加桑皮二錢黑芝麻二錢紅花八分再服四劑釋此乙卯年小滿後九日方也月建巳火天運太羽客氣逆行太陰主事巳火者太陽丙火也太羽者太陽寒水也合於太陰之濕金丙辛所以化也然而濕土究不容略故用降香以舒之用萸肉以配之甲己合而土化成矣戈姓廿九腰痛頭痛惡寒發熱胸膈不寬脈浮緊兩寸不應注歲氣也案此時令之氣感於皮毛也淡豆豉三錢川鬱金錢半防風一錢羌活一錢獨活一錢澤瀉二錢金銀花錢半建神麯三錢蒼朮一錢枳殼一錢釋此乙卯年小暑後三日方也月建未土天運少角客氣逆行太陰主事方用太陽以配太陰因邪氣初感從皮毛而入也用防風而益以二活風能勝濕香能舒脾也且少角屬風木借木氣以疏土卻合形證之宜非若世醫不問運氣不講配合而概用之者也後二日換方案靈山王子曰天氣鬱蒸土氣不舒感於濕熱者多矣用前方去蒼朮獨活加赤苓一錢黃柏一錢再服二劑釋此初起之證不甚犯手似與集中不類載此以備一格欲人知淺近之中卻有深意也羅姓三十發熱頭疼飽悶不食醫治十餘日不退脈澀濡案此由積熱生濕中焦不舒之故耳當先用和胃法湯批乙為金運卯年陽明司天於經為天符金氣不應過弱但此年逆行三度司天不當其位不得與他年天符同按集中本年方藥皆寓抑火扶金之意可見學者於陰年逆行當互觀而參考之不可拘定太過不及天符歲會之說也川芎錢半葛根一錢廣木香一錢紫蘇梗一錢赤芍一錢豬苓錢半寒食麵三錢陳倉米一勺澤瀉錢半藿香一錢釋此乙卯年小暑後五日方也斯時月建客氣俱在濕土濕土過滯而燥土不得施其輸轉之力故藥以利濕和陽為主其不用少角之味者因前醫屢用風燥故也後五日換方案胃陽少舒但濕熱未除耳皮硝一錢鶴蝨錢半石菖蒲錢半車前子錢半砂仁錢半神麯錢半夏枯草一錢製半夏一錢連翹二錢黃芩二錢炒山梔錢半廣木香一錢木通錢半湯批戈羅二證同感太陰之氣戈方用木勝濕羅方和陽泄陰亦以前證系初感在表後證因循入里也釋五日之後方交太陽而來氣有餘往往未至而至故首用鹹寒之味以助金水而清濕熱且火兼金化之年又值氣交之分自當以扶金降入為主然心氣不清太陽之標熱將挾以鑠金故預用菖蒲連翹以散其鬱方甚平淡而意理精深讀者詳之王翁五三素患陽虛偶染間日瘧疾熱重寒輕氣急不寐生地二錢黃芩三錢當歸尾三錢牡丹皮一錢土炒黃柏二錢白芍二錢釋此乙卯年立秋前二日方也月建當未申之交天運少角客氣太陽主事肺金本弱之人火兼金化之歲風助火威之運溽暑火炎之月欲借太陽之氣而滋降之又恐誤用寒涼以致陽氣愈陷若誤用發散風燥之味反或煽動木火其禍可勝言哉方用滋陰降火以除標熱而太陽之本寒妙在用本地風光之法即用歸尾助心以散之從標治本神化之技不可方物餘子十五痰喘氣結脈微細案雪山朱子曰金水少相涵之妙也薤白三錢青皮一錢大麥冬錢半白蘇子一錢桔梗一錢瓜蔞仁二錢炒梔一錢車前子二錢黃芩錢半降香一錢寒食麵三錢蔥白三莖釋此乙卯年立秋後六日方也火兼金化之年又值申金尚未出伏金受火刑已久更有天運之少角助火之威而太陽之寒水不能上通於肺只見其標熱而已方惟有滋助庚金以降火氣開散辛金以通水氣更用青皮以平少角使不得助火之威蓋金清水平則肺氣自暢清肅令行火降而痰消矣徐氏十九四肢無力頭昏咽痛飲食不納脈細數無力案此血虛脾倦之象當歸尾三錢川芎一錢黑山梔二錢蒼耳子一錢肉蓯蓉一錢白芷一錢北沙參錢半牛子一錢山萸肉一錢防風四分芙蓉葉六片橘葉六片釋此乙卯年霜降前一日方也天運太徵客氣厥陰主事火強金弱之年又逢客氣之風木煽之故火不安於釜底而上越此脾之所以失養而血之所以不旺也方用芎歸以助血而以黑梔蓉葉清血分之燥火白芷蒼耳從庚金以制木沙參牛子橘葉保辛金而清浮火卻用蓯蓉萸肉從火氣而斂之於釜底少用防風引之導以生土而殺其刑金之勢此即術家貪生忘克之義也吾師於百家之說無不該通小子解釋方意其猶為蠡測也夫按芙蓉葉稟秋金之氣而性體柔滑故能涼血潤燥卻不似生地之沉寒有妨脾土因世俗不入煎方故特表之徐霽山記殷妻卅血崩昏暈脈亂無紀案此濕鬱日久而生熱熱入血室無統之故也今只治其標耳延胡索二錢玄參二錢血餘炭三錢歸尾三錢生地炭四錢白芍三錢加醋三錢同煎釋此乙卯年大暑後七日方也月建未土天運少角客氣太陽主事方用心肝脾三經之藥以治血分未土及少角已到何獨不理太陽耶蓋以太陽之標熱合於心經心經之藥原因太陽而設況玄參味鹹色黑實為癸水之主藥而壬水可以類相從其不直折太陽者清散與滲利皆不便用於血崩之候也前方服後血下差少神亦稍清案濕熱猶未清也莪朮一錢白朮一錢細生地三錢紅花炭錢半蒼朮一錢赤苓一錢炒山梔一錢天花粉一錢貝母一錢黃芩二錢旱蓮草二錢釋此立秋前二日方也月建將近申金原宜預理陽明況火強金弱之年又值火炎金伏之月非運土消積利水調肝何能使金氣澄淨躍然而出於治哉後四日換方浮小麥一錢黑山梔錢半青黛一錢黃柏一錢酒炒海螵蛸一錢荊芥穗一錢瞿麥一錢貝母一錢土槿皮一錢紅花一錢炒炭雲苓一錢芝麻荄一錢炒炭釋前方利水之味不過兼走膀胱此則專以寒水為主者血分三經稍平故可治其本也余則金土為輔而旁及於少角者耳後四日換方案脈象稍平可兼用攝陰之品以清其流大麥冬二錢川貝母錢半白芍一錢黃連八分菟絲子二錢桑白皮錢半黃芩三錢杜仲二錢芡實殼錢半白蠶繭一錢鬱金一錢胭脂一錢燒存性紅柬紙一尺燒服七劑後用八珍湯去人參甘草加黑豆首烏黃連再服十劑釋此方不出前意但藥物生動故取效較捷治病有先標後本先本後標者又有前後治本中間治標前後治標中間治本者如此證先治標繼治本未復標本兼治總之胸有靈樞故所向如意拘泥於小家方書動云急則治其標吾恐其尚未識本之所在也俞妻卅五痰火舊疾舉發脈沉數案靈山王子曰土為水之垣而已非甲不化當以清木疏土為主五倍子一兩龍膽草一兩酒炒青皮一兩白芍一兩醋炒川楝子一兩酒炒石菖蒲一兩槐花一兩砂仁一面白茯苓一兩廣木香一兩姜皮一兩膽星六錢天南星四錢蜜丸每服四錢隨意下釋此乙卯年大寒前六日方也丸方久服自宜以來歲丙辰之運氣為主丙辰系太陽寒水司天逆行三度初氣即交而天運又起於太羽水氣過重則木氣漂泊無依況水齊土化之年水氣盛而土氣衰將來寅建之甲木何所倚著乎計惟有藉殘臘之醜土以立其基兼舒甲木之氣根株既安則水氣翻為養木之原矣從來治病貴明乎一定之理至於藥味之配合惟在即其理而會意即如此證病情脈象瞭如指掌果能審乎氣化之衰旺即別立一方何嘗不效然非平日有格致之功者終不能頭頭是道也庚申少陽司天中運太商厥陰在泉金齊火化右寸不應初氣大寒交主厥陰客少陰二氣秋分交主少陰客太陰三氣小滿交主少陽客少陽四氣大暑交主太陰客陽明五氣秋分交主陽明客太陽終氣小雪交主太陽客厥陰初運大寒交主少角客太商二運春分後十三日交主太徽客少羽三運芒種後十日交主少宮客太角四運處暑後七日交主太商客少徵終運立冬後四日交主少羽客太宮蔣姓十七傷力吐血時時舉發發則氣急心疼脈數大而虛案陰火鑠極法當培陰以長陽此常治法也若暫治則宜培土以伸木木旺而土返其宅矣當歸身三錢土炒敗龜板六錢土煅白芍三錢醋炒青蒿二錢砂仁錢半茯苓三錢黃連水浸炒佛手八分連翹二錢山羊血一錢鉤藤鉤錢半炒梔二錢硃砂五分遠志肉三錢竹葉心為引服七劑釋此庚申年立春後三日方也月建寅木天運太商客氣逆行三度初氣屬少陽主事但金齊火化之年金氣強而木火弱制木太甚則木不能生火火弱則心氣不足而土失所養且真火少力之人反多虛火上炎之勢蓋庚金實陽明之燥火寅木屬少陽之甲膽也木火之根不固而標火愈覺浮蕩標火寧則土自培而木自伸矣又換方案此時宜降氣以行脈也川芎八分紅花五分白殭蠶二錢降香末一錢沉香六分歸身二錢細生地三錢紫蘇梗二錢澤瀉二錢澤蘭二錢金銀花二錢桔梗二錢服八劑釋此雨水前一日方也陽明之燥火上逆而少陰氣弱之人每為所挾而生焰經所謂氣有餘則侮所不勝之義也火上浮而己土失養即不能與甲相配故土滯而脈亦俱滯氣即火也燥金之所化也脈即血也心火之所主也氣不降則金盛而木受其制木受制則不能生心血而脈終不濡原文以字宜玩蓋降之於下使為釜底之薪則土得其養自能蒸氣化血以行於百脈此即甲己從化之意也王女八歲胸腹疼痛服藥不效案今歲少陽司天支幹皆屬陽明必多胃滿中癃目赤耳聾或大腸燥結傷陰等證然亦須參之以各節所運之氣與人事致病之因如此證卻由去冬之愆陽伏陰以致少陽不得遷正而遂其生髮之氣也可用和解法附子八分黃連水炒焦楂肉二錢神麯二錢木通一錢廣木香一錢宣木瓜一錢烏藥一錢桔梗錢半車前子一錢茵陳一錢白芍二錢服三劑釋此庚申年立春後二日方也去年己未為太乙天符太陰司天之氣有餘而不退位加以前冬太陽在泉之令陽氣愆伏故今歲少陽不得遷正木火之氣既微而中運強金亦為濕土所束而不能施其轉輸之力依經施治當折舊司天之餘以退之故方以助陽為主而以疏土去濕為輔蓋寒濕去則強金自運陽氣勝而弱火亦起矣此成功所以易如反掌也瞿姓廿七從客冬起偶因心思鬱結咳痰常帶血珠面部天庭冷如冰鐵不知痛癢兼之耳聾脈浮無神案陽水不舒不能生火而無根之火失所統攝也桑白皮二錢海螵蛸二錢白芍二錢白朮二錢白茯苓二錢遠志肉三錢砂仁二錢土炒香附二錢醋炙辛夷仁錢半去皮毛硃砂三分側柏葉為引服五劑釋此庚申年雨水日方也病起於客冬太陽主令之時本寒之氣未足於下標熱之氣浮泛於上是以陽木失養而本年金齊火化真火微弱故方用桑皮辛夷之類以平金而用香砂遠志以扶火蓋金氣平則甲木條暢火氣盛則脾土滋長甲與己合同而化矣又換方案心經陽體而陰用腎經陰體而陽用陽主施而陰主攝此證乃陰侮陽而陽乘陰之象抱木茯神六兩蓮肉四兩連心白芍三兩連翹二兩連心五加皮二兩黑芝麻三兩木通一兩桔梗兩半中生地二兩熏脆紫蘇梗二兩川芎二兩秦艽兩半用燈心三錢浮小麥三合煎湯和蜜為丸如綠豆大每服五錢燈心湯下釋此清明前四日方也病從郁思而起本年又屬心弱之年此時氣屬太陰而火母不足以相養運當少羽而心妻不足以相配將來月建辰土實為心腎之關鍵而又為手足太陰之門戶故丸用心腎脾胃四臟之藥配合成方升降補瀉確合機宜所以用力少而成功多也金女四歲痘瘡發熱毒閉不出案陽明之火罩住肺經而不得舒暢也青皮二錢青蒿一錢青木香一錢當歸尾三錢紅花八分枳實一錢瓜蔞殼一個桑白皮二錢青黛八分砂仁八分楂肉二錢引用竹瀝三匙服一劑後加熟軍錢半釋此庚申年春分日方也月建卯木天運太商客氣初交太陰金強火弱之年木氣多郁是以不能疏土而太商亦患其頑梗太陰亦嫌其濡滯也且痘證當兼以納音為用庚申為石榴之木秋金重疊惟榴結實而不損是為金中之木月當仲春榴木初萌宜借卯氣以引之故方以達木為主而以清金疏土為用至於用苦溫以助心則兼乎中運納音而為之者也湯批大凡痘證俱感元運而發此時系六白乾金分司故陽明之證居多後世痘疹家或主涼瀉或主攻毒或主溫補或主燥脾然驪珠未探總為紛紛鱗甲也後一日換方案琴溪沈子曰此時胃經之濕滯稍輕只心經之火未透也宜用清心之味以佐治之丹皮二錢連翹二錢連心當歸尾三錢甘菊花錢半楂肉二錢枳實錢二荊芥穗一錢金銀花一錢青皮錢二蘇木一錢廣木香一錢條黃芩二錢木耳五錢熟軍三錢蘆筍尖二錢茅針肉一錢紫花地丁一錢當門子一分當門子系通脈舒氣之味此出乎前人範圍之外而以意用之者也熟軍宜相勢而用如一服後得大便二次即宜去之余照原方再服一劑釋此方以心經為主苦溫固所以助心清涼亦所以安心也蓋君火不足之年陽明之燥火反有上忤心君之勢故兼用辛涼以平金至於達木疏土猶仍前方之意云耳後一日換方案琴溪子曰腠理猶有未透處大凡此證有一點未透終要清理免致後患故前方破格用麝亦因乎天地之氣運而為之也丹參二錢赤芍錢半槐花錢半紫花地丁二錢青皮三錢枳殼二錢川芎一錢抱木茯神二錢神麯二錢薄荷三錢澤蘭葉一錢金銀花三錢蟬衣錢半竹瀝三匙當門子一分用白絲綿二大塊燈心三分桃蕊二錢杏蕊二錢煎湯代水用桃杏蕊者取其得春氣之先耳服一劑後頭面必清後加升麻三分再服一劑可勿藥矣釋方仍清金達木之意但用藥之輕鬆靈變學者宜熟玩之蓋凡痘疹之用藥總以清輕為貴也此等閉證若在俗醫之手必致妄斷朝期謬用寒峻賊其真元終歸不治縱有一二先天充實僥倖不死者亦必焦頭爛額矣不遇盧扁難盡天年此心乎保赤者所以瞠目而三嘆也郁子三歲痘瘡不透壯熱無汗案此證屬於肝經肝主脈終茲因脈絡有滯故未透泄耳蘇木二錢砂仁錢二紅花三分栝蔞仁殼共二錢黃芩錢半楂肉二錢人中黃二錢馬兜鈴一錢銀花二錢神麯三錢赤茯苓二錢木通八分甘草二錢燈心一分絲瓜瓤一錢釋此庚申年清明前四日方也月建之卯木不舒天運之太商多阻是以客氣之太陰不得和暢耳蓋卯木與酉金相待對而戊土與己土相表裡方用達木泄金疏理手足太陰之法蓋金不泄則木受其制土不和則木根不暢也同是金齊火化之年而此方不重扶火者以證屬肝經木為火母木達而火自生也後二日換方案琴溪子曰肝經滯氣稍清而心經之火借肝為用又少陰主血血有未調亦難起發此時卻要略用涼味以分泄木火之氣胡黃連八分酒焙黃芩二錢酒焙薄荷二錢半鬱金心錢二酒炒丹參二錢土炒玄參二錢知母錢半羚羊角尖二分磨木通錢半淨鉤藤三錢炙甘草二錢半桑花二錢茅針花八分檉柳三錢香蒿苗二錢服三劑止藥釋天運將交少羽故早用知母玄參以迎其氣而益其源且月建亦近辰土辰為水庫水氣向衰之候相火失所養將浮泛而上干心君之立故方用土炒丹參以助心而用酒炒芩連以平相火干君之勢其餘清金達木疏土之味皆常法也但其隨證用藥清松熨貼不似世俗之重濁膚淺泥於通套方藥以攻伐無過耳範氏卅一痘後目眥腫爛年久不愈此時舉發更甚案琴溪子曰此肝經部位而脾經寄體焉宜用散藥頻頻服之魚膽一枚不拘何魚皮硝錢半蠶砂二錢桑寄生二錢白芷一錢白蒺藜二錢椿白皮二錢幽蘭花三支豬膽汁三匙內服外洗俱可釋此庚申年春分後三日方也月建卯木天運太商客氣太陰主事疾在肝脾而月建與客氣適與相值此舉發之所以甚也但強金之歲木氣必弱自不得不重用泄金之品乃月在卯木而方內兩用膽汁何也太陰己土非甲木不足以和之且寒苦而潤能滋養甲木而清其熱甲木既安庚金自不得而犯之矣幽蘭花各家本草與澤蘭相泥未曾錄出然本經上品列有蘭草稽之騷經曰春蘭曰山蘭曰石蘭皆此類也其性甘平清肺開胃消痰利水解鬱調經內經所謂治之以蘭除陳氣者是也愚意氣香舒脾色碧入肝乃調和肝脾二經之品其種盛於閩越性應溫和而清補根葉皆可入藥功專解鬱而無燥烈泄氣之患兼有溫暖子宮之益故於婦科為宜亦可為虛弱失血等證舒氣化痰之用故附記之殷女九歲兩項各生痰核一串年餘未痊案從來左臟之脈循右右臟之脈循脈循左所謂參互其數相抱合也此蓋脾經之火借少陽木用而寄象於少陰之垣也治法宜清脾火以制其源消膽火以殺其威但須輕清之味方得到此又要開散滯氣之藥佐之夏枯草二錢厚朴錢半青皮二錢蒼耳子錢半郁李仁一錢酒焙鉤藤三錢蜜炙紅花八分蔓荊子一錢川鬱金錢半皮硝一錢升麻八分青橙皮一錢青蒿一錢橘葉二十片川芎一錢服十劑釋此庚申年夏至後九日方也月建丁火天運太角客氣逆行應屬少陰主事痰核起於舊年己未土運天符之歲首夏太陰司天之時甚於今歲少陽司天太陰主令之月此時主客運氣卻在少陽少陰之分以四象而論少陰少陽實乾坤之大用也以五行而論少陽屬木土之官也少陰屬火土之母也今脾經之火借少陽木用而愈甚少陰反為所凌而不能施其哺子之用是甲己以火相從而不同於有情之合矣故方以清木疏土為治本之法又借中運之強金剋制陽木以為治標之法卻兼苦溫助心之味以扶少陰之弱火而所用又皆體輕性散之味此理法兼到之作也又換方皮硝六分紅花七分石菖蒲一錢酒焙當歸身三錢柴胡一錢酒炒貝母錢半淨鉤藤二錢金銀藤一錢桔梗二錢桑枝一錢服八劑釋此小暑後六日方也金齊火化之年月建換交未土君火泄氣已甚不得不重加助心之味以救時弊而少陽之木氣久不條達況值未土之月金氣有根而木氣入墓除卻泄金舒木別無他法又換方案脾經猶有滯濕肺中卻有新熱青荷葉一兩青木香一錢菱葉三錢青黛二錢橘皮白二錢馬齒莧錢半蘆根六錢燈心一分益母草花一錢木通一錢薄荷錢二葛蔓錢二服五劑釋此大暑後三日方也月建未土客運太角客氣換交陽明故少陽之相火陽明之燥火與未土之濕熱相蒸而移熱於肺以肺為諸臟之華蓋而辛與庚相為表裡也然此方究以陽明為重因中運與客氣相比自不得不殺其威而清其源而未土太角實為病本所在夫是以百變而不離其宗也後六日換方案陰陽之氣尚未得動盪流轉也橘白皮二錢椿白皮錢半樗白皮錢半川芎一錢桑白皮錢半連翹殼一錢茯苓皮錢半紅花八分土槿皮錢半砂仁殼一錢貝母錢二服八劑釋此時源頭久清只形證未除故類用白皮以行皮裡膜外之痰而其中清金和木疏土調火之意一毫不紊其諸詩所云不失其馳舍矢如破者歟宋子七歲間日瘧疾純熱無寒發時腹痛氣急無汗醫用涼散劑治之不效脈弦數無力案胃經燥熱不能生水養金之故也當以潤燥清金為主麥門冬五錢金櫻子錢二郁李仁錢二柏子霜二錢黑料豆四錢醋炒川楝子二錢黑豆皮一錢炙甘草錢半鮮旱蓮草二錢川芎二錢砂仁二錢土炒鮮枸杞頭二錢釋此庚申年處暑後八日方也月建申金天運少徵客氣陽明主事金齊火化之年又值申金陽明主客同到之令庚金強極則甲木過弱而虛火上冒此燥熱之所以愈甚也方用清降庚金生扶甲木為主兼用滋益少徵之味以輔歲氣之不及即以制中運之太過也又換方案蓮峰李子曰肺管周身之氣衛氣不調故營氣不能湛汪也仍用和解參以調營衛之法金鈴子錢半川鬱金錢半薤白錢半皮硝七分柏子仁錢二紫蘇梗八分藕節二錢桔梗二錢川黃連五分製附子八分歸身四錢赤豆八分空小麥一撮釋此白露日方也月建新換酉金金強火弱之年客運之少徵不旺甲木又為陽明之燥金所挾並居火舍則辛金被爍愈不能生水以養木矣此時若純用正治既礙於衰木之無根又掣於君火之本弱方用歸身柏子以助君火之源卻用黃連赤豆以清其熱以金鈴泄甲木之熱卻用附子以益其源而引之歸於下元至於清酉金而導以生水散庚金而開其鬱結乃時令之不得不然者也後六日換方案胃經之熱實由太陰之濕滯而來蓋生人之水穀納於胃而輸於脾脾經蒸氣於上則肺受之以流輸於萬有八千之小竅故土與金每有互相為用之理今金土俱郁故泄氣於陽明之衛也今仍宜清金舒土耳大麥冬三錢天門冬二錢桔梗錢半獨活一錢川鬱金二錢化橘紅一錢木通八分香薷錢半中生地三錢土炒廣木香二錢貝母錢半皮硝錢半紫蘇葉八分蒼朮二錢米泔浸當歸四錢甘草五分荷葉連莖一大個陰陽水煎服四劑釋此酉金屬於手太陰實與太陽之氣相合此金水相涵之義也今燥火過盛土不生金則水穀之氣不能散於周身胃為水穀之海與脾相表裡脾濕而胃燥肺何從得所受施乎方用疏土生金清金生土之法以通周身之衛氣卻用扶益少徵之味以助心而調營亦以陽明之金氣過甚於所不勝者反狎而侮之也後四日換方案病勢雖平而脈猶滑數當仍用前意而小變之當歸三錢大麥冬四錢貝母二錢牡丹皮二錢鬱金錢半黑豆皮二錢南星六分甘草節一錢神麯三錢大砂仁八分酒炒青皮一錢引用荷莖五錢服四劑愈後仍須清肺以助營之流通釋陽明阻滯燥火生痰總由心血不足營氣不能流通之故究厥由來終不外乎中運之金強火弱而已方用助心泄胃以損有餘而補不足靈樞在握自能左右逢源攸往咸宜矣林姓卅三因事恚怒耳暴聾醫以四七湯及越鞠丸治之不效脈微數案任督二脈循腰上髮際而回環轉側於兩旁以終一身也人但知氣有頓挫而未知血不榮則氣亦不得醞釀而流通也大熟地八兩山萸肉三兩條芩二兩鬱金四兩左紋秦艽三兩酒炒木瓜二兩連翹三兩連心茯神二兩益智仁三兩麵煨銀杏肉八錢酒炒枸杞四兩甘草一兩蜜丸每服六錢燈心湯下銀杏行二脈之要藥也自記湯批客氣太陽主事太陽標熱合於心故用連翹以清之太陽本寒合於腎故用熟地以溫之從節氣也心主血故用茯神以養之肝藏血故用萸肉以滋之脾統血故用肉果以舒之遵證脈也節氣與證脈合而成方斯真得軒岐之秘鑰者釋此庚申年秋分後一日方也月建酉金天運少徵客氣太陽主事而厥陰風木實司在泉之氣任督二脈俱發源於水臟之部且與衝脈同源沖為血海則任督豈不兼行營氣乎方以滋水為主而以達木為輔蓋用客氣而兼在泉之氣也至於用鬱金以清酉金用茯神連翹以應少徵尤見細密無遺範子二歲久瀉脾陷發搐脈弦數案肝經火煽金受其制所謂反不令也蓋金為木官今木反剋金則五行顛倒之候也青蒿三錢肉果錢二麵煨金櫻殼二錢山茨菇二錢山藥四錢粟殼二錢穀精草二錢半白殭蠶二錢黃連五分升麻一錢砂仁皮二錢炒雞內金二錢石榴皮二錢全料分煎頻服釋此庚申年霜降後三日方也經云亢則害承乃制蓋太過之亢制猶不及之勝復也本年金氣太過下半年應屬承製之候故火氣感於風木在泉之氣以上浮而爍金又值客氣太陽之本寒在下火不能降於釜底此所以手足太陰之氣俱衰而戊土亦無所施其運用矣金本強也乃因木而反弱是不得執五行分旺四時之說蓋生克之理盛衰無常衰而可補盛而可瀉即為順證析理既明自有撥亂反正之法在焉宇宙在握造化生心在吾師固無難焉耳陳妻廿五產後血崩頭暈目昏脈右虛大左微沉案陰虛血熱之證又血統於脾此脾經轉輸失度耳當歸四錢川芎一錢黑豆皮二錢忍冬花錢半砂仁錢二土炒紅花八分青木香錢半制首烏二錢龜板四錢醋炙甘草錢半大麥冬二錢蛀小麥錢二服八劑湯批運氣同前前方從金制木此方滋陰養火以前證屬木恃強此證屬土不職也亢害承製天地自然之機而形體有強弱臟腑有陰陽又非可一概論矣釋此庚申年霜降後十日方也月建戌土天運少徵客氣太陽主事戊土與己土相表裡太陽與太陰相配合卻因金齊火化之年少徵之火不能生土所以脾弱而不能統攝耳華氏卅五崩淋病後陰虛發熱頭運鼻衄飲食不進脈浮數案當此水令正旺之時而木氣太郁柳眼梅梢何由而茁乎但此證究以舒暢為主而長陰以生陽耳蓋陰不長則陽不生兩儀乘除極之乃發土槿皮三錢沙參三錢元參二錢延胡索四錢地骨皮三錢青皮一錢青蒿四錢白蘇子一錢酒炒赤石脂錢半杵茵陳二錢升麻八分訶子肉一錢東丹一錢蘇木錢半服六劑釋此庚申年大寒前四日方也土王用事之候客氣亦近來歲之太陰本年在泉之氣退位太早水為土掩木鬱土中陰土滯而陰水弱則來年之寅木無根此全方之所以以疏土壯水為主也夫滋降肺氣以為生水之用人皆知之至於滋養水氣以為生水之需並用木味以預舒寅木之氣則更有深意存焉蓋本年為金強之歲木氣受克已久來歲又為水弱之年木之母氣不盛不預為養焉其何能崛然興起乎鄒姓十六咳嗽吐血時覺虛熱飲食減少醫治不效脈寸沉關滯注兩寸不應來年歲氣也案此總是木德不藏土根未固耳制首烏三錢鱉甲三錢藕節六錢紅花炭一錢枳殼錢半抱木茯神三錢芸香一錢甘松一錢廣木香錢半降香末一錢赤芍錢半花粉錢二柏脂一錢桃脂一錢服八劑多用香味者榮得香而開散耳自記釋此庚申年大寒後六日方也以疏理月建之醜土為主而以預培來歲之寅木為用其用首烏者滋木之源也用茯神者益土之源也諸香屬氣而入脾脾統血血非氣不行故榮得香而散凡此以酉年初氣太陰交足耳
