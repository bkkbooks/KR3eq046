body:
  text: 卷四火運年癸丑太陰司天中運少徵太陽在泉水兼火化右尺不應初氣大寒交主厥陰客厥陰二氣春分交主少陰客少陰三氣小滿交主少陽客太陰四氣大暑交主太陰客少陽五氣秋分交主陽明客陽明終氣小雪交主太陽客太陽初運大寒交主太角客少徵二運春分後十三日交主少徵客太宮三運芒種後十日交主太宮客少商四運處暑後七日交主少商客太羽終運立冬後四日交主太羽客少角鄧翁六二腹痛煩渴瀉痢不止醫以胃苓湯治之不效脈兩關及左尺數濡右尺沉伏注右尺不應天和也案此腠理不調耳紅曲二錢無名異一錢花粉二錢茯苓塊三錢香附一錢萊蔔子一錢小生地二錢釋此癸丑年清明後六日方也天運太宮月建辰土客氣屬少陰君火主事而本年乃火運不及水來兼化之年故少陰火弱不能生太宮之土以致陽明辰土不能散布津液而腠理不能調適耳明乎此理則此方之妙不煩言而解矣用胃苓湯不效者何也太宮辰土乃陽明轉輸之府胃苓專於去濕而不能助布津液且中焦取汁奉心化血而後少陰乃得行其令胃苓專走氣分何能兼顧少陰乎此等毫釐千里之別學者不可不詳審也無名異屬陽明戊土性能和血補血又味甘兼入脾故能止痛行傷續絶生肌胃主宗筋脾主肌肉也祝道山附汪陳翁七一多年便血春來又添左脅疼痛之疾脈芤數無力案此肝經濕熱所致陳皮三錢一半土炒一半醋炒陳皮炭二錢茯苓二錢肉蓯蓉一錢山藥二錢黃柏一錢生白芍一錢大貝母一錢白石英一錢服四劑後仍用三制陳皮茯苓外加蒼朮苡仁北沙參白扁豆各二錢多服自愈釋此癸丑年小滿前三日方也天運太官月建巳火客氣在少陰之末三日後即交太陰司天之令故用藥皆以太陰為主蓋手太陰為氣之主足太陰為氣之母也且氣即火也血即水也本年系火運不及水來兼化之年故惟患氣不足以攝血而不慮水不足以制火也病系肝經濕熱而用藥不甚著意肝經者火衰水旺之年惟憂水氣泛濫土多塗泥而水氣之託根不固故此方之調土去濕即所以治肝若第云蒼朮茯苓陳皮是用戊以化癸也猶淺之乎論醫者也羅氏草五每至經期頭運身熱兩膝上下起紫暈如斑服藥不效脈細軟而數案此濕熱也青鹽一錢防風二錢紫地丁二錢荊芥一錢銀花一錢紅花一錢地骨皮錢半蘇梗一錢淡竹葉二十片石斛一錢青蒿一錢釋此癸丑年夏至前八日方也月建丁火天運在太宮少商之交氣行太陰司天之令病本由於濕熱而病標乃血虛生風之象方用荊防從太陰以去濕也用青鹽地骨蘇梗銀花從少商以治風虛也用紅花紫花從丁火以清血熱也用石斛青蒿竹葉清肌膚之虛熱也脈象細微而師不用補劑者因前醫補之不當脈象未起故但用調木勝濕清熱之法蓋調木即所以生火勝濕即所以固土清熱即所以保金也如此等不補而補之法集中甚多惜乎不能執俗醫之裾而告之也曹氏草五久痢休息脈寸浮關緩尺沉穀芽三錢穀精草二錢寒食麵二錢鱉甲二錢蛤粉錢半生地炭二錢山萸肉二錢升麻六分湯批久痢休息之疾每多強木侮土之患此證因太陰司天上氣得令水兼火化水多木漂故不補土而反扶木其不壯火者火當月建故也釋此癸丑年夏至後六日方也月建丁火氣行太陰司天之令以症而論似宜扶火以生土以脈而論似宜壯水以固陰奈因水兼火化之年又值金氣休囚之候故礙於火而不便壯水但用益金而水自有根礙於金而不便扶火但用扶木而火自乘時而出矣殷子三歲咳嗽喘急痰壅壯熱醫以大劑麻杏石甘湯治之喘嗽不減痰熱更甚案此肝脾二經之鬱火也歸尾二錢沙參二錢連翹一錢石菖蒲一錢川芎一錢陳皮一錢麥冬錢半紫蘇子一錢紅花六分一劑分二次服湯批云肝脾二經鬱火肝經之郁由陽明之間氣也脾經之郁由本年之火弱也故導火以生土清金以舒木用法不同悉合時宜釋此癸丑年寒露日方也天運太羽月建戌土氣行陽明燥金之令病在水土二臟而用藥多從金火者因水兼火化之年復加太羽之運弱火受制而不能生土是以土氣濕鬱而邪火生焉方用歸尾紅花菖蒲連翹開鬱導火而土鬱解矣此以生扶為治者也壬水得氣而生木過蕃木氣薈蔚而鬱熱蒸焉方用沙參麥冬蘇子陳皮清金理氣而木鬱除矣此以剋制為治者也醫家之因病制方猶文家之因題立格此如兩扇分輕重之題用唐職方二比側串之體吾師其以鳴鳳之筆變而為猶龍之技乎前方一劑後喘咳大減只痰熱未清霜桑葉二錢蜜炒甘菊二錢桔梗一錢防風八分青皮六分天南星五分甘草節一錢薤白錢半天冬一錢燈心三十寸鮮銀花頭七個釋此方清金化痰如白公之詩老嫗都解也戊午少陰司天中運太徽陽明在泉火齊水化兩尺不應太乙天符初氣大寒交主厥陰客太陰二氣春分交主少陰客厥陰三氣小滿交主少陽客少陰四氣大暑交主太陰客太陰五氣秋分交主陽明客少陽終氣小雪交主太陽客陽明初運大寒交主少角客太徵二運春分後十三日交主太徵客少宮三運芒種後十日交主少宮客太商四運處暑後七日交主太商客少羽五運立冬後四日交主少羽客太角花嫗五十久年身痛師於丁巳冬訂一丸方服畢覺舉發稍稀發時痛亦稍減更請換方脈細軟兩尺沉案肝脾為行氣之帥氣未舒故脈仍攣也松節三兩甘草節三兩藕節三兩砂仁三兩酒炒淨鉤藤三兩連翹一兩豬苓二兩黃柏三兩鹽水炒干桂皮一兩甘菊根五兩茶葉一兩丹皮兩半木瓜兩半蜜丸銀花沖湯下每晚服三錢五分釋此戊午年春分前二日方也太乙天符之歲火齊水化之年少陰司天支幹皆火經所謂太乙貴人三合為治者也此時又值太徵之運太徵屬丙火與客氣之太陽相合而丸方究以司天為主者司天主歲間氣紀步也方內借月建卯木之氣以清散少陰而復保金抑木以豫防貴人之患於未然真可謂良工心苦矣馮氏四十頭目昏痛鼻多濁涕時或痰嗽胸脅不舒腰疼白濁飲食減少醫以神朮散及逍遙散治之不效改用節庵再造散反增喘咳脈微細如絲兩尺伏案此症系相火不守上爍真金也此時只宜開肺郁而壯水以制火耳門人問曰此人脈象微細而師云火盛何也師曰爾不知尺寸三部皆手太陰之動脈乎肺為諸臟之華蓋故藉以診之耳今三部皆微正火爍真金之象然亦必須合歲氣天和之理而詳審之方無舛錯古所謂按脈切理者原非僅浮沉遲數之大略已也川鬱金三錢白芷錢半白薇一錢薤白二錢葛根一錢赤芍藥一錢杜仲二錢鹽微炒紫蘇八分白蘇子六分黑豆皮二錢引用白果六枚去心入煎服六劑釋此戊午年穀雨後七日方也太乙天符之歲火齊水化之年水氣原弱況值二氣厥陰之令煽火而忤金金不能生木水亦不能涵金而子母俱瘠矣方用解散庚金清潤辛金之法並乘月建天運之土氣以生之則金氣從革而水氣有根且可借其勢以制風木而不致有鬱滯生火之患矣姚氏草四小産後心虛怔忡發熱頭運食減神疲夜不能寐醫以養心湯及歸脾湯治之反見舌燥唇焦痰嗽氣急之象脈細數案此係脾經不能攝血而衛氣無所歸也其法當先以養陰為主服五六劑後乃用補陽之劑女子陽藏於內陰包乎外陰不固則陽泄而神疲服此方六劑後虛象必減仍用歸脾湯可也鮮生地錢半鮮首烏二錢半白芍錢半雲苓錢半鮮石斛三錢炒山梔錢二木通錢半知母錢半砂仁錢半陳香櫞五分釋此戊午年穀雨後八日方也天符氣運説見前章蓋少宮屬脾辰土屬胃火齊水化之年二土皆為爟而津液渴竭師用滋液降火之法即本古方四生丸之意而變化用之者也然亦適值前醫補益乖方之後間入用之損有餘即以補不足因利乘便取效甚捷若非有溫補之劑屢服於前吾師決不輕用寒涼於小産血崩之後也然亦據此不足之症言之耳若兼客病火邪又當別論按歸脾養心二湯內有棗仁遠志諸味尚有斂火歸元養血寧心之意心即火也血即水也火斂自然水生心寧自然火熄與此症理原不悖謬但此年天符屬火客氣又逢風木風助火威勢甚猖獗一味溫補何能有濟若非吾師之醍醐甘露急救於涸轍之中吾不知此症作何底止矣李雲圖識羅氏卅一經期無定淋濁不止少腹痛氣逆嘔噦咽痛頭運嗽有咸痰脈寸虛大關實而滯尺濡弱兩尺應伏今見濡弱濕勝而陰虧也案血氣凝結經絡有虧治法亦不過調氣以養血海之脈耳血餘炭三兩紅花炭一兩龜板二兩醋炙黃柏二兩鹽水炒鮮地黃三兩桑白皮二兩麥冬兩半吳萸八錢薑製桑螵蛸二兩山羊血一兩五錢山茨菰一兩紫蘇梗一兩益母膏四兩蜜丸每服四錢釋此戊午年小滿後九日方也月建巳火節過小滿正當少陰司天之氣丸方原宜主之而天運之少宮未退待芒種十日後方交太商之運故方內預用保金益水滋陰調血之味其餘總以降火斂火為用者恐太乙天符之歲火不歸根上爍真金也至於月建屬丙火司天屬丁火此正鑠石流金之候若不預為防間恐至五月丁火當令貴人乘權陰血虧損之人難於支持耳吳氏卅五口苦嘔逆心疼脅脹腰膝牽痛不能轉側醫以逍遙散復脈湯及舒肝養血之藥年餘不效脈寸虛大關弦細左右尺皆虛案此少陽之症少陽與腎經為表裡此體而彼用腎陰中有陽膽陽中有陰水能生木木能生火故曰相火寄於肝膽之間其色青陽木也人但知木病而不分陰陽故困頓至此亦幾希矣今惟用滋水以舒膽經之郁可也山萸肉三錢肉蓯蓉二錢元參三錢丹參三錢黑料豆錢半菟絲子二錢知母錢半黃耆一錢杜仲二錢木香錢半木通錢半乾薑二片湯批少陰司天而病反在少陽者陽不配陰也故方用扶少陽抑少陰之品抑少陰之火而復滋少陰之水者少陰水能生陽木也釋此戊午年芒種後二日方也天運少宮月建午火節至芒種久屬少陰司天之令而病屬少陽故以陽木之味為君少陰之味為臣少陰與少陽本相配也至於少宮屬陰土乃陽木所賴以滋長者也補之疏之宜矣復用苦泄之味以清其火者何也土為火之子天符火盛之年少陰嫌其太實實則瀉其子也況丙丁同旺於午瀉己土即所以瀉丁火也而又必兼用補土之味者以此症本非實症且欲藉以降君火而攝相火也此等真機世醫罕識鄭氏甘二痞結少腹繞臍切痛白帶時下月候不調脈兩關緊細而實兩寸長滑而小右尺澀而微左尺數而革案此任脈不行之疾也雲母石二兩陽起石二兩杜仲一兩龜板三兩菟絲子一兩大腹皮二兩木香一兩黃柏兩半女貞子二兩益母膏二兩知母二兩丹皮三兩澤瀉兩半桔梗二兩萱草根四兩煎汁和蜜為丸每服三錢半隨意下湯批少陽主氣之時恰值少陰司天之令以主客言則為客勝主以君臣言則為君位臣方用扶陽配陰之法若不甚配乎者以其理木順耳釋此戊午年芒種後三日方也此章氣運與前章同而用藥迥不相侔者前症屬陽火之郁故用降火滋陽以解其鬱此症屬陰火之滯似宜滋陰益血以行其滯然而有難焉者右尺之真火不旺則滯者不得而通奈天符火盛之年陽火一起恐陰火挾其勢而為災此丹皮龜板菟絲所以監陽起石雲母而用之也左尺之真火不旺則陰血不能滋長少陰之君火無制奈少宮之濕土未退而太商之燥金將行濕熱不清恐土鬱而金氣不滋土鬱則火不下濟而上炎金不滋則火反食氣而內灼此澤瀉黃柏腹皮所以輔杜仲知母女貞而用之也至於萱草益母調經滋血不過用為治標之藥耳本方樞要反不在此範氏草六妊娠受濕肢體俱腫頭運惡寒嘔逆身重脈浮部滑中部郁濡案此乃肝經不得流暢所致也當先用末藥調之青木香五錢青皮錢半當歸二錢半蘇子一兩白芷一兩秦皮一兩秦艽一兩共為粗末分三次煎服釋此戊午年芒種後七日方也月建丁火司天又屬丁火火旺則木母之泄氣太甚故肝經不能行濕而成痰火旺恐天運之太商將至而不前而胃失傳宣之令也且木必得金氣以剪刈之而後乃發榮而滋長詩所謂修之平之攘之剔之者非其理之較著者耶服前方濕退腫消病者不復加意夏至候陰雨連旬偶因坐臥濕地前症復作更覺腹痛氣脹舌青面赤醫知為死胎當下用加味芎歸湯不效案此由脾經受濕而血滯也蓋脾統血者也血不歸陰則胎失所養非朝夕之故矣調之無益當用標本兼治之法以治脾之藥為主而以去惡之藥為用幸系藜藿之人元氣不弱可無害也桂心一錢瞿麥二錢龜板三錢肥牛膝三錢歸身三錢紅花一錢木香一錢制首烏錢半白朮錢半厚朴一錢朴硝一錢煎服一劑越二時死胎即下接用金匱腎氣湯合八珍湯重加丹元二參及酒炒麥冬粳米五劑而起釋此小暑前五日方也天運太商月建將交未土況有天符之火生之此戊己二土得令之時故就其勢而用之使血氣易於流暢而死胎乘勢而下矣火齊水化之年即此等症亦須顧此大旨方無後患桂心用以趨下朴硝正可監之龜板首烏滋陰保水天運地氣委曲周詳此所以指到春回也邵玉符記黃姓二十因夜行感風露而病病二三日忽大飢餒食飲數倍於常後即狂躁譫語耳聾目暗大小便閉尋衣摸床撮空理線面色赤黃脈形促代案此歲令月令相兼而成太陰火濕之疾其症謂之癃閉抑所謂閉者開之宜早用大汗之法可以變輕夫汗而曰大汗兼吐也今脈息促急正大閉之候奈豫適有京口之行今且酌用二劑後可令吾徒顧生藥田治之廣鬱金四錢酒炒香薷三錢香附三錢赤芍一錢鬼箭羽錢半豬苓錢半葛根錢半砂仁二錢緑豆粉錢半皮硝錢半蔞仁三錢日服一劑夜服一劑釋此戊午年大暑後八日方也八方虛風夜感最甚固不必盡在太乙遊宮之日也人犯一虛皆易致之汗之不早而歲令月令相挾而成膠固之疾矣此刻客運太商月建未土客氣屬太陰濕土主事火齊水化之年陰土因火而濕熱黏滯陽金遇火而鎔鑄堅實故有癃閉之象所謂初起可用吐法者太商屬庚金陽明之所主也陽明之戊土既開斯太陽之己土不至於大閉今既耽延而失事機只得清散陽明且為開導太陰之先聲耳太乙遊宮説見二卷後一日換方案藥田子曰此疾盤踞堅城不下將如藥田之非穰苴何只得仿先生之法而用之但病勢沉重外托難清將來恐不免於入里耳鬱金四錢蒼朮三錢厚朴錢半天南星錢半朴硝一錢木香一錢降香末一錢半夏錢半紅花八分生薑錢半竹瀝錢二露蜂房一錢茶清洗炙存性照上服二劑釋方仍前意只清金燥土之味較前覺力鋭耳按露蜂房色灰白而味甘平乃陽明金土之藥本胡蜂之津液結成又受霧露清涼之氣所以主治驚癇瘛瘲寒熱邪氣又薄膜空虛有似人之膈膜故能治皮裡膜外之邪為上焦清熱祛風之妙品世醫以其有毒而棄之獨不思周禮聚毒以供醫事者何謂也哉又不聞仲祖鱉甲煎圓已用之乎江成忠志服前方狂躁稍減案藥田子曰病有漸退之機只脾經之氣未舒故猶滯而未下達鬱金三錢砂仁錢半廣藿香三錢木香錢半夏枯草錢半木通一錢枳實二錢桔梗錢半香附子二錢熟軍錢半豬苓錢半澤瀉錢半蘆根三錢照上服三劑釋此方利氣去濕人所易曉惟夏枯草近時專用為肝經藥不知本經謂氣味辛寒稟金水之氣而內消堅積上清火熱又能使水氣上行環轉故與澤瀉木通同用使水氣上行以清其火而利其濕也後二日換方服前方覺胸肋微響而積滯究未下行案藥田子曰熱入胃經而三焦之火不能下濟濕滯過盛也生山梔二錢元胡粉錢半野荸薺粉二錢枳殼錢半藿香二錢天花粉三錢天冬三錢藝香二錢降香末錢半山萸肉錢半熟軍錢半柏子仁二錢大青葉三錢水菖蒲根錢半淡鹽水炒蘆根二錢照上服二劑釋火盛水衰之歲天地否塞之人未有不為後天之未濟者蓋火冒於上非降之所能下故用萸肉從少陽之木火以引之用甲木以化己土也又恐屢用寒峻有礙生生之氣故用柏實之甘平以除風濕而兼芳香醒脾之意備病愈之後土氣易復用藝香亦是此意兼有活血解毒之功也水菖蒲利濕開鬱功用頗捷但嫌走泄過甚故用微咸以制之但令散結而不致傷氣此皆師傳心法因體師心而不敢祕耳服前方積滯連下譫語間作遍身搔癢舌燥唇裂目黃脊痛脈洪長案藥田子曰得易潰之城而無可守之資如宋趙葵之入汴京然賊雖逸而主不能守招徠之功亦不易也且大賊雖逸而小腆不靖亦須剿除也生首烏四錢熟首烏二錢茯苓二錢黃芩二錢鮮生地三錢枳實錢半阿魏錢半石菖蒲錢半寒食麵三錢木通錢半生山梔錢半木賊一錢白茅根二錢大青葉二錢紫背浮萍三錢明雄一錢服三劑日一服釋太陰之濕熱非得太陽之水氣以滋之則裡熱無所泄非行太陽之正氣以照之則表濕無由清夫婦之義也但太陽之氣必藉腎經真水以養之而後黃赤二道運行乃歸乎常度此浮萍木賊所以隨首烏生地而用之也且木賊性能制木與大青黃芩俱兼平治少陽之意蓋火盛水衰之年相火易動前之養其勢以化己土之郁者權也今之平其氣以安戊土之位者經也經權得而用藥之能事過半矣余俱清理陽明之品而已利後覺渴欲飲水勉進焦米湯半盞尚未貪食案藥田子曰病愈矣天門冬三錢黃芩二錢黃柏二錢黃連五分麥門冬三錢硃砂六分研阿魏一錢白芍錢半青木香錢半當歸錢半川芎一錢蒼朮三錢陳香櫞八分稻根五錢陳蘿蔔櫻二錢釋此立秋日方也月建改屬申金合於天運之太商故藥用清陽明之燥火者為多陽明之火一清而金水之氣日益滋長斯泰交之象見而既濟之功成矣張氏草五感時令之氣舉家患痢此症因霍亂後多服陰陽水而成其勢尤重脈浮部數中部滯兩尺沉案萬物不畏陽火而畏陰火如雷火遇雨而熾今歲之謂矣況秋金喜潤而惡燥遇陰火則暗為銷爍其治大抵以潤燥降陰為主但天有節氣當知隨時變換人有體氣當知相勢轉移如此症則兼脾經濕滿矣赤芍錢半牡丹皮二錢澤瀉三錢蘇葉錢半紅花一錢豬苓二錢厚朴錢半廣木香錢半青蒿一錢砂仁八分瓦松三錢焙乾釋此戊午年白露前四日方也經云天氣不足地氣隨之地氣不足天氣從之本年天符火盛雖運交少羽氣在太陰之末而火氣暗煽真所謂陰火潛燃也陰火爍金甚於陽火中之者較常愈劇況因飲水過甚脾受濕邪金燥於上土濕於下最為棘手計惟有重用澤瀉瓦松使少羽之水氣上行以潤陽明之燥而散陽明之血也又換方陳皮二錢半夏錢半夏枯草錢半淨銀花三錢葛根三錢白茯苓三錢砂仁二錢土炒淡竹葉二錢白朮錢半澤瀉二錢當歸尾三錢木香錢半木通一錢柴胡八分青竹皮錢半釋此白露後四日方也月建改屬酉金而客氣值太陰少陽交代之時於易雷出地奮豫之象也亦即律書林鐘生太簇之義方用疏理太陰之味即寓清散少陽之意蓋少陽屬木火恐火運太過之年至此而復有銷爍酉金之患也周姓四十因患時痢而下血不止脈遲細而緩案脾土失守下克腎藏腎不交心也茯神四錢硃砂六分研龍眼肉二錢遠志肉三錢白朮二錢土炒黃耆一錢生杜仲三錢北五味二錢白芍二錢醋炒川文蛤三錢紫地丁錢半酒炒歸身二錢紅花炭一錢木瓜炭八分京墨七大匙磨汁亂髮一小團服六劑釋此戊午年寒露後八日方也癸水之運適值戊土之月戊癸相合理應化火以生土乃君火之氣稍弱而客氣少陽相火反挾其勢以上奪君權於是火上炎而土下陷水為土遏而手足少陰之氣不交矣為今之計惟有斂少羽之氣而助君主之威坎離既交而中宮得所安宅不重治相火而相火自不敢肆君明則臣良不誠然哉後六日換方前方去五倍子杜仲加公丁香一錢炮薑二錢茯苓錢半鬱金一錢服五劑再看釋靖戊土之氣於上培己土之氣於下也又六日換方案氣尚不能御血北五味三錢炒當歸三錢黃耆二錢白朮二錢土炒茯神三錢遠志二錢連翹心五分竹葉心八分砂仁六分炒川芎八分甘草六分秦艽一錢金狗脊錢二黑豆皮一錢百草霜一錢絹包煎藕節二錢釋心為血主脾為氣母心火不下降則血不歸脾而脾無所養血不歸脾則為相火所挾而妄行脾無所養則氣不能攝血而任其下注矣方內重用補心亦微兼清火之意故君主清寧而相臣不得而挾之更扶己土以制少羽之水則脾不受濕而攝血更覺有力至其重用北五味以助收攝之勢者非徒斂少陰之血而不使下泄亦以攝少陽之氣而不致上凌也此所以有立起沉疴之效歟喜子十二平日常起紅疹此時更覺身熱頭運衄血吐血脈細數而緊案此包絡之相火上凌肺金也相火藏於命門而寄用於脾胃二經肺為華蓋又心之舍也天下有臣亂而君寧者乎元參三錢丹參三錢桑寄生二錢黑料豆三錢黑芝麻四錢紫蘇葉錢半蘇木一錢桔梗錢半牡丹皮二錢知母一錢甘草八分白歸身三錢防風一錢茜草根錢半燈心一分童便一盞同煎服五劑釋此戊午年大寒前一日方也本年陽明在泉因天符火甚金氣失政又屆來歲太陰司天厥陰初氣之令月建醜土天之初運復值少宮己年為土運不及而司天助之亦得平氣此時土氣乘運乘月真金墓於醜土之中而手厥陰之相火乘時而灼肺庚辛同源此病發之所以較重於平日也方借冬令水旺之氣以制相火而涵金復借初氣之風木以疏土而出金金氣清寧而君主得位斯權臣屏迹不至有挾血妄動之虞矣癸亥厥陰司天中運少徵少陽在泉水兼火化左尺不應歲會初氣大寒交主厥陰客陽明二氣春分交主少陰客太陽三氣小滿交主少陽客厥陰四氣大暑交主太陰客少陰五氣秋分交主陽明客太陰終氣小雪交主太陽客少陽初運大寒交主太角客少徵二運春分後十三日交主少徵客太宮三運芒種後十日交主太宮客少商四運處暑後七日交主少商客太羽終運立冬後四日交主太羽客少角吉女十七經閉年餘飲食減少小腹痛引腰脊周身脈絡不利脈右寸微數余俱沉細案癸水起於督脈督脈陽氣不得固抱而孫絡俱受癥結主疲而輔亦壅耳黑豆皮二錢乳香三錢包煎老松節錢半砂仁二錢土炒面神麯三錢天花粉二錢青蒿二錢葛根錢二整木瓜一錢白朮二錢土炒陳皮一錢桑白皮二錢菟絲子二錢土炒升麻六分海桐皮二錢松子蓮肉焙黃各二錢為引服九劑釋此癸亥年立春前七日方也病非起於一朝原於此時節氣無干而用藥之道必推氣運者病因氣運而默為傳導經所謂必先歲氣無伐天和也壬戌癸亥在納音俱屬大海水水臟不足者運行多失其度蓋督脈者人身之赤道也督脈起於海底能運水之精氣上行腰脊因以滋養百脈今督脈失轉樞之令陽氣不能上行則陽脈不固而癸水又為月建之醜土所阻不能上滋陽明此所以宗筋不潤孫絡亦因之而結矣況本年水兼火化又有真陽下陷陰濕侵脾之患方用活血去濕調氣助陽之味為主佐以陽明升舉之藥又借司天之木氣以疏醜土之鬱而去其濕欲其清陽上行初氣陽明乃得傳布水穀之精華以潤宗筋也然孫絡之癥結究有木鬱之形故用海桐從陽明之金象通行十二經血分之凝滯以燥濕而去結真所謂體用兼到而理法一貫也哉服前方經絡少舒身痛大減但飲食未增月事不行如故案女子腹陽而背陰此時督脈陰分與陽任不交又值水旺之時水火之牡也火弱不能配水則受制於水耳亦深症也然卻以清土之濁氣養水之清氣為主酒炒白芍錢半醋炒白芍錢半生枳殼錢半麩炒枳殼錢半酒炒紅曲錢半土炒紅曲錢半穀芽錢半麥芽錢半香附錢半醋炒全當歸三錢酒浸土炒木通八分菟絲子一錢土炒鬱金二錢川楝子二錢殭蠶二錢原蠶砂二錢桑皮二錢白蔻仁八分服八劑用白者性陽而能去穢也自記釋此立春後十日方也水兼火化之年陰盛陽衰故凡癸水之濁陰有餘而壬水之清陽不足者己土每易於泥濘而戊土亦因之而難於散布方因客氣以清陽明因月建以舒甲木而復因司天之氣而理乙木者疏己土之氣即以泄癸水之濁清也蓋任脈行身之前所經多厥陰太陰之分故也方內重用紅曲當歸菟絲白蔻皆兼扶助少徵之氣使火旺而後不為水屈耳服前方飲食漸進滯血下行但覺陰虛微熱作渴喜冷案將來可用官方治之只此時要治氣而調溫涼之宜不然又恐舉之如燎原也然今之潮熱亦不過金木相爭之餘焰象如鑽燧耳枳殼三錢麩炒香附二錢半醋炒神麯三錢天花粉三錢青木香錢半元參三錢丹參三錢原蠶砂三錢桑白皮二錢海螵蛸一錢甘草一錢知母一錢地骨皮二錢桔梗一錢用新麥根陳麥稈為引引木氣之上升者也自注服十劑熱渴已除月峰子接用加味香附丸少加艾葉椒紅海桐皮調之愈釋此驚蟄後七日方也月建乙木併入司天之氣用事而初氣之陽明究未退令是以金木交爭久病逢之恆多變象蓋陽金多燥陰木易熇經云二火合併謂之陽明將來七日之後即交太陽二氣恐太陽之寒水無根而標熱併入火臟將難於措手方內重用丹元二參及花粉知母以清陽明之燥火待陽明退令太陽乘權之後則事機順手故但用官方調之自有破竹之勢按此方用知母元參乃一時權宜之法因有扶火之劑屢服於前而脈息稍有右關數大之形將來又欲滋腎扶陽以啓寒水於下故當此交會之間偶一用之以為送舊迎新之法所謂動靜翕闢互相倚伏也不然水兼火化之年陽虛火弱之症可輕用寒涼耶江成忠記鄭氏卅四腰疼腹痛寒戰不食精神散漫似寐非寐脈象沉細無力尺尤甚案論納甲則去今二年一氣其症居陰分水臟者為多顧於歲屬水而於時屬陽明於司天則又屬厥陰厥陰遇風則動而多躁遇火則鬱而多阻陽精入海中而云霧掩之計都為之蝕也偶一言及學者可以類推此症系水木二臟之疾牡蠣粉三錢煨益智三錢杜仲三錢蘇木二錢金石斛二錢青蒿二錢青木香錢半當歸四錢白芍三錢醋炒赤芍錢半鬱金錢半升麻八分服五劑後用歸脾湯治之愈釋此癸亥年雨水前五日方也火運不及水來兼化之年初氣陽明陷而未起因海水之寒氣過盛而司天之風木濕鬱不達於易風行水上其象為渙也幸而月建寅木天運少徵猶可借其氣以升舉陽明陽精出海而日月光華羅計無從與之爭道方用收攝之品以治陰之渙用升舉之味以防陽之陷真能撥雲霧而見青天也其效宜哉附録及門問癸亥清明節時令治法案此刻以五行衰旺而論至季春而木氣漸老火氣稍旺但君火為司天之氣所掩不能與太陽相配偶而太陽之功用不能上濟此時令之鬱於陰者然也大約宜養少陽而兼散厥陰使太陽能合於君火耳藥物如生地紫蘇梗葉薑皮杏仁桑蕊桃脂山梔桔梗神麯馬兜鈴榆赤皮樗白皮秦皮藕節橘葉之類皆可擇用而桃杏尤用事者佐其施用之權耳釋水兼火化之年離宮過弱不能合於客氣太陽而正向明之位亦因司天氣旺木盛火遏而中運不得令也藥用宣達太陽滋益少陰之味使之相濟卻借春令之木氣以剋土而生火則少陰得氣而太陽之標熱宣通不致為歲運之水氣所遏且不為月令之土氣所阻矣連姓十八少腹時疼醫以溫中逐寒導氣藥治之不效案其症系脾寒之疾脾主少腹之裡而司流布精液之氣精氣為寒所抑往往有此其致此者總由受寒後未曾服藥以條達之耳今用煎劑治之十服可漸愈神麯四錢黃柏一錢酒炒蒼耳子錢半廣鬱金二錢乾薑八分甘松八分當歸尾二錢半原蠶砂二錢丹參二錢雲母片五分蓮房二錢藕節二錢用黃柏者其味入少腹下焦其性滋潤故用為從治之引也所謂寒因寒用者也自記釋此癸亥年小滿後一日方也脾寒之疾似以理脾為安然厥陰司天巳火臨月運臨太宮不能兼顧即藥克對證效於何有此方以戊土乘令則用神麯鬱金以理之丙火當月則用黃柏雲母以清之氣行厥陰則用蓮房蠶砂蒼耳以制之又以水兼火化之年務以滋養心火為要則用歸尾丹參藕節以助之左顧右盼變化因心至於乾薑甘松不過用為脾經治標之使耳夫豈沾沾於理中湯討生活哉又換方案少腹乃脾之分也凡有積寒在少腹者恆難猝已土性緩且善藏故也今雖小愈宜仍用丸料調之石菖蒲兩半土炒歸尾三兩丹皮一兩黑芝麻二兩兔明砂兩半蓮房兩半煨砂仁一兩乾薑一兩甘松一兩紅花八錢海螵蛸六錢甘草節一兩用桑汁及煨薑汁和蜜為丸每服四錢甘草節煎湯下湯批本年水兼火化水盛考司天氣旺其不能生火者火運不及故也釋此芒種後十日方也少腹積寒之症水兼火化之年幸值月建丁火自當藉以為扶助火臟之用此重用菖蒲歸尾之意也但氣行厥陰司天之令不可不兼清包絡此用丹皮蓮房之意也天運換交少商不可不兼理辛金此用兔砂桑汁之意也足厥陰屬乙木與手厥陰屬丁火氣同而臟異不可不滋而養之此用紅花黑芝麻海螵蛸之意也脾土雖不乘時乃司天之妻而月建之子也故用標藥數味為使乾薑甘松砂仁是也按兔砂方書只用明目退翳及勞瘵殺蟲之用以其氣味辛平稟秋金光明肅清之氣故也本草又載明月丹一節蓋兔曰明視月之精光亦曰兔魄則是在天為太陰之精而於人為手太陰藏魄之處所用也諸書未言其理故附記於此以備參考江成忠記薛女十二平時小便不禁兩足小指忽然腫痛漸覺臭爛十餘日後脫落一節漸次至無名指及中指皆腫痛脫落一節而小指二節又脫落腫至足胕勢猶未止請醫診視俱云不治脈極沉微案此症感厥陰之氣而剋土濕土又因陽明之燥氣而濕反下注蓋釜氣不上蒸則流於釜底而薪為之蘊熱也流注久則浸潤為害矣且筋為木支骨為水支肉為土垣三者俱傷而後有此依經施治惟宜補水臟而用壯陽之味極陰之地不得日光則草木無生氣矣書此大意以後可令吾徒顧生及從遊李生兼治之石硫黃二錢甘草水煮二次益智仁二錢胡桃肉拌研炒鹿角膠三錢於朮三錢骨碎補錢半破故紙錢二川芎一錢升麻八分芙蓉葉三錢木香錢半麵煨龍骨六分乳香三錢枯礬六分此症要用牛黃鹿茸方好以難得真者權且服此只難猝效耳釋此癸亥年春分前五日方也厥陰司天之歲水兼火化之年月建卯木乙癸之氣過旺司天先期用事故有風木剋土之症厥陰不從標本從乎中氣少陽火氣素弱之人從化不能而木亦敗矣且陽明初氣用事已久土臟衰弱濕為燥逼以致濕氣下注更感初運少徵之氣蘊而為熱如積薪然蘊熱已久朽腐隨之總由日光不照之故所以全方俱重壯陽而惟用芙蓉葉之涼血止痛散熱消腫為使也三日後換方案藥田子曰大凡足三陰之脈俱絡踝而包指指既難包未知踝能絡否今仍用壯陽以攝陰之法參三七二錢於術三錢炒桂心錢半血餘炭三錢黃耆二錢當歸四錢酒炒川楝子二錢炒補骨脂錢半牛膝二錢續斷二錢半風子肉錢半芙蓉葉錢半枳實錢二人中白二錢人中黃二錢澤瀉錢半女貞子二錢熟地三錢製附子八分蘇木八分引用鼠婦八個白花商陸根錢半仍服四劑釋此春分前二日方也此與前方理法相同但用陰濕有毒之味為引欲其以類相從而至於極陰之地也此時二氣之太陽將交初氣之陽明尚留因其留而推之枳實不為猛也因其來而迎之澤瀉商陸不為泄也蓋寒水將至正可惜其氣以清熱但慮其過盛而助虐耳方內用藥二十餘味攻補兼施陰陽歧出而條分縷晰脈絡貫通非才大心細者不能辦此又換方案雲圖李子曰此時當兼用以土製水之法肉果一錢麵煨砂仁二錢麵煨丹參四錢白扁豆五錢炒焦杵黑豆五錢炒杵秦皮二錢土茯苓四錢風子肉二錢牛膝三錢熟地四錢炒杵元胡索錢半製附子一錢合歡皮錢半火麻根錢二白馬溺一大盅釋此春分後一日方也二氣太陽已交寒水之氣復加於下非重用土味以制之不可故此方大局皆主此意又重用丹參者借少徵之運以生土也前此非無耆術而不能專主剋水者以太陽未交故也又換方案藥田子曰風木司天之歲寒水主令之時其象為渙大約由陰屈於下而不能上騰此又群龍無首之義對參易數也履霜堅冰其所由來者漸矣龍骨二錢龍齒三錢五倍子一錢五味子三錢麵煨牡蠣粉三錢川楝子二錢黨參四錢澤瀉二錢赤苓二錢紅花八分肥牛膝二錢黃耆四錢黃精錢二益智仁三錢胡桃肉對拌蒸夜合子一錢大栗子四枚用豬腎一個同煮一炷香分三劑夜合子乃腎經溫斂之味疝氣方多用之自記湯批厥陰為東方青龍龍喜水而惡寒寒水氣盛故有盤蟄不安之象方內兩用龍品皆所以安厥陰也其用溫補脾氣斂水暖腎之品者土氣實則水不溢腎氣暖則寒自解矣釋此春分後六日方也用太陽寒水之味固宜而復多取少陰之味者所以配太陽而滋其源也此後七日當交太宮故重用參耆黃精以迎接金土之氣更疊用固澀之品使水氣不致外散將來可壘土以防之也又換方案雲圖子曰今堤岸有基矣卻用治標之物隨手拈來豬蹄筋八錢豬脊髓一條豆腐鍋巴一兩豬胰一塊火麻根五錢瓦楞子五錢瓦松一兩骨碎補二錢見腫消三錢狗脊二錢熟地五錢菟絲子三錢肉蓯蓉一錢益母膏二錢釋此清明前四日方也運交太宮氣屬太陽月建將近辰土雖曰治標大抵不離水土二臟者近是按瓦松入金土之分而去濕毒且有去瘀生新之用瓦楞子除堅結而消惡血火麻根治折傷而散滯血此方著力全在此等處不然與平補之劑何異哉王靈山志又換方釋藥田子曰前方用法甚好今用其意少加和血之味耳金狗脊二錢豬蹄尖一對牛膝三錢川椒錢半川楝子三錢風子肉三錢洋參錢二當歸四錢制首烏四錢白蒺藜二錢熟地四錢砂仁錢半土炒小茴香錢半香草二錢芙蓉葉三錢龍骨五錢血餘炭二錢釋此清明後四日方也月建換交辰土合於天運之太宮故方內多兼燥土之味乘運之旺以補人之不足也余用少陰之味以配客氣之太陽者欲其水火不相射乃和解之要法師長之心傳也按刺蒺藜色灰白而多刺乃陽明金土之藥按本經主治之文可見近世以為腎肺肝三經藥者誤矣別有沙苑蒺藜形似羊腎則兼滋益腎臟之用耳又香草一名省頭草芳香開胃醒脾和血乃古之澤蘭今肆中所謂澤蘭者不知何物全無香氣醫者習用不察殊覺可笑王靈山記又換方案雲圖子曰診之覺督脈稍貫此時正好滋養但腎氣未復而木氣泄精過甚宜用壯肝腎二經之法雄烏骨雞一隻骨薰杵肉另炙杵碎川烏七錢二分川楝子一兩八錢劉寄奴二兩蟹殼六十個藕節二兩五錢蚌殼二兩磨去粗皮雲母粉二兩四錢紅花五錢當歸二兩金狗脊二兩乳香三兩六錢鹿角膠一兩二錢火麻根六兩瓦松六兩桃膠一兩二錢上藥一料分六次煎服釋此穀雨前五日方也金土有基則水木之氣易憊右實則左虛也故方以壯水生木為主取血肉有情之物者味厚而力足也雞屬巽烏骨屬坎一物而兼水木之精功用最盛佐以川烏溫養臟腑而附骨之風寒濕痹可除矣其餘如寄奴蟹殼之續筋而散血皆治標之味而兼應月建之氣與司天之令者也又換方案藥田子曰餘生平醫此脫骨之症迄少成功大抵其人自慮不起而憂懼悲憤之心煎熬增劇耳此子幸喜年幼未雕其天但流濡其地耳豫意欲用胎羊骨最好但難於猝辦今且半用斂攝之味治之象皮五錢蝟皮五錢黃明膠三錢驢皮膠四錢烏梅肉四錢白槿皮五錢連根牛膝三錢黃耆四錢蜜炒文蛤三錢北五味三錢原熟地五錢歸身四錢土茯苓三錢劉寄奴三錢蟬脫蛇脫為引湯批證本濕因燥逼今仍用陽明斂攝之品者前則脾氣過陷燥逼則下注今則脾氣稍復燥斂則濕退也若謂藉其氣以制風水則誤矣釋此穀雨後一日方也辰土者良土也陽明之金土也前方用蟹殼而此方用象皮蝟皮皆有戟刺之形陽明之象也陽明主周身之大絡陽明之氣疏通而下行陰濕自消除而流注之患無矣其餘多收攝長養之味大陳收場有此巨觀開後人無限法門又換方案藥田子曰此症觀成可望矣語云病加於小愈戒之哉熟地五錢益智仁三錢煨白附子一錢炒甘松三錢狗脊二錢象皮二錢烏梅肉三錢制首烏二錢桑螵蛸三錢黑豆皮二錢龍骨二錢炮甲二分臭桐根二錢豬蹄甲一對釋此立夏前五日方也用固斂溫補之法以壯水而堅腎必用炮甲蹄甲為引方無浮泛之弊又換方案藥田子曰凡一切大症成功總須調養百日蓋十十者地數之終而天道小變之期也至於用藥不過乘時以盜天地之機耳種術三兩桑螵蛸四兩黃耆四兩蜜炒菟絲子三兩土炒補骨脂二兩骨碎補二兩狗脊二兩酒炒當歸二兩土炒五倍子兩半砂仁二兩炒甘草三兩炙陳香櫞一兩黃魚鰾十兩煎濃杵膠上為丸加童便十杯原醋十杯和入早晚服每服四五錢釋此立夏後五日方也運氣同前而月建改屬巳火方內桑螵蛸補骨脂黃魚鰾滋太陽之氣更加童便以引之所以應月令之丙火也蓋太陽本寒而標熱足太陽屬水手太陽屬火也又換方案顧生為豫言本三陰敗壞之症筋斷脈絶故費手至今今加意調之並可不致殘廢宜乘此火令以續三陰之敗氣且微參外治之藥不然恐日久更發也金狗脊三錢良薑一錢蓽澄茄錢二乳香三錢焦楂肉二錢沒藥二錢續斷三錢種白朮三錢土炒洋參一錢酒炒砂仁殼一錢炙甘草二錢白芍錢半酒炒肥牛膝三錢菟絲子一錢象皮六錢秦艽錢半牡蠣粉六錢服十劑可以住藥即十倍為丸與前丸間服亦可釋此小滿後一日方也太宮之運未退而厥陰司天之氣又至當此水兼火化之年得不慮木濕而腐土濕而泥乎非乘此丙火之月建溫養火氣將何以燥土之濕而令水氣得所長養哉按前方用藥頗重因其病在極下之地耳惟此輕重相間調理善後之方固不專於治下也王靈山記周女八歲遍身黑斑頭運身軟神情昏惑脈沉細無力案黑斑之症本不可治比紅紫者十倍此子蓋脾弱久矣故水不歸垣上乘金位而剋火也急須服藥以泄其外湯批前薛女案濕為燥逼而下注此雲水不歸垣上乘金位俱系先生創論而實有至理存焉讀者宜細會之黑羊血二錢延胡索三錢歸尾三錢花粉二錢蒲公英二錢升麻六分皮硝八分臭桐皮三錢赤柳皮二錢雄黃錢半紫地丁三錢荷葉一大個大貝母錢半甘草節錢半大青葉一錢釋此癸亥年大暑前四日方也氣交之分中運主之本年中運不及勝氣在水更值厥陰司天謝事客運之少商克之木弱不能生火而疏土而素患脾弱之人為水所乘而轉輸不靈而斑疹起矣脾與胃相為表裡故方中以疏里脾胃之味為君以條暢厥陰之味為臣以清散少商辛金之味為使而其大要總歸於扶火而抑水蓋羊為火畜而血為心主用黑色者從其類也佐以歸尾雄黃助丁火以解癸水之毒耳後二日換方案此時當兼泄其內毒矣黑羊血錢半紅花八分歸尾三錢紫地丁三錢海桐皮錢半鬼箭羽錢二滑石二錢石膏一錢元明粉錢二人中黃二錢丹皮二錢赤芍一錢夏枯草錢半五穀蟲一錢大青葉二錢青荷葉一個釋此方大意與前方相似但加入金體之味以清理陽明耳後二日換方案內毒未消須更泄之瓜蔞仁三錢陳萊蔔二錢豬苓二錢當歸三錢炒芝麻二錢淡豆豉錢半槐花二錢紅曲二錢阿魏錢半紫花地丁二錢地榆一錢枳殼一錢甘草一錢新靛花三錢青稻葉三錢釋節屆大暑地氣改屬少陰君火少陽在泉之氣與中運為同歲會似乎較前節為順但勝氣在水則復氣在土且邪水上越之人無有不虧真水者故平土之中即兼滋水之意也後二日換方案清理陽明之毒卻宜兼用滋陰之味烏犀角八分磨鬱金錢二紅曲二錢土炒熟軍三錢葛根粉二錢丹皮二錢澤瀉二錢生首烏二錢熟首烏二錢香薷二錢藕節三錢竹茹錢半絲瓜藤葉共三錢釋餘毒濡滯於陽明之分而方兼瀉太陰者陽明從乎中氣燥從濕化之義也但症本由陰虛而起又值復氣太盛脈氣反虛而重泄其陰恐致變生他症故用滋陰之味以堅之而用犀角藕節以散結清熱又恰好兼顧少陰也後二日換方案此時則以理陰為主矣制首烏三錢鱉甲三錢茯苓錢半女貞子三錢歸身四錢酒炒白芍錢半炒川芎錢二黑豆皮錢半生薑錢半乾薑八分紅花一錢藕節二錢貝母一錢茯苓錢半乳蒸釋土為少陰之子木為少陰之母自宜以理陰為主令陽明之氣未復則少陰之水失其化源少陰之火失所哺育恐胃陽未舒而經脈乏滋長之樂耳故此方兼養金土之氣並滋水氣也後三日換方案此時榮清而衛不歸脾也調理後段所繫不淺煨木香錢二砂仁錢半麵煨白扁豆三錢炒楂肉三錢嫩黃耆二錢焦白朮三錢澤瀉二錢丹皮二錢甘草八分車前子二錢赤芍一錢紅花六分龜板二錢煅研荷莖陳佛手為引釋症本由脾弱而起故收場仍從月建為歸根之路至於用紅花龜板注重少陰固為時令所當然而實為補母之常法也按此症治法難在前三節泄外泄內層次井然卻無強期速效之意而動中肯綮自然迎刃而解神乎技矣江成忠記袁女十六從春分節起覺有寒積腹痛之疾大暑後更兼牝瘧脈寸口洪大余沉澀案其經屬肝木木氣因感太陽寒水之氣而本根先結幸此時太陽之標尚達其結者太陽之本也若不早治恐成痰飲更難治療矣烏藥錢半煨砂仁二錢煨木香一錢橘核一錢橘皮二錢伏乾薑七分蒼朮二錢白芥子二錢炒海桐皮一錢香附一錢炒夜合子二錢橘葉為引釋此癸亥年大暑後十日方也此時雖屬地氣少陰主事而病卻起於客氣太陽之時木為水淹火絶化源而土氣愈寒在泉少陽之氣為寒水所隔不能上合少陰故見症如此太陽本寒而標陽中見少陰今少陰之脈未病則中氣與標不隔尚為易治病本由於太陽而用木香乾薑卻屬足太陰借月建之未土以制之也芥子橘皮又屬手太陰借天運之少商以養之也凡此皆欲以太陰配太陽也又換方案藥田子曰凡病原在下焦者其症沉澀以太陽陽明為表裡耳宜用溫散之劑微帶清痰之法神麯三錢紅花八分白蔻仁五分石菖蒲一錢酒炒烏藥二錢蒲公英錢半縮砂仁一錢連殼青皮錢二青木香一錢白蒺藜一錢瓦松一錢竹茹八分威靈仙一錢烏賊骨八分釋此立秋後十日方也太陽在外陽明在內固為表裡陽明在中太陽在下亦為表裡又值月建改屬申金故宜換用陽明之味但少陰究系主令之經故用神麯紅花引其氣以下交於少陽少陽為在泉之主故用青皮靈仙青木香借其氣以上交於少陰陰陽交而君相二火可以相須為用太陽亦為陽土所制化不得主持於中矣少用烏賊以為下焦引經之用則又精密之至也魯女十五瘧疾月餘服瘧疾門諸方不愈脈沉細而滑案藥田子曰膜原有風痰而陽明之轉輸失度此格陰之症宜開導其氣黃連六分乾薑八分白茯苓二錢白茯神二錢天南星二錢秦艽錢半寒食麵三錢澤瀉二錢丹皮一錢炒枳殼二錢淡豆豉錢半麥芽三錢薤白一錢天花粉一錢滑石二錢淡竹葉錢半釋此癸亥年處暑前二日方也在泉與間氣本為一體奈為月建之申金及天運之少商所阻又時值陰霾金氣壅滯而生痰以致少陰不能下濟而少陽不能上達方內不用青皮黃芩而用麥芽秦艽所以養少陽之氣也後半月換方案雲圖子曰濕盛陽虛之象用顧翁之法而小變其味可矣威靈仙二錢寒食麵二錢肉果一錢煨杏仁錢半海桐皮錢半木香一錢木瓜錢半桔梗一錢海螵蛸八分澤瀉一錢秦艽錢半甘遂六分石菖蒲一錢水菖蒲一錢釋節近白露天運換交太羽少陽未達而水氣復增勢於下此時非燥土不足以制水非抑陰不足以助陽瘧後肢體浮腫案藥田子曰土不制水太陽之邪水妄行而真水之源轉涸痰壅氣滯血不歸垣也乾薑錢二炒紅曲一錢桑寄生一錢肉蓯蓉一錢煨韭菜子一錢炒菟絲子錢半炒當歸二錢焦術二錢白芍二錢酒炒半夏二錢薑汁炒原蠶砂二錢炒地骨皮二錢鮮藕節二個鮮合歡皮二錢鮮橙樹皮二錢鮮橘樹皮二錢合歡能走孫絡橘皮能快氣橙皮則行氣而微涼也自記釋月建酉金天運大羽金寒水冷相比而成寒水之邪以致少陰少陽之火氣不能相合總由火運不及水氣太勝土氣來復泄精過甚少陽之火不能生之少陽之木不能疏之也故以扶木生火之味為本而以扶土製水之味為佐其不重用制水者恐傷真水也且此症之腫本由陽虛痰壅而生濕前方抑陰以助陽此方壯陽以法陰用藥之妙言之難盡讀書者其善會之劉氏三十三猝然心腹絞痛用萬應丹及陰陽水不效勢愈危急脈伏案藥田子曰陽明燥金鬱熱之氣逼之不得轉輸也急用地漿水一碗大戟末一錢麝香二釐和入先服再用淡豆豉一錢牛膝一錢桂枝八分炒茯苓二錢生茯苓二錢黃連六分川芎錢二甜葶藶七分陳皮錢半桔梗一錢當歸尾三錢青木香一錢蚯蚓泥攪水煎服二劑釋此癸亥年處暑後五日方也月建申金天運在少商太羽之交申金屬陽明水穀之海也少商屬肺金諸臟之華蓋也乃客氣之君火與天運將交之壬水兩相激射交戰於胃陽之分而成此症方以調停水火為本而以和暢庚辛為標此所以有起死回生之效也後一日換方案藥田子曰此時須開導鬱結不可峻下恐成結胸也藿香梗二錢鬱金錢二瓜蔞仁三錢紅曲二錢酒炒蜣螂一枚去足炒豬苓二錢人中黃錢半麥芽錢半炒茯苓錢半鬼箭羽錢半木通一錢條黃芩二錢香薷二錢酒炒葛根一錢生薑汁半杯和入釋此方開導陽明之味較多而云不可峻下者蓋邪在陽明之表者未清也醫之魯莽欲速者觀此當知所警矣後一日換方案藥田子曰此卻可用消散矣若云大下猶未離中焦之分也廣藿香三錢烏藥錢半青皮一錢瓜蔞仁三錢澤瀉三錢丹皮二錢薤白二錢茯苓皮三錢紅曲二錢酒炒天花粉二錢甘草八分青木香一錢阿魏一錢大青二錢竹茹二錢皮硝錢二一劑後加四分釋此時天運全屬太羽而少商之運退盡故方內但以庚金為主而不復兼顧辛金也觀此可以悟醫律之細後四日換方案雲圖子曰此時覺陽明漸解但內熱未退宜用五苓散加減治之白茯苓三錢赤茯苓二錢官桂錢三茵陳錢半焦白朮二錢當歸三錢萊蔔子三錢木香錢二大黃二錢酒焙枳殼二錢炒白蘇子錢二黑芝麻五錢韭菜汁五匙釋此白露前五日方也陽明之表漸解而後兼用利濕降氣潤滑之味下之表無下陷之虞里無留滯之患矣後用此方加炒山梔子二錢半條黃芩二錢官桂減半又服數劑痊蘇姓草八瘧久不愈脈左弦滑右關遲軟案藥田子曰此陰分有虧脾經亦多滯氣而陽明轉輸無權也服藥四五帖瘧愈之後仍宜服調榮之劑方無後患草果錢半麵煨鱉甲二錢醋炒白當歸三錢天南星八分白芍二錢枯礬八分女貞子錢半炒桑白皮二錢龜板二錢半醋煅白芷八分炒澤瀉三錢原蠶砂二錢車前子二錢酒焙黑鉛一塊用黑鉛者取其鎮腎不使上助肝力也自記釋此癸亥年春分前一日方也客氣當少陰之末而太陰已交未至而至來氣有餘也又值脾濕生痰之症少陰氣弱不能主之而土氣愈滯方用養火之味為主所以補少陰之不及也少陰之火必得少陰之水以相濟然水氣愈滋反足以助木而浸土故方內既用利濕之味以祛邪水而復用黑鉛以鎮壓真水也石姓卅五先天本弱因讀書攻苦人事拂意春間偶患咽痛之疾不甚經意入夏漸覺腰脅肩脊俱痛日晡潮熱頭運身疲並咯血數口脈細濡案此少陰久泄其精而力不足以生濕土故燥金受爍也柏子仁二錢棗仁二錢甘草一錢紫蘇梗錢二茯神錢半蓮房二錢蘿蔔櫻錢半陳黑豆皮錢半黑芝麻錢半鬱金錢半麥芽二錢炒棕櫚灰八分瓜蔞皮錢二橄欖核燈心為引服八劑釋此癸亥年小暑前二日方也五運之中惟少陰不司氣化蓋君火以明相火以位天君泰然而百體從令也君火不戢之人適當火運不及之歲又值午火未土之交病焉得不劇方用扶火生土為本而卻兼用陽明之味者以此疾感於本年之初氣也至天運之少商只用鬱金蘇梗以靜之客氣之風木亦只用麥芽橄欖以清之可耳又換方案真水不濟真火而無根之火因不足以燥濕土而以類相從則燥土受其病矣此時可服煎劑五六帖先治其標後當用丸以壯其水也蒼朮二錢泔浸厚朴錢半薑汁炒縮砂蜜一錢連殼紫地丁二錢甘菊八分紅花六分麥門冬三錢酒炒黑豆皮二錢黃連五分吳萸水炒薑皮一錢桑皮錢二水紅花錢二鮮蒲公英錢二紅黃雞冠花錢半釋此癸亥年立秋後十日方也客氣少陰主事而方用平胃之味為主者因病起於陽明月建又值申金也少陰君火為主治之本況兼客氣相乘自宜疏其源而節其流少商又為生水之母故用辛涼以降之導之使生水蓋真水不足非一時所能滋養當此金令之時適有天機可盜明眼人豈肯放過又換方案此疾因陰分有虧遇太陽陽明之氣不相配偶故轉關而上焦之氣分多郁上焦如霧之氣既阻斯下焦如瀆之水無以濟其原耳此時須開導陽明使之傳送有度丸待再診可也丹參二錢酒炒柏子仁二錢乾薑八分砂仁殼一錢白茯苓二錢川芎二錢赤芍錢半萊蔔子錢二炒蒲公英二錢甘草八分鬱金一錢麥門冬二錢酒炒甘菊八分蘇梗八分桑汁一錢生和釋此處暑後五日方也少陰虧則不能與二氣太陽相配太陰虧則不能與初氣陽明相遇故疾留滯至今方以滋養少陰扶助太陰為本而以開導陽明為用若於太陽不甚經意者陽明之傳送有度有以清水之化源而太陽自無泛溢枯竭之患矣至於疏土以通金水相生之路則又審乎少商太羽接換之運而為之者也又換方案此時可權用煎方數帖丸成即止可也鉤藤三錢蜜炒松節錢半川楝子錢半香附米錢半炒川芎二錢整木瓜一錢細生地二錢元參一錢澤瀉一錢乳香二錢包煎炙甘草二錢忍冬藤二錢瓦松一錢炙丸蘭三錢又丸方水獺骨四兩熟地三兩女貞子三兩木通一兩地膚子二兩酒炒杜仲一兩酒炒又杜仲一兩鹽炒紅花八錢貝母一兩車前子一兩炒旱蓮草二兩花生二兩淨肉海桐皮一兩絲瓜瓤一枚燒存性研益智胡桃肉對杵蒸曬共四兩甘草水和蜜煉為丸每服五錢甘菊湯下後可用野菊湯下獺水畜也水中生陽之味或熬膏或酒炙俱可如獺骨一時未得可先用烏骨公雞水中悶殺取其骨和鱉甲末薰干只可配為半料終不若獺之陽獸而陰居耳釋此白露前三日方也月建客氣如前惟天運專屬太羽為少異前方以疏肝去濕為主丸方卻以壯水為主而復以去濕為佐者少陽在泉又值同歲會之年中運之火轉弱為強非壯水不足以制火而太羽之水又為陽明戊土所深惡故惟扶正去邪並行不悖之法為宜然水之制火制其飛越耳至於真陽一點乃太極之根生生之本卻又不可不培養收藏於命門之內也妙哉胡桃之和益智也以扶助木火之體而寓固斂收藏之用此所以水滋於上火潛於下轉瞬而成既濟之功也前丸半料服換用獺骨尚未制就停藥數日潮熱之疾又作案藥田子曰火上浮而不能生土宜滋降之可用半表半裡之劑細生地二錢女貞子二錢珍珠五分蓮心六分黃芩八分丹皮錢半白茯神二錢五味子錢半棗仁二錢炒白芍二錢醋炒黑芝麻五錢茜草錢半鉤藤二錢蜜炒藕汁一小杯地骨皮三錢鮮蓮房一個釋此秋分後四日方也月建酉金天運太羽客氣初交太陰太陰以火為母火氣上騰斯太陰失所養而酉金受其爍此潮熱之所以作也方以養火斂火為主而以清火為用清之於上而養之斂之於下凡以導之生土爾至於保酉金益壬水兼顧無遺尤見才愈大者心愈細又換方案藥田子曰此時將近全陰卻須用藥補得根株好則苗自肥也益母膏三錢黃明膠二錢阿膠三錢蝟皮二錢原蠶砂二錢海浮石錢二茯苓六錢黃柏二錢酒炒生甘草一錢炙草一錢生白朮錢半砂仁八分煨澤瀉二錢丹皮錢半柏樹脂一錢地骨皮二錢鮮橘葉六片釋此立冬後一日方也月建亥水天運值太羽少角之交客氣仍在太陰之末水歸冬旺而客氣屬土用調補藥以水土二臟為主人所易知但少陽相火在泉而少角之木氣早來相引恐致木火上浮之患故豫用黃柏阿膠柏脂以靜之蠶砂以平之蝟皮海石以制之所以防微而杜漸者密矣又換方案藥田子曰此疾究因水臟有欠故當此陰極陽長之時而水道未得上濟郁盤不暢無所發舒今一陽生已二候飛灰已至中管陽欲動而未遂其萌宜用升陽清輕之品柴胡六分醋炒半夏錢半薑汁炒麻黃四分蜜炙煨木香一錢生木香五分升麻六分酒炒通草五分地骨皮一錢白朮四錢酒土各半炒茯苓二錢知母錢二酒浸炒橘紅二錢炒黃柏錢二酒浸炒黑芝麻二錢釋此小寒前三日方也水氣雖旺於冬而當子醜之交土氣閉塞水氣亦伏藏於極下天運之少角復助在泉之少陽以相煽而水中真陽幾不復遂其發舒之力矣方用柴胡半夏以清少陽人所易曉至於用麻黃升麻以達其表知母黃柏以殺其威木香白朮以養其源通草橘紅以泄其氣凡此皆所以助水土之力而引真陽也聖智巧力不可思議非天資高而學力到者未許輕易效顰也陳氏草一難産三日交骨不開奄奄一息服催胎藥不效案藥田子曰血氣大虧胞絡受傷而腎經之啓閉不司也山羊血六錢馬兜鈴四錢鬱金三錢桔梗二錢龜板三個醋炙黃當歸一兩川芎五錢肉桂心二錢原麝一分瞿麥三錢蛤蚧一錢用豬脊髓羊腰子煎汁代水濃煎頻服可也釋此癸亥年小雪後六日方也運當少角氣屬少陽在泉主事天地運氣皆屬木火月建雖在亥水而當收藏之際難於流布故在地之水不能上通於天而在天之氣亦不能下交於水木火焰盛水天氣阻涸可立待水愈涸則木愈燥故重用羊血以滋木氣而以鬱金兜鈴降天氣以下交於水以桂心啓水氣以上交於天天漢為水之真源水氣通而舟無陸行之患矣復加蛤蚧以助腎力此藥之所以為靈也余則常用之味方書論之詳矣前藥服後逾時即娩但覺寒熱腹痛不止案雲圖子曰陰絡久傷之症此時卻要滋養帶脈亦官治法也前方斂陰之中加以壯陽小味所謂先天一點也吾亦仿而用之瓜血竭六分桃仁一錢澤蘭葉八分龜板四錢酒炙黑料豆五錢酒炒菟絲子二錢酒炒杜仲三錢酒炒青蒿八分枳殼錢半土炒歸身三錢土炒肉蓯蓉八分包煨釋此既娩三日後方也李子云仿而用之者肉蓯蓉是也唐姓卅八因大暑後遠行久勞心力歸後漸覺發熱昏惑神倦不食日益危劇脈細濡而數案雲圖子曰真陰不守而虛火上冒也冬青子三錢龜板三錢醋煅黑豆皮三錢陳皮二錢法半夏二錢砂仁錢二蘇木二錢白茯苓三錢甘草八分桔梗錢半地骨皮三錢合歡皮三錢歸尾二錢鬱金錢半酒炒此時肺金不和太陰之氣不得下泄也太陰雖在上而分野卻屬少腹此方服三劑倘太陰少泄可加用前三味再服二劑釋此癸亥年立冬前五日方也真陰漏越之人當太陰主氣之時水火不濟不能生土病根已伏今值太陰間氣主事故土日益郁其所以不用奪法者母氣虛也太陰之土既郁則太陰之金無根邪盛正虛幾難措手計惟有先顧本根略兼疏土之意以為將來攻戰之基耳後五日換方案雲圖子曰脈變浮滑此痰起而氣上壅也蓋太陰之濕邪結滯已久鬱極生痰吾早已見及故先用補陰為主微兼開導之味使至陰之地庶幾有餘明耳今雖陰氣漸達而脾土濕熱交爭心經火原不化也棗仁二錢茯神二錢半天南星一錢黑芝麻四錢貝母一錢元參二錢原蠶砂一錢石菖蒲一錢金叉一支同煎麥冬二錢天冬二錢二味另煎和入釋此方益土之源兼治痰熱又用蠶砂金叉以防木氣者恐天運將交少角引動在泉之相火也二冬用另煎者借時令之水氣以通天一地六生成之源耳蓋此時月建換交亥水與天運之太羽相合迎其機以導之使得流通充滿將來清之利之乃無渴竭之虞也服前方一帖痰壅氣塞斷續一線案顧子曰邪入陰分其勢急矣藥雖難入且徐徐潤之待有轉機再為易之鬼箭羽二錢茯苓四錢澤瀉二錢旋覆花八分石菖蒲一錢木香一錢煨肉果三分川芎錢二硃砂二分柏子仁二錢丹參二錢威靈仙錢二金汁半杯和入釋此症若出他後必致忙亂妄投劫劑終歸無益看此方標本飭然好整以暇惟其知之明是以處之當然不足為淺見者道也後一日換方案顧子曰脾經濕熱不能散布幸有滋陰之劑在前雖上焦為火所爍猶不至於枯竭耳白蘇子二錢旋覆花一錢豬苓二錢蓮房一錢川貝母三錢赭石一錢煅竹瀝竹茹為引釋除痰利濕兼用旋覆代赭雖系治標然非有治本之劑在前何能投之立應乎後一日換方釋雪山朱子曰心經之虛火爍肺此時上焦之火尚未注於肝脾二經也宜仍用前意連翹心錢半蓮心三分柏子仁二錢槐花一錢貝母二錢瓜蔞仁四錢紫大戟六分琥珀八分澤瀉二錢豬苓二錢人中白二錢車前子錢二用雪水一杯入煎又半杯和服緊服二劑後去人中白加茯苓四錢赤茯苓二錢桔梗八分元參錢二再服二劑釋此方以清降心火為本而以除痰去濕為用步伍既定攻守由己蓋至此而已有必勝之形矣後一日換方案雲圖子曰心神不守其病本劇心之於人大矣哉幸海底日光尚有一線透耳其症下虛而上實虛則不足以制火實則不足以滋水故成否象今卻稍有頭緒矣黃連五分黃柏一錢炮山甲六分天南星錢半甘遂四分微浸去水元參三錢丹皮二錢女貞子三錢酒炒澤瀉二錢茯苓三錢車前子錢半廣藿香錢二松節三錢側柏葉為引雪水小半杯蘿蔔汁小半杯俱和入二大劑分四次服釋此立冬後四日方也天運換交少角故用炮甲丹皮以應厥陰其餘大意同前但攻痰之味較重亦因本根漸固可免投鼠忌器之患也又戌土之月建雖過而胃為脾之門戶太陰之痰上逆不得不兼用胃藥以平之至於行水而兼壯水則借月建之亥水以為用耳二日後換方案雲圖子曰此時上焦已經清散但肝脾尚有滯機蓋三陰傳遍之症也今卻可靜以養之且清金氣也滑石三錢茯苓三錢黑豆皮三錢黑芝麻四錢青皮錢半蒲公英二錢澤瀉二錢牡丹皮二錢知母二錢萊蔔子三錢炒佛果金四張野菊花煎湯代水紅絲綿及竹茹為引釋曰三陰者病本起於少陰今直地氣之太陰又適交天運之少角也少角屬乙木厥陰之所應也曰且清金氣者金為木之官為土之子而又為水之母也二日後換方案雲圖子曰飲食入脾濕熱又動自然之理也大青四錢霜桑葉三錢代赭石三錢枯礬一錢炒山梔二錢白茯苓三錢黃連五分蒼朮二錢厚朴二錢整木瓜錢二不切黑鉛四錢整塊青蒿蟲十五條釋此方兼用鎮法蓋濕熱之動非獨脾火使然乃乙木之根株不實易於浮動而生火況少陽為在泉之氣又同歲會遇天運之少角煽動其機遂有山木自焚之勢計惟有鎮靜之而已不獨黑鉛赭石為然即大青黃連蒿蟲皆此意也兼用平胃者治形症之標疾也三日後換方案雲圖子曰邪之所湊其里必虛宜補瀉兼施也黑芝麻八錢細生地四錢生熟首烏各二錢家赤豆錢半瓜蔞霜二錢丹參錢二茯苓三錢柏子霜二錢石菖蒲二錢滑石二錢丹皮二錢細銅絲三錢燒紅醋淬杵碎此名銅花用鎮木氣也自記釋大局收場仍歸初次用方之意所謂百變而不離其宗也宋姓卅一三日瘧脈象關弦澀尺虛大秦顧子曰水氣欠涵濡之妙冬不藏陽之疾也白芍錢半黃柏錢半酒炒知母錢半酒炒黑豆皮二錢枳殼二錢縮砂仁八分麵煨木香八分麵煨當歸二錢川芎八分秦艽一錢薑皮五分藕汁八匙釋此癸亥年冬至前五日方也客運少角在泉少陽運氣屬於木火總由月建之子水不旺不能制火而滋木故木火浮燥以致陽氣不能伏藏於下下寒上熱陰陽相爭此瘧之所以間發也開手用方且為調和血氣分理陰陽卻兼滋水和木之意以治其本又換方案顧子曰此時可略加制陰之品使內有所攝耳秦艽錢半鬱金錢二白茯苓二錢制首烏三錢元參二錢丹參二錢白歸身二錢大腹皮二錢升麻六分炒桔梗一錢陳皮白八分霜桑葉錢二木通八分熟軍錢半通草四分竹葉十片釋此冬至後四日方也火年火運謂同歲會更兼木氣侮土之令而火有不爍金者乎故前方香砂以理土此則用鬱金通草桑葉以清辛金復用熟軍以條庚金之陰濁仍兼升麻桔梗橙白以開提胃中清陽之氣用庚辛以制甲乙之義也又肺為心之華蓋心火因相火而煽動則肺金恐有切近之災故用丹參木通以降之云使內有所攝者金氣司清肅之令金氣盛則木自攝藏也又換方案雲圖子曰血分有滯而邪之所湊其里必虛且血陰類也血滯故陰氣不受攝於陽耳麻黃七分去節蜜炒桂枝一錢黃芩二錢半桃仁十五粒去皮尖炙甘草三錢當歸二錢獨活一錢白茯苓二錢酒炒桔梗錢二威靈仙二錢鱉甲二錢酒炙生薑三大片釋此小寒前六日方也經云氣之早晏差凡三十度大寒日交來年初氣距今只二十一度故次年甲子初氣太陽為月建子水所引動而先時早至未至而至來氣有餘是不可不迎其機而急散之也又乙為陰木甲為陽木乙木主血甲木主氣血分有滯而氣分不足以運之所以間隔而成瘧治法合前方觀之先土而後木先氣而後血細針密縷層次井然非鈔胥家所能望其項背又換方案雲圖子曰此時尚覺血燥而金不能潤之也但以滋養血分為主方用桃仁黃芩甘草仍照前外加煨木香一錢川山甲七分薑汁炮茯神二錢棗仁錢二鬱金錢二酒炒瓜蔞霜錢二青皮一錢半夏二錢薑汁炒澤瀉二錢鑿頭木一錢釋此小寒前一日方也月建將交醜土土氣不暢宜急疏之但己土以君火為母且少陰與太陽相表裡太陽之氣方至而少陰不配故用茯神棗仁以養心氣心藏血而脾統血疏土養心皆所以養血也又換方案顧子曰榮氣不充於衛府總由脾經血滯而然今仍用理脾暖土之劑以攝之可也況連日陰氣頗重更宜以陽味攝之煨肉果錢二煨木香錢二杜仲三錢丹參二錢酒炒當歸二錢桔梗二錢獨活錢半大腹子一錢酒浸炒陳皮二錢蒼朮錢半厚朴一錢薑汁炒粉甘草六分紅花七分煨薑一大片釋此小寒後六日方也火氣安於釜底自能助脾胃之運用而無燥烈之患故用從治之法以攝之然亦因乎在泉少陽之氣先時而退來年太陽之氣先時而至又值天時之陰雨故立方如此後人能從此悟通變之法則靈機所觸妙應無窮矣又換方案顧子曰經滯於陰則近於寒非真寒也然陰霾之氣必得太陽以消之而太陽起於極陰之地故海水極深之處而日出焉此時太陽主令自當以培水為要肉果錢半麵煨木香一錢麵煨製附子一錢白乾薑八分煨砂仁一錢橘紅錢半半夏三錢當歸身四錢酒炒老松節二錢紫蘇八分桔梗八分海桐皮二錢麥冬三錢酒炒桃膠錢二梅蕊十粒東壁敗螺一錢釋此大寒前三日方也天運將交太宮地氣將交太陽太宮屬戊土而太陽屬壬水故方以水土二臟主治而戊土壬水尤致意焉太陽本系寒水水中之真陽不起則陰霾愈甚故方以培補真陽為主或謂麥冬半夏壁螺知為戊土之品松節海桐與太陽何干不知納音甲子為海中之金松與海桐稟寒水之氣復具堅剛戟刺之象非所謂海中之金耶而寧非太陽之藥耶至更用梅桃以引木氣則又因初氣厥陰土氣萌芽已動不可不於寒水之中預為提摯也吳姓卅二兩目腫痛日久失明脈緊數案顧子曰肝風久郁而未發泄其毒有未易言痊者此刻只宜清肝風而風極則火盛卻又宜清散其火沙蒺藜錢半刺蒺藜錢二木賊一錢皮硝錢半石決明二錢草決明一錢黃連五分蘇子三錢炒夜明砂三錢霜桑葉二錢黑芝麻三錢蒼耳根甘菊根為引外治用皮硝木賊少加雲母煎湯頻洗可以去翳釋此癸亥年小寒前六日方也天運少角在泉少陽主事目為肝竅當木火氣盛之時而山木有自焚之患理之常也方用金水之氣以清之亦法之常也蓋木火之疾恰當木火之時故用法如此謂目疾之症不論脈色節氣俱可準此則又非耳後五日換方案顧子曰此時孤陽無主水氣太泛孤陽亦隨之蕩然矣辛夷細辛細生地山羊血當歸紅花淨銀花白甘菊通草廣藿香烏藥木香釋月建交醜自宜加入芳香之味以舒己土而使為子水之垣蓋土氣舒則木得所託水氣垣則目得所養又目雖屬木而珠屬金瞳屬水乃陽光之發現也水中之真陽不足則木氣無光金氣之光明不透則雲翳障之此用方之大意也掃去眼科熟套而按時立法變而不失其常學者宜熟玩焉又換方案顧子曰肝經鬱火總由水道之流濁耳一時不能猝清然乘此太陽漸起之時光明尚可借用皮硝三錢蘇枝一錢人中白二錢半酒煅木通一錢人中黃錢半澤瀉一錢黃連七分酒炒白蒺藜二錢川芎錢半桔梗八分原蠶砂二錢兔明砂三錢地榆一錢甘菊二錢釋此大寒前二日方也天運將交太宮客氣亦換次年太陽之氣故方以朴硝為君蘇枝澤瀉為臣以清太陽之氣川芎味辛氣香合於太宮金土而能上行頭目以搜遊風余仍清木之味以症本起於木令也後七日換方案顧子曰雖系火燥而傷釜上之水究之木氣殊郁甚矣用散以治之取走上焦也當歸兩半白蒺藜二兩海浮石一兩海藻一兩海螵蛸八錢川芎八錢紅花五錢白茯苓二兩黑豆皮一兩丹參三兩紫地丁一兩青鹽五錢人中黃八錢知母一兩黃柏一兩兔明砂三兩柴胡八錢通草錢半原蠶砂二兩豭鼠糞一兩桔梗八錢獨活八錢共為末每服六錢海石三味取其得海中寒水之氣也三砂泛治亦清水中之鬱火耳用鼠矢亦清木氣而滋水也自記釋先生自注第言三者為太陽之味愚意朴硝青鹽亦是此意蓋海中金氣兼合來年納音也又丹參乃手少陰之味固宜用為太陽之配愚意次年甲子系少陰司天病起於少陽恐君相之火以類相感故預防之耳
