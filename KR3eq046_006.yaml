body:
  text: 卷六水運年辛亥厥陰司天中運少羽少陽在泉土兼水化左尺不應初氣大寒交主厥陰客陽明二氣春分交主少陰客太陽三氣小滿交主少陽客厥陰四氣大暑交主太陰客少陰五氣春分交主陽明客太陰終氣小雪交主太陽客少陽初運大寒交主太角客少羽二運春分後十三日交主少徵客太角三運芒種後十日交主太宮客少徵四運處暑後七日交主少商客太宮終運立冬後四日交主太羽客少商鄧翁六二胸膈飽悶噯氣不食脈浮數而革案此胃土不順之故雲苓六錢大熟地四錢生白朮二錢竹茹三錢神麯四錢天花粉二錢粉丹皮一錢甘草一錢釋此辛亥年小滿前二日方也辛年客氣逆行三度節近小滿已交陽明方用云茯神麯花粉固已但土兼水化之年水氣本弱不能制火而氣反上逆方用熟地之陰降以治其本用丹皮之辛寒以治其標本年二黑流年於統運之四緑為死氣故土木相持而不相合此用竹茹白朮甘草之意也淩氏四十胸腹絞痛欲絶自言食穄屑餅過多渴極飲水數碗遂致此病脈左寸鉤右關濡澀兩尺俱伏案運氣之火與主令之金土相剋而不相生故有忤繳不安之象宜和解而開散之然亦須兼滑潤清理之意丹皮四錢生楂肉五錢香薷三錢香附米三錢白薇一錢紅曲一錢竹茹五錢竹瀝一錢陰陽水煎服二劑釋此處暑後二日方也月建申金主氣太陰客氣少陰主事火為土母因為客感飲食之氣所郁鬱火上冒不能為釜底之用故有未濟之象以卦義論之即先天之否也方用丹皮清散少陰炎上之火而使之下濟山楂味酸色赤借木味以疏土即用火性以生土也白薇味苦而咸苦者火而咸者水也土兼水化之年水氣本弱故用以啓水天之精氣生升於火位而調劑之兼以達陽明申金之氣而清散風邪也竹瀝取其寒滑陰陽水取其和也余皆清理胃陽之品人所易曉前藥煎熟已身僵口噤心覺微溫勉用銀簪撬口緩緩灌之至中夜將盡一劑身動噤開因再服一劑狂惑不知人事如故肉蓯蓉二錢白芍五錢丹皮五錢鮮首烏二錢楂肉四錢枸杞子二錢天門冬二錢茯苓二錢白鵝翎一錢飛蛾一錢去頭翅膽星四分山梔一錢青皮一錢海蛤粉二錢淡竹葉一錢竹瀝二錢竹茹錢半服八劑釋少陰為客氣申金為月建太陰為主氣故以芍藥丹皮楂肉為首重蓯蓉感馬精而生馬為火畜精為水陰故稟少陰水火之氣枸杞冬熟而色紅是稟少陰之水氣而又兼君火之化者也天冬稟寒水之氣而上通於天水氣通天則天氣下降首烏苦澀能養手少陰之血而又能斂足少陰之精者也凡此四味皆因土兼水化之年而用以滋水者也飛鵝由濕熱腐化而生故用為火土相生之意白鵝翎稟秋金清肅之氣能闢除狂惑發揚胃氣而清浮游上越之邪也茯苓蛤粉去濕除逆故用之以應庚金之氣膽星山梔二竹青皮治病標之痰熱兼清少陽之相火亦防其君相同惡相濟耳某氏二五妊娠頭暈惡寒嘔逆虛火上衝不能飲食脈寸數關濡尺細促案此水化未成之故天門冬三兩麥門冬三錢去心歸尾三錢歸身二錢廣木香六分大白芍一錢灑炒甘草八分枳殼一錢竹茹一錢服五次釋此辛亥年立夏後二日方也經云六氣之用各歸不勝而為化故太陰雨化施於太陽本年水運不及土來兼化時值太陽間氣故太陰乘之況客運太角甲木之火更挾太陽之標熱上爍辛金是烏得不用金水之氣以制之乎方用天冬至三兩之多豈非卓識佐以麥冬固已而復臣以當歸者蓋當歸苦溫稟少陰水火之氣與太陽為有情之合易所謂老夫得其女妻者也用木香白芍甘草枳殼疏理太陰使不得阻太陽升降之道更加竹茹以清太角則相火下降而既濟之功成矣姓十九頸生痰核脈浮滑而濡左尺伏左尺不應歲氣也朴硝一錢皮硝一錢極細飛面一錢冰片四分甘草一錢木通一錢丹參一錢用甘草水浸全料一晝夜服五劑愈釋此立夏後七日方也客氣太陽主事太陽之氣本於水府外行通體之皮毛從胸膈而入於中土今值土兼水化之年法宜助水而泄土二硝苦寒而咸稟太陽寒水之氣而消除結固留癖者也冰片香竄外走皮毛能散辛金之郁木通藤蔓空通其性自上而下自外而內故為此疾佐使之味飛面丹參清降手少陰之浮火因太陽之標熱上合心經也既用甘草入藥復用甘草水浸全料者取其歸於中土使太陽與太陰相合耳丙辰太陽司天中運太羽太陰在泉水齊土化左寸不應天符初氣大寒交主厥陰客少陽二氣春分交主少陰客陽明三氣小滿交主少陽客太陽四氣大暑交主太陰客厥陰五氣秋分交主陽明客少陰終氣小雪交主太陽客太陰初運大寒交主太角客太羽二運春分後十三日交主少徵客少角三運芒種後十日交主太宮客太徵四運處暑後七日交主少商客少宮終運立冬後四日交主太羽客太商周姓三一久患嗽喘多汗脈浮數而促釋此金水相搏而不能涵也補瀉兼行可已旱蓮草五兩益母草四兩黃柏二兩桑枝二兩白花百合一兩木香一兩桂枝六錢黃芩一兩粉丹皮一兩枸杞子二兩枳殼兩半桔梗二兩白蒺藜二兩川芎一兩蜜丸每服四錢湯批證系金水相搏而方用木香枳殼者水盛則土滯也脾受水穀之氣而上布於肺脾滯則肺無所承受而金鬱矣土氣既舒則生金垣水不失其職實為此證之樞紐明眼人詳之釋此丙辰年驚蟄前二日方也丙年天氣逆行三度初氣即屬太陽是症久患喘咳陰虛火浮又感太陽標熱之氣而增重故重用旱蓮益太陽之水以制浮火但水齊土化之年土弱不能勝濕故用益母黃柏從水以清濕土蓋水在地中河海皆為所振凡治太陽之疾必須兼理太陰也太陽之氣起於海底故用桑枝桂枝啓水中之生陽上交於肺木香味辛臭香稟手足太陰之化而散布太陽之氣於天地四方者也枸杞稟水氣而益陽枳殼利氣除痰而有疏通中土之用中道既通則金水相生運行無阻矣余如丹皮黃芩蒺藜百合諸味無非清降標熱達土平木之意桔梗川芎稟金土之氣化而通解血氣之郁者也蓋丙辰為天符執法之歲太陽所在惟宜和解此方生克兼施制化並用其幽深元妙之理須微會焉孔翁五三三陰瘧疾從前歲九月起遊衍逾歲脈左寸伏右寸浮滑右關遲滯注左寸不應歲氣也案水相蕩而成沫煙將盡而結灰物理觸處可通此症蓋遊症也然痰火猶逼而未解用疏理不用攻伐用化解不用武斷也青蒿一錢青木香一錢青皮一錢白蒺藜一錢白茯苓一錢白蔻仁一錢天冬一錢朴硝一錢鱉甲一錢黃芩一錢車前子一錢白蘇子六分白花百合二錢雞內金二錢肉果一錢服十劑釋此丙辰年穀雨後三日方也病起於卯年厥陰間氣之候延至辰年陽明客氣之時方內三青及鱉甲黃芩以解厥陰之郁用三白及雞內金以疏陽明金土之滯此皆治本之味也天冬朴硝車前用癸化戊以利濕而清熱蘇子百合因庚及辛以潤燥而降痰此皆治標之味也然水齊土化之年土氣終弱故加肉果以益釜底之薪則土氣旺而金氣平木氣達而水氣利三陰之郁一時通解矣曹氏草六便血屢年不愈脈右寸數左寸沉兩關無力案當用調脾滋血之味服十餘劑可愈山萸肉二錢旱蓮汁炒當歸二錢土炒白芍一錢桑枝二錢蜜炙血餘炭二錢五倍子一錢茯苓二錢酒炒青皮一錢白朮一錢澤瀉一錢女貞子三錢地骨皮三錢湯批概云調脾滋血而方以萸肉為君者以少陽木火之氣將至故先機而迎之也大凡積弱之疾非借天地之氣雖補難起解得此祕則運氣乃為我用矣至方內滋血之外或斂或降或清而絶無激動火氣者則亦未嘗不防少陽也觀其以旱蓮汁炒萸肉之意可見釋此小滿前五日方也客氣逆行小滿應交少陽不預防其焰而反借其氣以為長養之地亦以屢年泄血之疾木火素弱故也而月建屬丙與年令之強水相比自以利濕扶土用太陰以制太陽為宜方用旱蓮制山萸佐以女貞取水木相生之意水既生木自無浸土之患矣用地骨皮桑枝澤瀉清金降水以除太陽之標熱用朮苓歸芍以己化甲青皮以甲合己五倍血餘以少陰和少陽而兼以止血此標本兼用法也某氏三十妊娠氣虛飲食減少脈寸遲濡關尺細澀案此疾惟宜養血散血涼血耳歸尾五兩酒煮一炷香川芎六錢神麯一兩桑皮一兩山羊血一兩血餘炭一兩血竭一兩蕤仁一兩破故紙六錢青木香五錢用水四升煮二升分十停食前溫服釋此夏至前三日方也水齊土化之年月建丁火為強水所制則血虛而滯方用酒煮當歸為君佐以血餘神麯借少陽之氣以助丁火也而少陽木氣實為生火之源故用川芎以宣之蕤仁以滋之破故紙以攝之青木香以達之則薪添釜底而成火風火雷之象矣更加山羊血血竭調和血分以涼血而散血用桑皮以瀉強水而清辛金則心舍寧靜而精神長飲食進矣此所以胎前産後均無災害也某姓三十病後濕熱不清精神疲倦胯間時生結核脈寸部浮緩關尺俱濡案此氣血不攝之故宜滋息之金櫻殼肉蓯蓉土炒茯神歸身血竭金沸草紫花地丁以上各一錢海藻二錢生地一錢白蘚皮錢二益母草錢半川貝母二錢服十劑釋此霜降後四日方也月建戌土客氣少陰主事時當火土之令應旺不旺以本年水齊土化故也方用金櫻蓯蓉生地滋足少陰之氣使真水內固不隨邪水以上浮洵為治濕之長策用茯神歸身益手少陰之氣使君火內充而濕邪外散土有所養而生息無窮此治濕之正軌也更加金沸貝母以清降之地丁益母以解散之海藻白蘚血竭軟堅散結和血去濕取為治標之用則源流俱清無復留滯矣張氏草四半身麻木右偏手足不能動作脈兩寸虛浮左關緩右關澀案此脾胃燥濕兩持其偏之故通草木通大麥冬冬葵子生地炭香附神麯山茨菰馬兜鈴當歸尾半枝蓮以上各五錢上藥同入瓷瓶內井水煮一炷香再加酒浸開水和服釋此丙辰年霜降後五日方也月建戌土天運少宮正脾胃二土用事之時乃水齊土化之年己土浸而為泥斯戊土失其滋養而過燥矣幸有客氣之少陰可以用為救藥故藉手少陰之丁火以除濕借足少陰之癸水以潤燥然究系水強土弱之年自當以抑水疏土為先務此用藥之大旨也兼用辛金之味金為水母金清而後水行且與中運之丙相合而化也前藥服畢手足運動但精神倦怠白濁時下案此時金水二臟清濁尚未能攝也白花百合三錢蜜炙霜桑葉二錢牡蠣粉一錢菟絲子三錢白飛面一錢通草二錢杜仲二錢川芎一錢醋炒蛤粉一錢五味子一錢五倍子一錢茯神二錢蒼朮一錢服十劑釋此冬至前三日方也冬至子之半前為陰子後為陽子陰子之母為庚金陽子之母為辛金宜兼顧為是此時系在泉之太陰主事而脈色卻應脾肺二經是為土不生金金不生水之象方用菟絲茯神飛面益水生土以資其化源而用百合桑葉五味五倍牡蠣海蛤並醋炒川芎以清金而攝水加用蒼朮杜仲益太商之力陰陽俱到太少不遺復用通草清金去濕以抑水而扶土以應年令於是水歸其壑土返其宅而天氣下交於地水氣上通於天矣岑氏卅八冷嗽痰飲氣急不眠脈虛滑左寸沉右寸數注左寸不應歲氣也案此痰系寒積而成今氣運適在戊己之分故舉發較重也肉蓯蓉錢半山茨菰三錢砂仁一錢紅曲一錢白花百合三錢玉竹二錢鬱金錢半茯苓二錢石菖蒲二錢降香末一錢北沙參一錢木瓜錢半金石斛錢半車前子錢半膽星五分服五劑釋此丙辰年小寒日方也月建醜土客氣系太陰在泉主事戊己二土陰陽出入本自相為表裡故用藥之意亦覺顯明易曉也辛酉陽明司天中運少羽少陰在泉土兼水化兩寸不應初氣大寒交主厥陰客太陰二氣春分交主少陰客少陽三氣小滿交主少陽客陽明四氣大暑交主太陰客太陽五氣秋分交主陽明客厥陰終氣小雪交主太陽客少陰初運大寒交主太角客少羽二運春分後十三日交主少徵客太角三運芒種後十日交主太宮客少徵四運處暑後七日交主少商客太宮終運立冬後四日交主太羽客少商宋姓卅一庚申冬季忽患腹痛泄瀉之疾漸覺咳嗽多痰延至二月咳嗽不止項強而腫發熱惡寒頭運身重脈沉細無力獨右寸虛數案此感太陰之氣而成陰濕既重陽氣雖升而陰火飛越蓋清陽不升故濁陰不降但症形重大藥須緊服早服二劑可也鐵落四錢煤灰二錢金鈴子二錢馬齒莧三錢淨銀花二錢沙參二錢茶葉二錢葛蔓根三錢鮮茵陳蒿三錢貝母三錢鬼箭羽二錢紅花二錢用白銀小錠入藥煎竹瀝三匙和服二劑釋此辛酉年春分前二日方也土兼水化之年支幹總屬陰金且立春前雨澤久濡陽土不旺燥金無所施其力故太陰反以強賓而奪主然究因客氣逆行陽明司令未致猖獗令春分將近少陽相火挾濕上升故有寒熱項腫之象方用鐵落白銀以鎮木火之上炎為主煤灰以除飛越之濕金鈴鮮蒿以解少陽之郁而陽明究系司天統令故用馬齒莧葛梗以舒之銀花沙參茶葉清辛金以保肺氣衛矛貝母散結解鬱以除辛金之濕滿佐以紅花竹瀝破瘀消腫清痰利咽為外症之引也後一日項腫倍增至中夜咽內壅塞氣息阻隔茶水難進案濕火上炎木氣拘攣只是用古針法刺次指中指去爪甲一韭葉許其救急最捷否則權用吹藥開路再用金汁金銀露浮小麥鮮生地汁沖服以治其標吹藥用大戟一錢豬牙皂一錢刺蒺藜一錢原麝二分沒藥二錢皮硝一錢見腫消二錢焙乾海金沙一錢辰砂三分山茨菰一錢二分如無見腫消則當以野荸薺粉四錢代之同為細未頻吹可也湯批至真要大論曰太陰之勝喉痹項強繆刺篇曰邪客於手少陽之絡令人喉痹刺手中指次指邪客於足少陰之絡令人嗌痛不可內食刺足下中央之脈此證由陰濕而起本太陰也近春分而見感少陽也少陽與少陰為君臣亦為夫婦故兼及少陰合而言之太陰本也少陽標也少陽標中標也然君主不寧而百體解散急則治其標此之謂夫釋外治之藥不過開鬱解毒散結除濕耳其內服治標之藥金汁銀花露為解毒清涼之通劑浮小麥生地本少陰之味而用以治相火之灼金者蓋心與肺本相聯屬而足少陰之所生病舌乾咽腫相火既動君火隨之且少陽初動難於直折只得借少陰以和之耳又換方案毒氣雖稍散而真陽日光尚未透漏總為陰火所遏耳方宜養陰以歸元散陽以泄氣生鱉甲三錢秦艽二錢香附一錢炒制首烏二錢人中白二錢杵黑豆皮錢半獨活錢半防風八分黑芝麻二錢去油紅花一錢白芷二錢天花粉二錢當歸三錢馬兜鈴一錢肉果八分麵煨百草霜一錢梁上塵二錢佛果金二版服二劑湯批大凡陰火之病須補陰水以靜之故方內疊用滋陰之品又肉果入太陰之分能收火入里而斂飛騰之焰此二法實為立基固本之要訣譬之用兵須爭上流形勝既得迎刃而解矣釋此春分後一日方也令值少陽相火而用鱉甲秦艽香附滋木氣而疏木鬱首烏豆皮芝麻滋木以養木者木氣不達則火不歸根而逸出故也又用煨肉果百草霜以攝陰中之陽薪安釜底自不隨邪火而上越矣飛金花粉兜鈴鎮金氣而清其浮熱當歸紅花以少陰而和少陽人中白梁上塵一浮一沉用以掃除上下之邪火白芷獨活防風則散陽以解濕鬱之留滯耳蓋當土兼水化之年太陰氣勝太陽之氣不能灌溉於周身譬如日光為雲翳所掩光輝黯淡何能照耀於周天哉醫者須為撥雲霧見青天使辛金能與丙火相合然後水化成而生機轉也服前方脈象稍起但覺心神恍惚時若驚恐案此陰不歸原而陽失其度也今可清肺散結矣歸尾三錢鬱金一錢金陀僧二錢童便煅杵朴硝二錢白芷二錢香附錢二酒炒辛夷仁錢二去淨皮毛南星八分砂仁殼一錢甘菊二錢銀花二錢車前子錢二酒熏陳皮一錢白殭蠶一錢甘草一錢野菊根三錢竹青屑五分三劑仍早晚兩服湯批案云清肺而方內參用陽明之品者以太陰與陽明相為表裡也釋少陽乘少陰之位相火奪君火之權故以歸尾鬱金靖少陰之氣使少陽不得而亂之也加童便煅陀僧以鎮金氣朴硝之鹹寒以清三焦之邪熱白芷香附砂仁殼辛夷仁香燥辛散以除上焦之濕鬱南星陳皮清中土之痰濕甘菊野菊銀花車前保肺清金不使為相火所爍殭蠶竹青散相火逆結之痰兼治咽腫可謂內外俱徹者矣然合觀大意總不外合丙辛以化水以救年令之不及用少陰和少陽以平客氣之太過用金氣克卯木以防月建之助炎而又換方案春木發早濕火過炎炎上之火本無定也只宜以清金壯水為主耳注謂去歲冬燠雨濡春令早行也抱木茯神三錢明琥珀一錢燈心研細連翹三錢淡鹽水焙乾杜仲三錢鹽水炒黑芝麻錢半戎鹽錢半赤豆一錢白藥子錢半黃藥子一錢膽礬一錢珍珠八分山茨菰三錢天花粉三錢朴硝三錢砂仁一錢川芎一錢甘草八分蓮房一個引用水菖蒲根取自然汁四匙生和服加白馬溺一大杯和入蓋馬為乾金溺則取其趨下之性如無白馬可取大蚌一枚少加鹽礬入內取生水和用服三劑釋此春分後五日方也茯神蓮房琥珀連翹清手少陰之熱杜仲戎鹽滋少羽癸水之氣且軟堅也此皆所以為少陽之配者也山茨菰藥子菖蒲汁以除痰而去濕消腫而散淤膽礬乃少陽本經之引以之湧吐風痰發散相火而解咽腫珍珠馬溺車前清金水之臟花粉朴硝兼除腑熱砂仁川芎以散血氣之鬱滯究其大意仍不外前方之旨云爾又換方案前方尚少半劑之力須用前方再服半劑後換用內外雙解之法元參三錢苦參二錢牙硝二錢黑料豆三錢酒浸炒山茨菰二錢天花粉二錢赤苓一錢熟軍二錢皮硝一錢烏賊骨一錢銀花二錢山豆根二錢茯神二錢木通八分澤瀉八分甘楝根皮一錢衣魚四分蛇脫三分服二劑釋此為內外雙解之劑夫人而知之也然必重用黑豆元參以保少羽之氣者因水弱之年恐為少陽所泄而難濟耳又換方案有濕火上蒸意欲外托而兼內治故前用蛇脫等藥以兩枝其兵所謂間道而出者也猶有外不盡托而內不盡治之處今卻用剛柔並濟法滋潤其陰方好還原今之二枝異於前之二枝也龜板三錢酒炙地骨皮三錢鮮者桑皮二錢菟絲子二錢酒炒貝母三錢青黛三錢山茨菰二錢白蘇子二錢冬青子三錢鉤藤三錢蜜炒冬葵子三錢杵皮硝二錢敗醬四錢劉寄奴二錢馬鞭草一錢如無以蝦蟆草代之甘草一錢服二劑釋前半多降火養陰之品後半則兼解毒去濕及外托散結之藥矣又換方案此時內毒漸清剩外毒未除耳當用淮陰四面吹散楚軍之法然亦須連絡彭軍以為犄角何則前蓋開壁令其逸出今則收燼欲自完繕耳宜再服前方二次後用截然二枝軍一枝埋伏一枝戰也早服用炙龜板四錢白芍二錢首烏三錢枸杞子三錢炒川芎二錢當歸身三錢黃芩二錢葛根粉二錢貝母四錢元參二錢釋此為埋伏之軍所以備不虞也晚服用土茯苓五錢白茯苓四錢川芎八分海藻二錢貝母二錢皮硝二錢劉寄奴三錢鎊犀角八分硼砂錢半琥珀八分研細苦菜根十個金銀箔草張陳小麥稈卅莖以上二方俱用甘菊銀花煎湯代水釋此為出戰之卒所以摧強敵也前方服至二日項間膿潰腫消諸症悉退但覺體虛案此症原系傷寒實症然當權其先後施治之法不可率爾驅除務要收火入內散邪出外治之無其法一內伏即不可解矣故欲其聚於一處如秦將之坑卒者然此其中惟權為難耳今已順流而下大事就矣以下無大難處所謂一將守之有餘者也象皮四錢蝟皮四錢金狗脊三錢大白芍五錢白茯苓三錢土炒丹參三錢當歸身二錢土炒龜板五錢橘核三錢制首烏三錢引用銀花藤摩蘿藤茶錢連莖一個小麥稈三十莖日服一劑服五帖釋此春分後十三日方也木火氣盛金水氣衰故方以扶金滋水為主用二皮涼血生肌兼扶司天之金氣也橘核日華以治膀胱氣痛腰下冷氣是稟太陽之氣而散寒濕結核者也茯苓屬辛橘核屬丙此丙辛合化之理也余俱滋陰之品而少陰為尤多蓋少陰君主既強則少陽相臣自不能不退聽耳月峰問辛酉二月時令治法案師曰去冬陽氣早泄故陰舍不固而木氣拳拘耳子知前方用鐵落生銀之意乎以其早動則靜鎮之去冬雨澤連濡亦見陽水虛涵陰金浮泛之象宜早用鐵落銅青石燕等藥所謂以金從金之意外加木香辛夷青蒿紫蘇葛根枳殼款冬忍冬韭子金石斛或加細辛肉果蓋助陽而收肺氣之汗漫者耳或用馬齒莧虎耳草車前草蝦蟆草一二物為引從濕以治濕也外加土炒茯苓川楝子甘草節用為佐使隨症加減可也至如細辛石燕銅青肉果皆非常用之藥須隨症斟酌之袁氏四十腹中痞結經脈不通頭目眩暈上膈有痰咽乾心熱脅下時痛陰虛潮熱脈沉澀右寸虛浮案此由陰陽相舛錯而脈理失其滋息也法宜守陰以助其下生之氣升陽以助其上升之勢乃成地天之泰耳此調燮之在微渺者也炙黃耆二錢鉤藤錢半桑白皮二錢澤瀉二錢紅花二錢桑椹膏六錢益母膏二錢茯神二錢紫花地丁一錢女貞子四錢酒炒一半土炒一半神麯二錢土炒厚朴二錢薑汁炒甘草一錢枳殼一錢制首烏三錢苡仁三錢木通一錢上藥服八九帖加薑汁錢半土炒種術二錢再服四帖加煨肉果一錢石菖蒲一錢木耳一錢山茨菰一錢又服三四帖可愈愈後期年並可生子釋此辛酉年夏至前六日方也客氣逆行三步正值太陰主事用黃耆桑皮及益母膏皆手足太陰藥也既用心經之味以生之肝經之味以疏之而又用腎經之味以滋之者欲使水土有相垣之勢金水有相滋之用也況水運不及土來兼化非清金何能生水非滋木何能疏土哉凡此百孔千瘡之症皆不宜拘定陳法顧此失彼看此方補瀉兼施溫涼互用學者須熟讀金匱及準繩諸篇庶可窺其一二也徐氏草五是年春因喪子悲恚遂致經脈不行嘔噦眩運腰疼脅脹飲食日少形徒骨立脈郁澀而濡兩寸沉香蒿二錢香附錢半酒炙石菖蒲錢半法半夏一錢枳殼一錢青皮八分黑芝麻錢半雲母粉八分秦艽一錢酒微炒女貞子錢半米飲炒川芎錢半服八劑釋此辛酉年夏至後三日方也天運少徵客氣逆行太陰主事故以菖蒲川芎開心經之郁余皆滋水剋土以疏太陰而扶中運之不及者耳雲母者云之母也其性益氣而升陽蓋云本由地中之濕氣而生故云母為土中升散濕氣之味列於本經上品為服食養生之藥方書亦有云母丸及服食諸法後人不能格物窮理故入方甚少附注於此以備參考王靈山記又換方案此有肝經鬱火而此時宜先利其氣亦本古人五苓五香之意而活用之耳土香蒿三錢老松節一錢茯神三錢蘇梗二錢白茯苓三錢赤茯苓錢半枳殼錢半赤芍二錢木瓜錢二澤瀉二錢歸身六錢酒炒服十劑釋此大暑後四日方也天運少徵客氣換交太陽太陽為寒水之腑故用松節茯苓澤瀉去濕邪以清水腑蘇梗其葉朝挺暮垂稟太陽晦明之氣天氣下降其用為下氣殺穀故以為利氣之嚮導脾為氣母又為血之統領故用歸芍以調之太陰與太陽本相配也青蒿得先春之令最早理屬少陽易曰震一索而得男故謂之長男蓋太陽太陰之所生也考律書黃鐘生林鐘林鐘生太簇之義可知矣大凡肝經有郁則心氣不旺故重用酒炒當歸以助少陰之氣而復用少陽之木味以配之則生生不息之機由是啓矣合觀二方俱不外疏土去濕之意者以土兼水化之年令宜然也服前二方經脈稍通飲食漸進但形體未復精神缺爽案水旺之時木氣自潤但恐水不歸垣轉致泛漲耳茯苓塊三兩茯神三兩豬苓三兩土茯苓一兩赤苓一兩桑白皮三兩黃柏三兩鹽水炒砂仁二兩澤瀉二兩海桐皮二兩蘇木二兩炙甘草四兩甘菊花一兩加左金丸一兩杵碎和入上藥研末蜜丸橘皮湯下釋此立冬後四日方也中運雖嫌水弱而主氣陽明月建當亥子母相生可以轉弱為強故不憂水之不足而第憂土之兼水而轉傷於濕也方用五苓為主重用炙草為土分之嚮導卻用黃柏左金聊為在泉之少陰去其逆所以專其生土之用也然此症究以調經為主使無海桐蘇木為疏土行水之具不特築版無資堤防難就亦且不歸血分而寬泛無著矣至於桑皮甘菊則又因爍金之客氣而旁及者也孔姓卅四耳暴聾案此蓋竅於腎而繫於肝者也宗氣不能隨衛氣以轉輸故有此疾雖非要緊關頭卻由水臟卑下之地速濟為難耳可用丸治之巨勝子二兩馬兜鈴一兩金狗脊一兩乳香一兩骨碎補二兩雲母粉兩二橘紅一兩砂仁二兩秦艽二兩酒炒菟絲子兩半枸杞子兩半用青荷梗蒂十兩煎湯和蜜煉為丸更加雷丸七錢蓋取其得雷鳴發動之氣而生者也平時服藕最妙蓋水之精而通竅於上者也釋此辛酉年大暑後四日方也土兼水化之年客氣太陽為土所阻此所以天地否塞而關竅不通也方用雲母雷丸所以升地氣兜鈴枸杞以降天氣而又用秦艽之紋理旋轉以為陰陽出入之樞機蓋天氣左旋而右轉地氣右旋而左轉左右者陰陽之道路秦艽稟天地運行之氣更用酒炒以引入心經復佐以菟絲荷蒂借少徵之運以通心竅使水火濟而地天泰耳至於用滋腎之味以助水運之不及則理之易曉者矣鄒姓十七咳嗽吐血發熱不已脈象虛大案從來脾經易收而易泄以位居中央為上天下澤之所交氣耳此症宜攝土而滋水蓋水弱則易於浮蕩水蕩則土垣難固土垣潰則水更易涸矣此理可推也黃芩二錢丹皮二錢地骨皮二錢枸杞子二錢青木香二錢白薇二錢白及一錢側柏葉一錢紅曲二錢土炒甘草節八分老松節一錢當歸三錢炒梔八分木瓜八分摩蘿藤三錢青荷莖五錢陰陽水煎服六劑釋此辛酉年芒種後十二日方也客氣逆行應屬太陰主事而陽明實為司天之氣故用黃芩地骨歸身白及以理手足太陰而又用白薇紅曲以理陽明也然土兼水化之年水氣本弱故用松節枸杞摩蘿以滋水而疏土又用荷莖柏葉丹皮炒梔清少徵之熱者因月建也至用木瓜木香草節亦以疏理濕土使不得阻金水相生之路耳吉姓十九素患咳嗽吐血忽染重瘧脈寸口洪大關軟尺弱注歲氣以兩寸不應為常茲見洪大火上越故也案此陰土有虧故浮游其氣而不與營相調耳易所謂二女同居其志不同行者也宜用以陽求陰之法注易睽卦彖詞云火動而上澤動而下也蓋離為中女兌為少女故曰二女也言此症火氣浮越金氣下陷而兩寸反見洪大有暌孤之象也肉豆蔻錢六分半生半面煨生薑三錢半生半煨蒼朮二錢半生半米泔炒甘草一錢厚朴錢二分半薑汁炒半生縮砂仁錢二分半土炒半生廣木香錢半半面煨半生陳佛手一錢陳萊蔔子錢二分炒降香末一錢橘紅二錢蘇梗一錢土蒿葉八分服四劑湯批脾經多氣而多血脾土有虧則氣不歸血氣浮而血陷陰陽相舛矣方用理脾之味半熟半生一以求諸陽一以求諸陰也用藥之妙不可方物釋此辛酉年霜降前一日方也陽土與陰土相流行亦相對待一盛則一衰今月建戌土天運太宮陽土盛而陰土愈衰矣脾為氣母氣即火也脾統血血即水也今土氣既虛故火動而上澤動而下暌象見焉又值客氣風木煽動陰火上越濕熱薰蒸濡滯莫解故用理中之意使火氣歸源於釜底則土氣有根而運行有力此用藥之大義也蓋陽位乎天陰位乎地陽性升陰性沉安陽於陰位而後陰氣得所依附而滋長此之謂以陽求陰總以土虧之疾不宜直用克伐惟有扶陽燥土以培其根耳瘧愈半月虛熱復發吐血案此亢陽外越真陰失守故心氣一熾而金水不下濟也此時仍可降陽而伏陰耳伏龍肝三錢倒掛塵一錢降香二錢松脂二錢槐實錢二馬兜鈴錢二地榆錢二胡桃肉二錢益智仁錢半歸身一錢干首烏二錢甘草三錢炙黃柏三錢鹽水炒肥牛膝一錢可服十數劑釋此小雪日方也少陰君火在泉而用藥從足少陰為多者以病由真陰失守故用從治之法引火歸原以熄少陰之焰也蓋土兼水化之年水弱則真陽無所依戀故治之者必欲以剝之上九降而為復之初九乃克順孟冬收藏之令更加清降辛金之味者肺為心舍且防陰火之上越也然非水上火下終不能成既濟之象故復用黃柏地榆槐實以治其標方得如針芥之投耳洪氏卅三卒然昏倒四支厥逆良久始有氣息脈細數尺更微案夏病於血者冬必病心氣以節宣相失之故耳況此時一陽起於重陰之下陽為氣母母鬱則子亦郁耳但此時不可峻補恐澀滯其從出之路也此時只可用升陽守陰之法陽者命門之真火也真火鬱則心火不守而土氣亦郁矣升陽者扶助命門之陽氣守陰者降伏少陰之君火也祝道山注肉豆蔻八分麵包煨辛夷心一錢去外皮毛延胡索二錢醋微炒白歸身四錢川芎錢半龜板五錢杵廣木香錢半砂仁一錢制首烏四錢炒山梔一錢香附一錢醋炒硃砂三分黃連四分大白芍錢半土炒粉甘草八分服四劑加黃耆四錢再服四劑湯批不識運氣之理必疑此症為中風矣勘破一陽不升之故以扶陽而滋養少陰以安在泉之氣看來似不對症而恰絲絲入扣非粗工所能問津釋此辛酉年冬至後九日方也在泉之少陰主事故用龜板辰砂當歸黃連炒梔靖君火而益心氣然而冬至節後一陽初生此月令陰陽之卦氣也陽氣伏於土中故用肉果砂仁木香以助一陽之氣真陽從水中而生故用黑豆首烏以滋水中之陽病本由於血分而病標見於氣分故用延胡香附川芎歸芍以理血中之氣又肺為主氣之官氣逆之症安能捨此但當補瀉兩難之際惟宜清輕之味以平之故只用辛夷仁錢許以為開散耳辛者陰金也夷者平也律有夷則卦有明夷先聖命名具有至理詳本經下氣之文可悟何得專指為胃土之藥耶水運年續編丙寅少陽司天中運太羽厥陰在泉水齊土化右寸不應初氣大寒交主厥陰客少陰二氣春分交主少陰客太陰三氣小滿交主少陽客少陽四氣大暑交主太陰客陽明五氣秋分交主陽明客太陽終氣小雪交主太陽客厥陰初運大寒交主太角客太羽二運春分後十三日交主少徵客少角三運芒種後十日交主太宮客太徵四運處暑後七日交主少商客少宮終運立冬後四日交主太羽客太商宋妻四十頭運腰疼足筋牽掣麻木無力月事短少不孕脈兩關虛數無力案蓮峰李子曰此肝腎血分虛燥生風之象宜緩調之馬齒苑兩半肥牛膝一兩松脂一兩酒煮鱉甲二兩醋炙女貞子三兩五加皮二兩秦艽兩半當歸二兩鉤藤四兩豬油浸炙獨活兩半制同上豬蹄筋二兩酒炙石斛三兩熟地苡仁玉竹濃煎為丸每服五錢釋此丙寅年驚蟄日方也肝腎二臟久虛又因水齊土化之年故壬水強而癸水無氣乙木失滋養之源客氣覆逆行少陽甲木盛而乙木感陽熱而生風故方用勝濕之味以制太過之水用斂抑之味以平少陽之焰用滋陰扶木之味以滋乙木之源而祛其虛風也又換方案蓮峰子曰木燥水虧之疾而此時尤以滋水為要鮮旱蓮草四錢大麥冬二錢用辰砂二分同杵丹皮二錢冬葵子一錢冬青子二錢鬱金錢半雲苓錢半肥牛膝一錢杜仲二錢鹽水炒木瓜一錢不見鐵釋此小滿後二日方也本年中運雖屬強水而水虧之人真水不能依附而起而邪水反因之而盛木必得真水而後潤今值少陽主氣之月客運復屬少角客氣又逆行於少陰之分木火之氣過盛木愈燥覺水愈虧耳方用清降金水之意祛濕邪即以扶真水所以養木而兼以平木也又換方肥玉竹三兩澤瀉二兩鹽水炒花粉一兩柴胡八錢醋炒石決明二兩天冬三兩鹽水洗炒鬱金兩半丹皮兩半炙鱉甲三兩杜仲四兩鹽水焙乾水紅根一兩制首烏黑芝麻煎湯泛丸釋此處暑後七日方也主氣太陰客氣屬陽明燥金主事庚金為乙木之官木病之人當水盛之年又值濕土之會土濕則木無所附更兼燥金之氣克之木安能支乎方用清理陽明之味以平金燥又用土中去濕之味以制中運然癸火實為乙木之源又不可以不養故補與瀉並行不悖焉又換方案蓮峰子曰疾將愈矣惟在調養得宜而已女貞子三兩川續斷二兩獨活一兩酒炒蘇木一兩醋炒龍眼肉一兩甘菊花三兩歸身一兩鉤藤三兩炙甘草兩半肥牛膝一兩酒炒白芍二兩醋焙柴胡八錢醋焙嫩桑枝金銀藤煎湯泛丸釋此小雪日方也主氣太陽客氣厥陰主事水虧木燥之人正可借天地之氣以為滋養之源矣方只用獨活以理太陽而太陽之標熱合於心經水盛之年心火每虞其不足故用酒炒獨活即佐以龍眼當歸以助心氣余則滋養陰木之品耳妊娠三月腹脹惡阻氣息不舒飲食減少案蓮峰子曰此宜理氣不須補氣也陳香櫞六分炒白蔻仁六分當歸錢二白芍錢二砂仁殼一錢五加皮錢二黃芩一錢酒焙血竭五分酒炒百草霜八分法半夏一錢防風八分土炒紫蘇八分陳皮一錢釋此大寒後二日方也節過大寒當屬次年太陰初氣主事脾為氣母氣之不舒土不垣水也故方中多用燥濕醒脾之味曰不須補氣者次年丁卯系金兼木化之歲補氣則金強而木愈弱木愈弱則愈不能疏土矣吳女十六瘧疾間發頭重體倦身熱無寒不能餘食脈虛大而濡案靈山王子曰此少陰之火不能生土以致輸轉不靈而少陽起而奪之也面神麯三錢夏枯草二錢白芍一錢甘草錢半天南星八分陳枳殼一錢黃柏錢半鹽水炒阿魏一錢大麥冬三錢硃砂同杵青蒿二錢稻葉三錢荷葉三錢此丙寅年芒種後一日方也客氣逆行少陰而主氣復屬少陽火氣既盛宜乎能生土矣奈水齊土化之年一遇陽火熏蒸遂成濕熱況少陽併入司天之氣而間氣之少陰不足以勝之此少陰所以不能施其生化之用以致濕土滯不靈也方用神麯為君加以麥冬硃砂以助離火中虛之氣佐以清理少陽降火除濕之品更兼夏枯白芍以和之阿魏枳殼以通之度幾甲己合而土化可成焉又換方茶石斛三錢砂仁錢二土炒蒼朮錢半黃柏一錢五分夏枯草二錢楂肉錢半丹參錢半牡丹皮一錢側柏葉一錢藿香錢半南星六分白茯苓一錢百草霜一錢香附一錢天冬二錢面神麯三錢木香一錢稻葉三錢釋前方用青蒿荷葉借甲木之氣以化土而剋水此方用石斛為君佐以天冬黃柏丹皮柏葉借金水之氣以平木火或借主氣治中運或借中運治主氣無非因時之妙用而已後二日換方桑白皮二錢香附二錢酒炒鬱金錢半酒炒山楂肉二錢青木香錢半雲母一錢薤白三錢香薷錢半酒炒益母草二錢厚朴八分藝香錢二淡竹葉一錢沒藥八分鮮蔓菁子二錢釋土化既成則水氣平而致濕之源清少陽既順則相火解而蒸熱之焰熄而下流壅滯尚未全通斯不得不責之輸轉之官矣故此方多主戌土以為治標之法汪子四歲時疫發斑昏暈多汗數日不解案蓮峰李子曰中運水氣過強遂有上凌丁火之勢此時丁火主月未免相持不下而相爭不已汗為心液汗多而昏者心氣不勝也此等移步換形之證又不可拘定成局亦或有郁久發暴子復母讎之變治之者須臨時詳察善為轉換方無膠柱之失今只解其相爭之勢使丁火差堪自主耳石菖蒲一錢柴胡八分青皮七分大青根二錢蔓菁子錢二丹皮一錢桔梗一錢人中黃錢二百草霜一錢通草五分竹瀝五匙東丹一錢燈心竹葉為引釋此丙寅年夏至後三日方也客氣逆行少陰又兼月建併合似乎丁火不致少力奈中運水氣過強與丁火兩不相下故見證如此方用東丹以鎮壓水氣更加通草以清利之則水氣平而紛爭可解矣然主氣之少陽又為病標之所在亦不可以不理也故用柴胡大菁蔓青青皮以清降之而已桂子半歲素患胎熱大腸祕結頭熱煩躁案道山祝子曰燥土司月合於太陽之標熱故舊有胎熱者感之而將動也然當將動之時卻不宜過用遏抑只用古豬膚湯之意清潤臟腑以防未然耳豬膚薄皮三錢蘆根三錢血餘炭二錢天冬二錢黑白芝麻各二錢木芙蓉葉一錢香椿樹葉一錢釋此丙寅年霜降前五日方也中運水盛之年客氣太陽之令患熱病者宜得平氣奈主氣之陽明併入月建之戌土又兼天氣過於乾旱故胎火感之而欲動也方用滋潤大腸宜矣又兼用血餘芙蓉葉者太陽之標熱合於心經也包女十八初起似瘧胸膈脹滿寒熱往來嘔逆不食十餘日後純熱無汗乾噦熱厥昏不知人醫用柴胡湯龍膽瀉肝湯黃連橘皮竹茹湯及一切寒涼峻下之藥俱不效脈數大離經案道山祝子曰此證邪氣熾盛而真陰不足以御之蓋陽明之燥火灼於肝肺二經肝氣燥則火勢愈熾肺氣燥則津液枯竭矣此時非急滋津液不能救標熱之劇也牛蒡子二錢硃砂一錢防己錢二金沸草一錢白殭蠶一錢廣三七五分新會皮一錢飛面八分金銀藤三錢百草霜一錢大青葉二錢橘葉一錢甘菊蕊葉二兩搗汁和服釋此丙寅年霜降日方也病起於客氣之太陽奈醫不知時未能清解致太陽之標熱合於主氣之陽明遂成燥熱燥熱不已蔓延肝肺以致津液枯竭此時急救津液只得隨其勢而利導之耳然太陽實為致病之由故仍用鍋墨以治太陽之寒用防己治太陽之水又用硃砂飛面者太陽之標熱合於心經也用殭蠶三七者厥陰風木通主在泉之氣而此疾復多厥陰之見證也又換方案台山何子曰今乃邪氣未清之故當以清散太陽之裡熱為要旱蓮草三錢赤茯苓錢二通草六分鬱金三錢蘘荷根錢二薏苡根一錢桔梗二錢砂仁一錢地骨皮二錢貝母二錢陳皮一錢楂肉一錢五分白芍一錢釋此霜降後十日方也用旱蓮赤苓通草蘘荷以清小腸膀胱之熱固已更兼以清理肺胃之味者病機在於燥金燥金順而後濕金乃得復生水之度也周姓草二從春間患濕癬遍身瘙癢初秋患瘧醫用散劑數帖未效改用補劑變為嘔逆噁心痰結胸膈不思飲食脈象遲濡案靈山王子曰此由中運水強前令司天之氣未達故木氣鬱於土中而戊己二土不相和而相忤也麥芽三錢桃仁錢半去皮石菖蒲錢半五加皮二錢香附三錢花椒一錢砂仁錢半紫花地丁錢半防風錢半木香錢半麵煨白芥子二錢釋此秋分後八日方也客氣太陽主事寒水之氣與中運相比故在泉之陰木飄泊無依木浸於水而不能疏土此己土之所以濕也司天之少陽未達陽木鬱於戊土之中又逢陽明主所之時此戊土之所以燥也濕鬱成痰又為燥火所煎沉痼堅結實難開解方內利氣行痰人所共曉惟用辛散以行水用酸溫以達木非明於運氣者不能又換方砂仁二錢吳茱萸六分泡石菖蒲錢二附子一錢制葛根錢半破故紙八分鹽水炒韭子八分香附二錢胡桃肉二錢杵馬勃一錢鶴蝨八分釋此寒露前一日方也水土之病木為樞紐故用韭子故紙以扶陽木用吳萸胡桃以溫陰木然究其致病之由其過在水而不在土蓋水齊土化之年土之濕實由水之泛使專用扶木剋土之法恐土愈弱而愈不能垣水故用扶木益火之法以生土而疏土而更清理陽明借其輸轉之力以升清而降濁中權扼要最為得力後則迎刃而解矣又換方香草二錢轉輪木一錢白殭蠶錢半砂仁錢半椒紅八分炒代赭石錢半白茯苓二錢石斛三錢厚朴一錢薑汁炒石菖蒲錢半釋此寒露後六日方也前二方俱以扶木益火為主以利氣行痰為輔而此方直以醒脾為主者蓋客氣屬於太陽扶土製水所以抑中運之太過也然扶土之中未嘗不兼達木之意如殭蠶赭石者是也又換方鬱金一錢韭菜汁一錢殭蠶錢半山茨菰錢二橘皮錢二茜草根八分紅曲錢二白蔻仁一錢鶴蝨八分當歸錢二藿香一錢藝香一錢釋此霜降前七日方也陽明為月建之主氣而又為病標之所在故於病源將徹之時重理陽明使轉輸復其故度則胃口開而飲食可進矣合觀四方先本後標不急急於近功小效乃能開痼癖而起沉疴可知臨大證如臨大敵必先自整齊步伍彌縫周密而後不為敵所乘也茅姓草五從童時傷力吐血醫治未得全愈每逢舉發則乾咳腰疼筋骨疼面赤身熱脈象虛大案台山何子曰此陽衰而真水不能生木也肉蓯蓉一錢黑豆皮二錢甘草一錢鉤藤二錢女貞子三錢水紅子一錢紅曲錢半炒黑當歸一錢黑山梔一錢韭菜根一錢釋此丙寅年大雪日方也中運水強之歲又值寒水主令之月宜乎水弱者可以無恙豈知水為陰邪非真陽充實者不足以御之真陽不充則水氣愈寒而乏煦嫗滋生之趣矣方用滋水培陽之味使厥陰在泉之氣得所滋養而木自暢茂也又換方桔梗三錢丹皮錢半白殭蠶一錢甜杏仁二錢半丹參錢半鱉甲三錢酒炙焦楂肉二錢石決明錢半東丹一錢青黛八分小薊根錢二忍冬藤二錢釋此冬至前五日方也此則厥陰風木之味為多前方用肉蓯蓉此方用焦楂同一潛陽之意也大凡外象虛熱之症總要引火歸源上抑之而下攝之則用力少而成功多矣吾師諸徒用藥之法何嘗不從古方中脫化而出但適乎時宜稱乎病勢周密圓到為足貴耳趙姓草七素有項強之疾偶感風寒則惡寒項腫屢治不痊案藥田顧子曰此風痰滯於上膈之膜也痰不除疾何能愈乎厚朴一兩石菖蒲五錢桔梗一兩化橘紅一兩丹參一兩山茨菰六錢皮硝五錢明雄黃五錢貝母一兩廣藿香一兩當歸一兩白殭蠶一兩竹茹三兩煎湯加生薑汁一杯泛丸釋此丙寅年小寒日方也本年水齊土化固宜助土以剋水而厥陰在泉之氣尚未退令故方於利氣散結之中仍用明雄殭蠶以清風木蓋丸為久服之劑數日後即近大寒又有次年主氣之厥陰與客氣之太陰相承而至也劉婦卅七胸腹疼痛則吐瀉不止氣悶欲絶脈象沉結案雲圖李子曰此乃金土不清之疾只以和解為宜花粉二錢陳佛手八分陳筍衣一錢楂肉錢半丹參錢半山茨菰八分黑山梔錢半茯神錢半東丹一錢陳倉米一錢伏龍肝一塊甘草八分陳萊蔔菜二錢半釋此丙寅年冬至後一日方也是年客運終於太商太商屬陽金故有金土不清之疾方用清理金土固已而扶助火土以制中運之強水鎮靖風木以平客氣之厥陰固亦未嘗或疏焉又換方案夕山張子曰氣交之分水氣轉動故每為君火之患蓋火不下降則不能生土而反上逆耳寒食麵二錢丹參二錢東丹一錢雞內金一錢五加皮一錢茯神二錢鬱金一錢雲母粉一錢忍冬藤二錢酒炒甘松一錢釋此小寒前四日方也氣交之說經有二義在運氣為三氣四氣之交在人身為天樞之交證本脾胃之疾故原案氣交之分亦主脾胃而言之也安氣交之位而降君火以生土用方之大意盡矣又換方案雲圖子曰火不生土土不勝濕之疾非真實證也然有難於補瀉偏重者宜且用煎劑相勢而治之即有癥瘕亦俟另日定丸可也藿香二錢當歸錢二荔枝核一錢化橘紅一錢橘核一錢枳殼一錢石菖蒲一錢白蒺藜一錢木通一錢降香一錢梁上塵一錢百草霜一錢南星八分陳倉米一錢釋此小寒後六日方也節近大寒將交次年主氣之厥陰客氣之太陰而本年之中運猶未退令故仍以扶火生土為主至方中參入荔枝橘核何嘗不兼治癥瘕哉又換方案雲圖子曰今再用扶土開鬱之劑待將痊而作丸可也廣藿香錢半白雲苓錢半獨活一錢藝香八分扁豆皮一錢炒明雄黃八分當歸錢半紅曲錢半荔枝核錢半諸葛菜錢二川椒六分蝟皮錢半炙焦栗子一枚燒存性釋此大寒後一日方也方仍前意但初氣之太陰既交則醒脾之味較多耳又換方莪朮四錢豬膜包煨蒼朮八錢於白朮八錢首烏一兩三稜三錢麵煨存性黃精八錢炙焦夜明砂六錢藝香八錢焦楂肉一兩陳皮一兩天目筍一兩砂仁一兩鬱金五錢紫菜煎湯泛丸釋此大寒後五日方也此時丙年中運已退而次年客運少角主氣厥陰客氣太陰俱已交到故用藥多土木二臟之味蓋次年丁卯系金兼木化雖主氣天運暫相扶持究難免於木弱之病故以培養木氣為主首烏所以滋木之母蒼朮所以達木之氣楂肉所以益木之力也用紫菜作湯泛丸者不但咸能軟堅抑亦水能生木之意也至三稜莪朮以去瘀而破癥白朮黃精以補氣而行血猶其淺而見者耳按丙年水齊土化而下元甲子七赤統運流年五黃生統運為失氣故土臟之病最多以前各方扶火培土確有至理學者當合運氣元運而通觀之也
