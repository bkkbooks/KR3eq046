body:
  text: 原敘粵稽大昊氏嘗草治砭烈山氏磨蜃鞭策而醫學以肇及軒皇作睹上觀天象下察民情本羲經以立極審河圖而參元明廷咨訪石室珍藏其道大光秦政之亂廢道滅德先聖經籍焚燬殆盡而內經巋然獨存不可謂非天之佑斯民欲永登仁壽而消夭癘也但古人智識精深依經准治無毫釐差謬後人見地稍卑遂有望洋莫及之嘆於是仲景先生獨開生面按經立論著為方劑以作醫林程法庶幾學者即委溯源從標探本先聖經旨可以互相發明原非謂天下古今之疾必以成方為鐵案也奈後人識力愈陋用方愈少並金匱一書亦不能會通而條貫之何論本經靈素哉余恐墜緒之將絕也因於讀書之暇間習軒岐覺古人之心思智慮著有明文猶堪揣摩精理明言固已包舉無遺後之名醫如張王劉李諸家無非從此醞釀而出者因博覽群書而仍以聖經為會歸之極焉門人嘉善高生取吾施治之方疊為成案予恐深晦之意難於傳示來學因仍前人遺蹟作為準繩大全以備參閱故於依經審運之法反略而不講今宅心殷生見吾用方之權恆在天地運氣不僅僅於古人成方中討生活思欲佑啟後學俾知聖經運氣之說為審證之捷法療病之秘鑰因取吾尺木樓圖說錄成二卷並辛亥以後雜案選輯四卷逐章詳記附以釋解是直欲衍上古之薪傳而起萬世之沉疴者非特補準繩之未備亦以訂諸家之缺失也殷生之意良苦而殷生之功不可沒矣書將成請序於予予因溯其源頭名以窮源更述吾所以食古而不泥於古之意書於卷首云時天啟三年歲次癸亥六月中浣金壇念西老人王肯堂宇泰書殷跋余從先生遊最晚辛亥初夏先生薄遊淮海始贄見於刊江旅次親炙之餘錄案成帙以備研求蓋淮海之方居多先生嘗為予言淮海地氣較江南稍厚但卑濕而斥鹵與北方高燥堅實者不同故用方稍異於常潤居家時而絕殊於北遊幽豫者第丙辰年余省親武林留署一載還求雜方寥寥數紙迄余選方增釋未及卒業而先生已捐館舍故五運之中太羽最略焉余不忍金甌缺角玉合不方因取丙寅年同門李顧諸先達客遊淮左依運施治各案選輯增附續為水運一冊以成全璧庶幾束晳補詩香山續書之例云時崇禎元年歲次戊辰孟春上浣廬江殷宅心跋
