front:
  text: 湯序予少習舉子業不就去而學醫內經靈素而外張王劉李朱薛諸家及明季李瀕湖張叔承王損庵張景岳各著述逐一研求歷有年所覺其大旨無非發揮經義利濟斯人而或主寒峻或主溫補言人人殊即其方而用之總不能毫髮無遺憾心竊訝之而近今醫學膚淺間有著書立說者不過管窺蠡測難於考證至詣用是不敢出而應世因思醫道通仙而善於治身者必能治天下人之身是以裹糧負笈訪求畸士于山巔水湄之中歷金閶渡浙水昇天目探禹穴登天台訪赤城過石梁橋又復振衣九華躡足黃鶴樓信宿廬阜拾級香爐五老諸峰西至江陵往返數千里庶幾入董奉之林坐韓康之肆相與析疑問難互相訂正乃畸士絕少而汶汶者多騰口說以眩惑天下予甚戚焉洎予南遊洪都遇廬江殷子合宗於逆旅談藝霏玉說理鑄金而經旨紛綸絕非當時岐黃家口吻予傾倒久之憶其言之有本當必如蔡中郎得王充論衡者堅叩所學因出橐中先世所藏醫學窮源六卷相示披閱之下覺內經運氣之說至今始得撥雲霧而見青天於以知醫林之書汗牛充棟無非繁枝縟節而惟此闡蘭臺之秘奧造盧扁之堂階真能從支分派別之後直探源於賀卜諾爾者則予向之疑其主寒峻主溫補者得元會運世及三元運氣之說而後恍然悟也向之用其方而不能無遺憾者得勝復亢制順行逆行之說而始爽然失也向之覺其言人人殊者得斯書而後一以貫之相悅以解也其書首二卷系前明王念西先生所著而殷子之祖錄之後四卷則念西先生著案而殷子之祖釋之者也殷子寶是書什襲藏之珍逾拱璧私為家學不輕以予人予不忍使青萍結綠永沉埋於荊岩豐獄之中因求售其稿公諸宇內友人吳子鄢子復慫臾之遂斥篋中金錄副本而歸倦遊以來十有餘年恐歲久蠹蝕復致散漫爰命兒輩嚴加校訂間附鄙見於上付之奇劂俾天下後世學斯學者復睹軒岐之正鵠而不為支流所溷則予之大願也是為序時嘉慶十三年歲次戊辰季秋中浣難水云巢老人湯世質書於玉茗草堂
