body:
  text: 卷一太虛圖論太始天元冊文曰大虛廖廓肇基化元太虛者何太極也由其本無者言之曰太虛由其自無之有者言之曰太極蓋天地萬物莫不始於靜而終於動有是理而後有是氣有是氣而後有是形形有屈伸消長而理與氣無時或息太極者理氣之沖漠無朕包含萬有者也故天地清寧萬物化生而太極不因是增天地否塞萬物歇絕而太極不因是息自一而萬則萬太極也由萬反一仍一太極也無乎在無乎不在也人生而靜陰陽五行與氣俱賦惟能清心寧欲返樸還淳則渾然太虛客感無或干之否則陰陽偏陂形氣雜糅而本始之理幾於閉矣故予首揭其義以見夫太極之理先天而具而人事則不能無待於補救也是即醫學之所由肇端也陰陽圖象論陰陽者何氣化是也先天之氣渾渾噩噩杳杳冥冥無跡可見無象可尋而自然之化機已充滿而無虧惟充滿而無虧斯生髮而莫圉先天者理與氣融後天者氣與形附太極剖而陰陽立天地其最鉅者也陽性剛陰性柔劃之為兩儀分之為四象故程子曰四象者陰陽剛柔也天生於動動之始則陽生動之極則陽生故曰陰陽生天地生於靜靜之始則柔生靜之極則剛生故曰剛柔生地陰陽剛柔之中又有太少之分在天太陽為日太陰為月少陽為星少陰為辰在地太柔為水太剛為火少柔為土少剛為石仰觀俯察陰陽之能事見矣由是而四方五行八卦十干十二支二十四氣七十二候三百六十五度萬有一千五百二十策莫不陰陽剛柔淆列而互用或無形或有形其間屈伸往來盈虛消息進退抑揚動靜微顯清濁高下低昂平陂雨暘寒燠晝夜昏旦老少雌雄行止語默凹凸方圓呼吸出納鬼曰歸而神曰伸朝為潮而夕為汐無非二氣之流露也自可對待者言之六子肇於乾坤而一一分峙其位萬物咸資幬載而高厚各呈其能一彼一此無倚無偏即細如蚤蝨暫如蜉蝣亦皆辨陰陽於微渺之中而自其流行者言之一二二一運轉不窮奇偶偶奇嬗代無既天有入地之星地有摩天之嶺冬陰也而子中一陽生夏陽也而午中一陰生北方多夜之地亦曜燭龍東極易旦之方終熟羊胛水本陰而沸井之焰時生火本陽而蕭邱之煙不熱陽極陰生陰極陽生陽主生而陰主成陰既屈而陽復兆其循環不已也如此是故飛潛動植禽獸昆蟲或角或牙或蹄或翼縱生橫生有足無足稟賦不同種類各異榮落有候方隅有位漢宮之荔扶乎逾汶之貉鮮矣是皆稟陰陽之氣各得一偏而不能渾全者也人本一元之氣參兩太之位二五之精既具萬物之性皆備頭圓象天足方象地耳目以應日月口鼻以應岳瀆天有四時人有四肢地有五方人有五臟得中和之氣者為聖賢得偏駁之氣者為愚昧此其大較已而人之血氣之應乎陰陽者則更有說一陽也有太陽陽明少陽之分是陽中之陰陽也一陰也有太陰厥陰少陰之別是陰中之陰陽也故背為陽而腹為陰營為陰而衛為陽各經分屬陰陽腑陽而臟陰一臟自為陰陽虛陰而實陽陰陽有受於包胞者有餘與不足殊科陰陽有限於方隅者西北與東南異體而五運六氣之感召或多陽而少陰或少陽而多陰或上陽而下陰或下陽而上陰背陽反陰拒陰格陽變生百端莫可窮詰明哲之士深悉夫盛衰消長之理勝復承製之機劑盈酌虛大其裁成天有淫邪而不侵地有偏僻而不痼人有疵癘而無夭札之患粗工不知陰陽之大原往往拘於一偏膠柱而鼓琴坐井而觀天故予次列陰陽圖象以為學者資焉五行論天地非陰陽不化生陰陽非五行不統備五行者陰陽之精氣積而成形成象者也河圖之序天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之五行始於水者萬物之生皆由一點真水以為化原觀於胎化卵育之際可悟其理土雖後生而土即地也地有生成五行之德則土不為後矣序次既立盛衰自分六元正紀云寒化一寒化六災三宮災五宮其數莫不由之惟土言五而不言十者天地之數始於一而終於九故不言成數也以五方言之則東木南火西金北水中土以四時言之則春木夏火秋金冬水土寄王於四季之月以十干言之甲乙木丙丁火戊己土庚辛金壬癸水以十二支言之寅卯木巳午火申酉金亥子水辰戌丑未土五之而陰陽分位十之而陰陽各配故精浮於土則為五星化行於天則為六氣以至五帝五神五德五典五穀五果五音五色五臭五味無非應乎五行者其相生之序則水生木木生火火生土土生金金生水其相剋之序則水剋火火剋金金剋木木克上土剋水是以天地之造化無窮陰陽之運行不過也夫生克之理人所共知而生中有克克中相成之義未易明也如水本生木而水盛木漂木盛水涸木本生火而木盛火遏火盛木燼火本生土而火盛土熱土盛火滅土本生金而土盛金埋金盛土竭金本生水而金盛水澀水盛金溺相生反以相賊水性泛溢土克之而堤防成水始安瀾火性炎熇水克之而既濟見火無猖獗木性捲曲金克之而棟梁興木無樗散金性頑鈍火克之而鐘鼎作金無沙礫土性漫衍木克之而華實盈土無曠廢相剋轉以相成生克循環機緘日闢而其中又有互藏並育之妙焉如金能生水而水亦產金水能生木而木中有水木能生火而火中有木火能生土而土亦生火土能生金而金亦兼土是母生子子反哺之義也他如甘泉具於土中陰火然於海澨黃金成於丹砂汞鉛煉於果實煙焰發於鑽燧一行各呈其材而五行互彰其用子母相養祖孫一氣己所生者生之己所克者亦生之克己與生己者亦無不有以生之順其則者五行之性情變而化者五行之作用也人之臟腑應乎五行偶有偏勝當復中和苟不深察其生克相資交互相養之理而以水濟水以火勝火吾恐其毒世而禍民也已元會運世論天地之運行一氣之旋轉也歲月之往來陰陽之翕闢也由一氣而陰陽由陰陽而太少少陽為春太陽為夏少陰為秋太陰為冬四時具而歲功成矣天有三百六十五度四分度之一一晝一夜行盡一周日行稍遲每日少天一度凡行三百六十五日二十五刻少天一周復至舊處而與天會是為一歲月之行天又遲於日每日少天十三度十九分度之七積二十九日九百四十分日之四百九十九是為五十三刻與日合朔而為一月歲有十二會故為十二月天之氣盈每日過日一度之外仍盈十三分有奇積三百六十日共得四千九百三十五分以日法九百四十分為一日除之合盈五日又二百三十五分合為刻數則為二十五刻零月之朔虛以每日少天之度積二十九日虛四百四十一分十二月共虛五千二百九十二分以日法除之每歲合虛五日又五百九十二分為六十三刻零故一歲日數止得三百五十四日又三十七刻合氣盈朔虛共得十日零八十八刻是為一歲氣余之數而閏生焉以三歲而計則得三十二日又六十四刻是一閏而有餘以五歲而計則得五十四日又四十刻是再閏而不足故以十九年而計則得二百六日又七十刻以月法二十九日零五十三刻除之正得七個月所以十九年而七閏則氣朔分齊是為一章即畸零而歲月正即歲月而元運定一歲統十二月子建一陽卦復醜建二陽卦臨寅建三陽卦泰卯建四陽卦大壯辰建五陽卦央巳建六陽卦乾午建一陽卦姤未建二陰卦遁申建三陰卦否酉建四陰卦觀戌建五陰卦剝亥建六陰卦坤陽雖始於子然潛伏於重淵之下必歷醜轉寅而後發生之功茂焉是故寅卯辰為春春者蠢也生萬物者也巳午未為夏夏者大也長萬物者也申酉戌為秋秋者愀也收萬物者也亥子醜為冬冬者終也藏萬物者也當仲夏之時陰氣巳兆必至申始克布其令迨乎戌亥而後蟲壞戶雷收聲水泉涸澤腹堅天地閉塞而不通焉邵子觀此默識夫造化代謝之機陰陽屈伸之理亙古如茲鉅細一致而悟元會運世之道焉一歲統十二月一月統三十日以十二乘三十得三百六十日一日統十二辰一辰統三十分復以十二乘三十得三百六十分是一歲之數十二月三百六十日四千三百二十辰十二萬九千六百分以歲定元故一元統十二會會比月也一會統三十運運比日也一運統十二世世比辰也一世統三十年年比分也故一元之數十二會三百六十運四千三百二十世十二萬九千六百年第開物於月寅星巳之七十六閉物於月戌星戊之三百一十五唐堯為日甲月巳星癸辰申當一元之半邵子何由知之善乎西山蔡氏曰以今日天地之運日月五星之行推而上之因以得之也夫氣盈於三百六十六朔虛於三百五十四經世之數概以三百六十是必有閏會焉第未知當今之元與否而盈虛消息之理在其間矣元氏明善曰禹即位後八年得甲子初入午會前至元元年甲子初入午會第十一運從天開甲子至泰定甲子得六萬八千八百二十一年迄於我朝以一元計之殆過半矣而猶未離乎中也第上古之事書傳莫考所可知者民病重膇則教之舞民病陰遏則教之瑟民病猛獸害則教之巢民病卉服寒則教之衣民病生食腥則教之火民病器用虛則教之陶民病木處顛則教之屋民病鮮食竭則教之耕上古聖人興一事即所以仁民創一物即所以壽世故民得於于徐徐各盡天年而無夭札短折之患運會日降性情日鑿至軒岐之世其去循蜚禪通遠矣於是坐明堂而咨訪藏石室以貽留作為內經以利萬世然吾以路史考之計黃帝之先堯大約不過百世與堯同為巳會其時天地之運純陽斯民之數鼎盛故經之所載或有未備後世化原日薄而天地六淫之氣侵之者愈益酷古無痘症也歷漢唐而盛行於中國古無梅毒也至本朝而濡染於南州其他溢於經外者數條夫世愈積而愈多病日降而日變古之所有或為今之所無今之所無或為後之所有即如張王劉李諸家以身所經歷之證經歷之方著書立說傳諸後世非不確切不磨乃至今不盡吻合者蓋同會而不同運也古之北極正當天中今以管窺之差而出於管外矣古之南極入地三十六度而今則見於南海中矣天度如此人事可知蓋世運日移而人之血氣陰陽有莫知其所以異而異者也聖人言百世可知不外乎因與損益不因不成世道不損益不合時宜醫理何獨不然自堯迄今僅十一運而殊異若此安能千百運後猶規規如一轍哉竊意午運以後陽消陰息而疾病之叢生有按籍而莫名其證者運日下則當挽運陽日剝則當回陽治世與治病無二致也三元運氣論天地定位寒暑遞嬗大為一元統十二萬九千六百年乾坤一啟閉小為三元共一百八十年年運一周回六節藏象論曰其生五其氣三三而成天三而成地三而成人三而三之合則為九故以洛書九宮分為三元每元各主三宮上元甲子六十年坎卦統運水氣最旺二坤三震各主運二十年為統運之分司中元甲子巽四統運木氣最旺次五黃次六白下元甲子七赤統運金氣最旺次八白次九紫此三元之所以肇也至流年主氣則上元始坎一次從九紫八白逆數六十而終於五黃中元下元亦然總之流年之宮合於統運者為旺氣為統運所生者為生氣生統運者為失氣為統運所克者為死氣克統運者為煞氣元運流年之大旨如是蓋時有代謝氣有盈虛元運之分上中下者盛衰之機也間嘗考之往古驗之當今之務而覺六十年天道一小變人之血氣與天同度天以無心而生物人以無心而合天得天之氣厚則稟賦敦樸營衛強固體格充實元氣足則人能耐毒邪退而元氣自復故醫者多主急下以存津液之說得天之氣薄則稟賦怯弱營衛耗泄體格虛損元氣薄則人不能耐毒病未退而真氣已虧故醫者多主正氣旺而邪氣自退之說至於上元之時或間有稟賦獨薄下元之時或間有稟賦獨厚者此為間氣所鍾又當別論蓋天地自然之化機與時相流通無上中下截然之界劃而有上中下隱然之端倪欲區之而不能欲混之而不可以上元之治施之中下非盡不侔也而所傷者多此之謂太過以下元之治施之上中非盡無當也而所誤者眾此之謂不及是故必先立其元而後明其氣古人著論立方後人動加訾議而不知當其元何嘗不善也即如一白坎水司令之時寒水氣盛土不能垣自以東垣溫補之論為至當如九紫分司之運火氣燔灼又當以丹溪諸病屬火之說為正宗所謂中無定體隨時而應者也予自辛亥以來薄遊淮海適屬中元之下當以六白乾金為元運故外邪之見於陽明經者最重而世醫之重用寒峻攻伐陽明者亦每每見效而統運究系四綠中宮又屬五黃故方中用達木之味以及疏土之藥如香砂者最多因六白屬乾金故用清理大腸之藥如木耳枳殼槐花之類槐花性寒宜於北方高燥之地淮海卑濕則土茯苓為宜耳知乎此則仰觀於前俯察於後皆可指掌而得矣元泰定元年為午會十一運初上元甲子我朝洪武十七年為中元甲子正統九年為下元甲子弘治十七年為次上元甲子世宗四十三年為次中元甲子由是以推凡六十年一周其間氣稟之清濁風俗之淳漓物產之豐嗇莫不潛移默換於無何有之鄉學者細心研求當必有識其盛衰之原者或者謂異元同運則後之上元應比前之上元中下亦然此其說似是而實非也江河日下未聞尾閭之水復上瞿塘度數日差未聞渾儀之步仍從宣夜蓋歲月如流其不改者甲子之周環其不同者氣機之日新如若所云是百八十年後仍復其初也戴同父云問年不是今年氣恰與何年運氣同是猶未識天道變易之理也夫五天五運說五運行大論曰土主甲己金主乙庚水主丙辛木主丁壬火主戊癸蓋上古占之始丹天之氣經於牛女戊分丹屬火牛女癸之次戊為天門當奎壁之次故火主戊癸天之氣經於心尾己分黅屬土心尾甲之次己為地戶當角軫之次故土主甲己蒼天之氣經於危室柳鬼蒼屬木危室壬之次柳鬼丁之次故木主丁壬素天之氣經於亢氐昴畢素屬金亢氐乙之次昴畢庚之次故金主乙庚玄天之氣經於張翼婁胃玄屬水張翼丙之次婁胃辛之次故水主丙辛說見太始天元冊文蓋天地自然之運候之所始道之所生不可不通也三圖總說五運之序循環無端一陰一陽互為其根甲以陽土生乙之少商乙以陰金生丙之太羽循是以往周而復始運氣有三莫不由之一曰中運十年一周如甲為太宮乙為少商是也二曰主運一歲分為五步始於大寒日甲乙丙辛癸五歲起太角終太羽丁戊己庚壬五歲起少角終少羽每步得七十三日零五刻是也三曰客運亦一年五步起本年中運為一步太少相生五步而止不必起於角而終於羽也土曰宮金曰商水曰羽木曰角火曰徵五行之聲音也五行各有陰陽十干所以分太少也第主客之運經未明言然以理推之天地有主客之六氣則當有主客之五運考之天元玉冊亦有客運行於主運之上故敢附圖於下三圖總說十干五運陰陽各半陽曰太過陰曰不及太過則氣旺反齊勝己者之化不及則氣衰勝己者來兼其化上應五星之象下應百物之成而災殄之厚薄由是著矣其或太過有制不及得助即為平氣經所以有三氣之紀也然六十年運氣相臨又有天符天刑順化不和小逆之別則非三氣之所得該矣附陳於下太過五太之年甲丙戊庚壬也反齊勝己之化如甲土太宮反齊木化壬木太角反齊金化庚金太商反齊火化戊火太徵反齊水化丙水太羽反齊土化是也凡三十年不及五少之年乙丁己辛癸也勝己者來兼其化如己土少宮木來兼化丁木少角金來兼化乙金少商火來兼化癸火少徵水來兼化辛水少羽土來兼化是也凡三十年平氣如運太過而得司天之制若庚子庚午庚寅庚申金運太過司天之火氣抑之則得審平之化為金之平氣戊辰戊戌火運太過司天之水氣抑之則得升明之化為火之平氣運不及而得司天之助若己丑己未土運不及司天助之而得備化之紀為土之平氣乙卯乙酉金運不及司天助之而得審平之紀為金之平氣丁巳丁亥木運不及司天助之而得敷和之紀為木之平氣又若己巳己亥土運不及木來兼化又得木司天助之故兼敷和之化為木之平氣乙巳乙亥金運不及則木得自專又值木司天得令則木齊金化而兼敷和之紀為木之平氣辛丑辛未水運不及土來兼化又得土司天助之故兼備化之紀為土之平氣丁丑丁未木運不及則土得自專又值土司天得令則木齊土化而兼備化之紀為土之平氣丁卯丁酉木運不及金來兼化又得金司天助之故得審平之紀為金之平氣癸卯癸酉火運不及則金無所畏又值金司天得令則金齊火化而行審平之紀為金之平氣合而言之太過而得平氣者六年不及而得平氣者十八年則太過者二十四年不及者十二年平氣者二十四年又如新運初交之月日時與運相合者亦得平氣如甲子年初交之月日時得己乙丑年得庚是也然究而言之太過之中六甲年子午寅申順化辰戌不和六庚年子午寅申天刑辰戌小逆六丙年子午寅申不和辰戌天符六壬年子午寅申小逆辰戌順化六戊年子午寅申天符辰戌天刑除天刑六年強而有制應入平氣外天符六年強而得助也順化六年強而得生也小逆六年強而泄氣也不和六年強而制人也不及之中六己年丑未天符卯酉小逆巳亥天刑六乙年丑未順化卯西天符巳亥不和六辛年丑未天刑卯酉順化巳亥小逆六丁年丑未不和卯酉天刑巳亥天符六癸年丑未小逆卯酉不和巳亥順化除天符六年弱而得助應入平氣外天刑六年從勝己者之平氣弱而不能自主也不和六年從勝己者之平氣弱而不能制人也小逆六年弱而泄氣也順化六年弱而得生也是太過不及之中又有盛衰厚薄之分焉五運行大論曰氣相得則微不相得則甚所勝則微所不勝則甚非其時則微當其時則甚又非可執一以求矣按司天與五運六十年臨遇變化不測如是則在泉及左右間氣當亦有然經未明言無敢贅述是在智者因時而推測也又按陽年齊化陰年兼化皆不專用本宮之化而用勝己者之化然陽強陰弱固自有別齊化者負氣孤行敵來乘之承製之義也兼化者孱弱失位敵奪其政勝復之端也上二圖解陰陽應象大論曰陰陽者天地之道也天元紀大論曰陰陽不測之謂神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之終始也氣有多少形有盛衰上下相召而損益彰矣又曰寒暑燥濕風火天之陰陽也木火土金水火地之陰陽也五行各一而火分為二者君火以明相火以位也蓋凡物之生莫不本於真陽使火氣不充而生機或息矣君火者懸象照耀光被幽隱垂裳而治不徒以一職效功也如腎脾肝肺皆繫於心相火者佐君宰化而分其任者也風火濕相火燥寒六氣為主三陰三陽為標也至如亥子屬水而亥年風木主之子年君火主之如木本陽也而反屬厥陰金本陰也而反屬陽明者經所謂天地之陰陽不可以數推以象之謂也至正化對化說詳玄珠密語然惟子午卯酉四年意義明顯茲姑附圖以備學者參焉上二圖說造化流行節候遞嬗四時代謝六氣推移每歲之氣無論主客皆始於大寒日交初氣至春分日交二氣小滿日交三氣大暑日交四氣秋分日交五氣小雪日交終氣每氣主六十日八十七刻半六氣共得三百六十五日二十五刻以成一歲主氣以五行相生為序風木春氣也主春分前六十日木生火時至卯中陽光日麗暄氣漸行故君火主春分後六十日然君火以明光耀雖遍而化行未盛相火繼之承君而布其令主夏至前後各三十日火生土故濕土主大暑後六十日應長夏之氣也長夏之土生金故燥金主秋分後六十日行秋之肅令也金生水故寒水為終氣歲氣至此寒化大行也六氣迭主無分尊卑靜而守位是謂地氣客氣者天氣也天道無常動而不息上曰司天下曰在泉餘四氣為左右間升降往來六期環會焉主氣土居二火之後客氣土居君火後相火前者土無定位無乎不在又以三陰三陽之序不容紊也至客氣所至冬有流金之熱夏有霜雹之寒春有毀拆之災秋有木華之變非時相加總因六氣鬱發之故耳六微旨大論曰相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之言六氣之客盛極有制故曰亢則害承乃制雖客主之氣有勝無復而寒暑溫涼歷一氣則一變則天地自然之運即承製之義歟每歲客氣天之初氣始於地之左間二氣為天之右間三氣為司天主氣四氣為天之左間五氣為地之右間終氣為在泉主氣分而言之六氣各主六十日統而言之司天主上半年在泉主下半年天之左右間面北而定其位也地之左右間面南而定其位也子午之歲上見少陰卯酉之歲上見陽明正化對化之義也上者右行而降下者左行而升每年退一步左右順行六歲周天故丑未之歲上見太陰寅申之歲上見少陽辰戌之歲上見太陽巳亥之歲上見厥陰也上下遘會主客臨遇而順逆見矣相生相比者為順相剋相害者為逆其有相比而亦為逆者六微旨大論曰君位臣則順臣位君則逆逆則病近而害速順則病遠而害微所謂二火者是也卯酉歲天之右間少陽客氣臨於少陰主氣之位是謂臣位君圖解經曰夫陰陽者數之可十推之可百數之可千推之可萬蓋言天地之陰陽變動不居不可以常理測也五太五少分屬陰陽各主歲運三陰三陽值年司氣分配六期是固然矣然予歷觀五運之紀司天客氣間見舛錯及考之仙靈秘笈而得陰年司天逆行三步之義焉其說以甲己丁壬戊癸為陽陽年順行即前陽年圖也乙庚丙辛為陰陰年逆行即後陰年圖也蓋太始之初素天之氣下臨乙庚玄天之氣下臨丙辛素天西方之色也玄天北方之色也西北為陰故乙庚丙辛為陰也至於丁壬戊癸為陽而甲己亦云陽者土居中央又君象也故不為陰也夫陽主動陰主靜今陽年順行陰年逆行者何也此運氣相臨陰陽交遘之化機也經曰先立其年以明其義乙庚丙辛陰年也司天三步陽位也陽遇陰則變陰遇陽則從陰年司天逆行者陽就陰也在泉之氣為地氣地道卑而順承故不變也至陽年陰位而亦不變者其氣專一來無所慕去無所戀也每周甲逆行之歲凡二十四年初氣交司天即陽年之三氣二氣交天之右間與陽年同三氣交地之左間即陽年之初氣也大寒後六十日即行司天之令而地之左間不應至三氣而始布其化澄觀默驗其間天地之寒暄人世之災癘物產之徵應皆有異於陽年者故敢推廣經旨一例附入後世明哲之士有能加以削正者是予之大願也其法以巳亥為始即起厥陰司天故以巳亥位起厥字子午位為少字丑未位為太字順數到底皆其年分之司天也其餘五氣循次可推矣推六氣法凡司天前二位即初氣前一位即二氣本位司天為三氣後一位為四氣後二位為五氣後三位為終氣即在泉也掌中一輪六氣瞭然在握圖解經曰土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽司天與中運相合故曰天符木運臨卯火運臨午土運臨四季金運臨酉水運臨子此中運與歲支同氣故曰歲會既為天符又為歲會是為太乙天符經曰天符為執法歲會為行令太乙天符為貴人中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死蓋太乙天符三氣會合是謂過亢亢則害甚天符次之歲不與會也歲會為輕經曰氣之平也非其位則邪當其位則正邪則變甚正則微此之謂也同天符者以五太之年下加在泉之氣其氣旺故同天符中之者亦猶中執法也同歲會者以五少之年下加在泉之氣其氣平中之者亦猶中行令也天符十二年丁巳丁亥戊子戊午己丑己未戊寅戊申乙卯乙酉丙辰丙戌是也歲會八年甲辰甲戌己丑己未丙子丙午丁卯乙酉是也太乙天符四年戊午乙酉己丑己未是也同天符六年甲辰甲戌庚子庚午壬寅壬申是也同歲會六年辛丑辛未癸酉癸卯癸巳癸亥是也然天符十二年中有太乙天符四年是天符只得八年歲會八年四年為太乙天符又有甲辰甲戌同天符是歲會只得二年然則六十年中太乙天符四年天符八年歲會二年同天符六年同歲會六年共二十六年其外如壬寅庚申癸巳辛亥運與支合而不為歲會者不當四正之位也然壬寅已屬同天符癸巳已屬同歲會庚申辛亥二年亦應得平氣也夫值年之天符歲會是固然矣而每年左右間氣一與運相符則其氣必旺非余間氣可比是從天符而類推之每歲中運與月建相會其氣必純非余月建可比是從歲會而類推之也澄機觀變之士息心驗之當必有得於其際矣六微旨大論曰天氣始於甲地氣始於子子甲相合命曰歲立謹候其時氣可與期甲子之歲天數始水下一刻終於八十七刻半謂客氣地之左間始大寒日寅初初刻終於六十日後子時初四刻蓋六十分為一刻每時有八刻零二十分三時共成二十五刻十二時共成百刻也所謂三合者甲子初氣始於一刻以至終之氣終於二十五刻是每歲六氣共得三百六十五日二十五刻也乙丑歲始於二十六刻終於五十刻丙寅歲始於五十一刻終於七十五刻丁卯歲始於七十六刻終於百刻四周為一紀周而復始辰年申年與甲子同巳年酉年與乙丑同午年戌年與丙寅同未年亥年與丁卯同故申子辰巳酉醜寅午戌亥卯未歲氣皆同所以謂之為三合也逐年加節時刻不爽而天地之氣往往不應經曰至而至者和至而不至來氣不及也未至而至來氣有餘也謹而察之災變可測民病可調矣南政年少陰所在不應北政年陽明所在不應上二圖解經曰南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應三陰在泉則尺不應左右同北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應三陰在上則尺不應南政之歲謂甲己之歲甲己屬土為五行十干之最尊又寄王於四時故為君象君既得政則少陰君火不復應脈天無二日之義也北政之歲謂乙庚丙辛丁壬戊癸北面受政是謂臣道臣得君而後行令故少陰之所在應脈而所對者不應焉臣不敵君之義也諸注以北政之歲少陰在泉則寸口不應三陰在上則尺不應謂上下尺寸顛倒互應若然則北政之歲六氣皆屬反交矣不知司天主上部在泉主下部左右主中部確不可易安可以君火不司氣化之說曲為北政少陰不應之解耶總之經之所謂不應者有二少陰之位本不應者南政是也少陰之敵不能應者北政是也北政不應皆屬陽明而不言陽明者以陽明之不應由少陰之得位也岐伯曰從其氣則和違其氣則病不當其位者病迭移其位者病失守其位者危尺寸反者死陰陽交者死子午卯酉之年不應在兩尺兩寸不應而反應該應而不應是謂尺寸反寅申巳亥辰戌丑未之年不應在左右左陽則右陰右陽則左陰不應而反應該應而不應是謂陰陽交然必陰陽俱交始為交也尺寸俱反始為反也若偶差一步或屢易一位一位或然只為病象而已不得即謂為陰陽交尺寸反也學者審焉
