body:
  text: 卷三木運年壬子少陰司天中運太角陽明在泉木齊金化兩尺不應初氣大寒交主厥陰客太陽二氣春分交主少陰客厥陰三氣小滿交主少陽客少陰四氣大暑交主太陰客太陰五氣秋分交主陽明客少陽終氣小雪交主太陽客陽明初運大寒交主少角客太角二運春分後十三日交主太徵客少徵三運芒種後十日交主少宮客太宮四運處暑後七日交主太商客少商終運立冬後四日交主少羽客太羽鄭姓草七感冒風邪燥熱無汗脈象浮數無力兩尺沉細注兩尺不應歲氣也案此肺感風而脾虛熱也裡虛表實故毒鬱於內矣茯苓二錢麥冬二錢大生地三錢廣木香一錢秦艽二錢前胡一錢柴胡二錢甘草錢半釋此壬子年立秋後五日方也去歲在泉之右間升為今歲司天之左間應屬太陰間氣主事奈為天衝所窒鬱而不前故中宮虛而致疾肺為風襲邪湊於虛而手足太陰俱病固非傳經之說所得拘也內鬱則生熱宜用甘寒以治內熱表實則陽陷宜用辛散苦泄以祛表邪生地本太陰中土之味經云作湯治寒熱積聚佐以木香者非特恐生地之沉滯亦以舒足太陰之郁使之升而至天也秦艽柴胡世俗但傳為肝膽之藥抑知艽者交也稟天地陰陽交感之氣能使陰交於陽陽交於陰也柴胡一名地薰是稟太陰坤土之氣而外達於太陽也仲祖於傷寒中風不從表解太陽之氣逆於中土不能樞轉外出則用小柴胡湯達太陽之氣於肌表何嘗有引邪入少陽之疑哉然謂其必不可用於肝膽則又非也周姓卅四蛔積多年因患吐瀉而發脈乍有乍無大小無定案金臨月建前屬太陰象似觀卦而五氣少陽欲出不能非但木屈於土抑亦陽遏於陰矣法當因而越之也膽星一錢黃芩一錢胡黃連六分廣木香二錢車前子一錢朴硝一錢歸身三錢澤瀉一錢乾葛一錢醋一兩蜜一兩煎後和入釋此秋分前六日方也病本在於太陰而少陽五氣將至由運屆少商甲木萌芽被屈不能出土又木齊金化之年月建酉金金木交爭遏而生熱積蛔蠢動故有此象黃芩胡黃連膽星清少陽者也醋引木氣而安蛔者也余皆疏土去濕之味加以生蜜甘涼潤滑以和其爭清者升而濁者降矣服前方嘔吐無遺再服亦然病勢更增案此時中土實蠢蠢然掌旗鼓者不得不學孟施捨兒茶一錢烏梅七個降香一兩歸身三錢澤瀉二錢神麯二錢阿魏二錢白豆蔻二錢貝母二錢雷丸一錢車前子二錢首烏三錢五靈脂一錢米醋一勺湯批此方與前方意義略同前方苦寒而性峻蟲不耐毒故作吐此方則和而緩矣釋兒茶生於木而藏於土掘土而出破竹而見有雷出地奮之義此少陽之出於中土者也烏梅雷丸調少陽甲木之氣梅先百木而華雷為一陽之震降香阿魏神麯疏太陰之濕土車前白蔻貝母澤瀉清太陰之濕金當歸五靈以宣通血分之滯血氣和而蟲平矣如必曰烏梅雷丸專為殺蟲而用猶皮相也六日後換方案力戰相持終非了局此時當背城借一矣石榴皮三錢雷丸二錢雲苓三錢白朮三錢五靈脂二錢萸肉二錢蘄艾四錢輕粉五分釋榴開五月其色紅豔應丁火也皮汁色黑可染鬚髮離中有真水也味多酸澀性屬木也丁火合於壬水輔以雷丸山萸俾從木化以舒少陽之氣此因時之宜也土弱則木無所附故用朮苓去濕以扶土陽虛則陰濕蝕木故用艾葉益陽而退陰此因人之體也靈脂調血而理木輕粉因木以化金此因病之機也凡此皆治本而兼治標之用者也於文皿蟲為蠱易云山風蠱艮為山巽為風土上而木下木鬱土中斯蠱生焉治之者必使土氣運行而木氣條達則蠱可除矣夫豈拘拘於化蠱諸方討生活哉前方服過一劑腹痛更甚病者任醫不疑呼人重按索藥甚急一晝夜連進四帖瀉出白沫及死蛔無數最後有老蛔長尺余者出痛乃止仍進一劑神氣憊極雲苓二錢白芍二錢鱉甲三錢廣木香二錢新會皮二錢百部一錢豨蘞草二錢粟殼一錢使君子三十個陳米一勺釋此病後調理之劑也滋木和土人所易曉惟百部人第知其殺蟲而不知天運行至秋分主客俱屬少商斯不可不兼理辛金矣粳米粟殼亦借金氣以收脫之意蓋斯時少陽五氣交足木齊金化之年木強金弱理應兼補金氣況又因病者之脈象體氣所宜而為之者乎又換方大生地三錢白朮三錢新會皮一錢麥芽二錢使君子十個赤芍一錢歸身一錢黑料豆四錢川椒一錢杏仁七粒黃柏一錢白茯苓三錢白芍二錢鱉甲三錢粟殼一錢服二帖後去使君子粟殼服至愈為度釋此方大意同前不過因脈象而小變耳又換方案診之但覺氣血未調耳大生地三錢酒蒸厚朴一錢酒炒夏枯草一錢桑皮三錢柿蒂一錢東壁敗螺三錢醋炒木通二錢木香二錢歸身三錢赤芍二錢川椒一錢雲苓二錢釋此寒露日方也地氣少陽主事己久特恐木火之氣過於上升易云升而不已必困故借天運少商之氣以降之此用桑皮木通柿蒂之意也螺殼利濕除痰本與蚌蛤同氣入壁土中干久轉白是陰金出於陽土之中得氣堅厚加醋炒之用以斂金而堅土蓋恐木森火炎而剋土爍金也少商辛金屬陰少陽甲木屬陽故用夏枯草以陽和陰蟲為陰類故用川椒助陽燥土以除陰也余皆調和血氣之常藥不難解矣曹氏甘五産後久瀉腹痛脈遲細兩尺虛躁案此郁寒在內而下元之氣不旺也川鬱金一錢歸身二錢枸杞子二錢肉果一錢麵煨黑芝麻二錢鹿角膠二錢南天燭一錢釋此寒露後四日方也木齊金化之年又值少陽間氣主事耗泄母氣故腎臟之真陰真陽皆虛宜用枸杞芝麻鹿膠南燭以培之鬱金靖少商之氣金靖而後能生水當歸苦溫散寒通行血氣佐以肉果治病標也南燭氣味酸澀結實於霜雪之中其色紅潤葉似冬青性類枸杞服食家制為青精飯強筋益氣蓋稟坎中之真陽而兼甲木胎養之意者也近世人不知用故特表之朱雪山記服煎劑七八帖病體脈象俱平因請丸方茯苓二兩萸肉二兩山豆根二兩破故紙一兩肉蓯蓉一兩蛤粉一兩升麻三錢蜜丸每服三錢釋此霜降前二日方也本歲陽明在泉通主下半年故丸方多主之茯苓蛤粉平金氣也蓯蓉故紙助土氣也豆根降手陽明之氣升麻升足陽明之氣山萸滋木而溫中用木火以配金土也宋姓卅二感風嗽痰日久不愈脈沉細無力惟右寸浮洪注兩尺應沉惟左寸兩關嫌其不及北沙參一錢桑寄生二錢薤白一錢荊芥一錢桔梗一錢桑白皮二錢白蔻仁一錢飛面一錢黃虀水一杯入煎服三次愈釋此大寒前四日方也在泉之氣主事未退兼之運屬太羽故用沙參寄生取金水相生之義小麥雖為心谷而飛面色白體輕卻兼金氣有金出紅爐之象故用以助火氣而除燥金之寒嗽余則陽明金土之常味也丁巳厥陰司天中運少角少陽在泉金兼木化左尺不應天符初氣大寒交主厥陰客陽明二氣春分交主少陰客太陽三氣小滿交主少陽客厥陰四氣大暑交主太陰客少陰五氣秋分交主陽明客太陰終氣小雪交主太陽客少陽初運大寒交主少角客少角二運春分後十三日交主太徵客太徵三運芒種後十日交主少宮客少宮四運處暑後七日交主太商客太商終運立冬後四日交主少羽客少羽周姓卅二咳嗽喘急多汗脈虛散微數案陰分虛弱土不能生金故金水不能相生為用耳先須理肺以舒氣鬱金二錢沙參二錢生白芍一錢甘草節一錢藕節三錢雲苓二錢金櫻子錢半金鈴子錢半松節二錢麥冬二錢桑白皮二錢半夏曲二錢釋此丁巳年驚蟄前六日方也天運角木厥陰司天客氣雖屬陽明而木強則土憊金弱則水乏生化之源方內鬱金半夏桑皮雲苓為金土正藥而沙參金櫻麥冬皆兼金水相生之意白芍甘草節和土以生金也川楝松節借天運之少角以疏土氣藕節生於水底而稟五行之氣用以入陰分而通調金木水土也李雲圖曰斯歲木氣不及金來兼化厥陰風木司天不及得助斯謂天符反弱為強故制方如此又換方案此時宜使金水相涵耳金櫻子一錢金橘葉一錢橘紅一錢麥冬一錢馬料豆三錢馬兜鈴一錢遠志一錢當歸錢半牡蠣粉錢半黑芝麻一錢茯神一錢丹皮錢半黑豆皮一錢白芍一錢土炒香附一錢藕節桑枝為引分早晚服十餘劑後去金櫻橘葉芝麻加荷蒂三錢白蘞一錢地丁一錢又服十餘劑釋此清明前三日方也運交太徵氣換太陽此剛柔相摩水火相射之時也第主氣少陰君火太陽之標熱亦應丙丁男子陰常不足惟有重用壯水之味以為火之牡焉已矣然非清金不足以生水況病標在肺清金尤為切要原案相涵字大有意義蓋水非金不生金非水不明古人方諸取水洗金用鹽具有至理辛金生壬水壬水既足自能上合丁火以成木化故方內又有調停丁火之味也既用料豆復用豆皮者料豆滋腎豆皮則兼入肝脾而清虛熱若用料豆炒香杵碎亦能醒脾胃而滋土氣矣用藥當以意會讀書貴乎隅反又換丸方杜仲一兩鹽水壁土同炒女貞子一兩酒炒黑豆皮一兩五錢青鹽五錢澤瀉一兩菟絲子一兩土炒黃柏一兩鹽水炒金狗脊五錢馬兜鈴兩半浮海石八錢薤白一兩雞內金六錢石菖蒲一兩茯神黃連水浸一兩東壁上炒一兩湯批此時木氣最強方內惟用金水之味以配之而不用剋木之品者以丸方服經纍月司天執法將近弩末制之太過恐生他患也後邱姓芒種前一方同此釋此夏至前五日方也是年丁巳為天符執法之歲中運屬木上見厥陰節過芒種正值司天主令木氣泄水太甚水虧之人際此必增其劇方於滋木之中寓壯水之意此杜仲女貞豆皮青鹽之妙也於培土去濕之中寓清金生水之意此菟絲澤瀉黃柏狗脊之妙也況病標在肺月建丁火又逢天符風木煽之休囚之金何能當此故用兜鈴海石雞內金薤白等味導之以伏藏之路菖蒲稟寒水之氣上合君火開竅利痰以治咳嗽上氣茯神生於松根其治在神神者君火之所主色白屬金故治肺氣咳逆二者皆藏金氣於丁火之中而免其銷鑠者也用藥之妙幾難思議管窺蠡測未知當否聊倡其說以俟能者又換方案用前丸方去青鹽浮海石加洋肉果八錢用面和桂末包煨其實當用肉桂以今無好者勉用肉果以壯下焦之陽杜仲用酒炒四兩以壯下焦之陰黃柏用淡鹽水炒八錢余照原方再服一料霜桑葉煎湯送下釋此寒露後六日方也下半歲乃少陽在泉之氣所主青鹽浮石皆出於海恐鹹味補水太甚反致陰火潛燃故去之也其曰宜用肉桂者桂為水中之木火能啓水中之生陽上交於肺肺腎交而上氣咳逆可治代以肉果仍借其辛溫之氣收澀之性以斂火氣蓋月建戌土五氣太陰戌為火庫欲使相火藏於濕土之下有釜底添薪之益無膏火自煎之患耳杜仲加至四兩者以其色黑味辛多絲稟金水之氣化改用酒炒則能強筋骨除陰濕陽金之燥氣下行斯太陰之濕土不滯蓋借天運之太商以平地氣之太陰也黃柏減而不去者取其制相火而除濕熱非補水也大凡真水不足之人邪水易泛改正此丸一以備少陽之火一以防太陰之濕云又換方病勢少退復生足瘡案此脾經流蕩之熱鬱用散藥治之可也抱木茯神五兩鬱金五兩陳皮四兩丹參四兩知母二兩枸杞子二兩上為末每晨食前服四錢淡鹽湯入薑汁三匙調下釋此小寒後三日方也運當少羽之終氣在少陽之末勢足相當第陰虛土弱之人土不垣水故木火挾水以外泄所以濕熱流蕩而下注也茯神鬱金丹參降君火以扶土氣經曰諸瘡痛癢皆屬心火君火靖斯相火不妄動知母枸杞借少羽之水運以平相火陳皮通行氣分外達皮膚用為治外之引耳此方直服至戊年立春節後戊運太徵初氣太陽司天少陰火強水弱方內丹參知母枸杞諸品未雨綢繆尤為周致學者宜潛玩焉邱姓卅四嘈雜反胃二三年醫藥無效脈象數牢案此土有濕熱而陽木之氣不和也金鈴子二錢朴硝一錢澤瀉錢半澤蘭葉二錢旱蓮草一錢苡仁錢半粉丹皮二錢青皮一錢釋此驚蟄前一日方也土濕熱鬱又值天符木運月建寅木忤之故此時尤甚方用楝子之苦寒從甲木以降陽火朴硝稟寒水之氣從胸膈而入戊土以逐積聚戊土為六府之總領甲木為六腑之將主也澤瀉啓水陰之氣上滋中土而清降濕熱故名曰澤瀉言澤於上而瀉於下也澤蘭舒土泄熱和血清水苡仁調胃而除濕青皮達胃絡而破結旱蓮丹皮滋壬水而平丁火丁壬合而木化成奚不和之有服前方大便中出結塊如彈子大者前後數十枚病勢稍減白朮一兩土炒酒炒各半香附八錢茯神一兩土炒柿蒂五錢石菖蒲八錢酒炒冬葵子一兩木通一兩砂仁一兩醋炒白花百合二兩生搗女貞子一兩酒炒杜仲一兩醋炒上共為細未每服三錢半白滾湯調下釋此芒種前一日方也節近芒種天運尚屬太徵十日後方交少宮而司天行令已久天符木氣剋土而泄水方內調木火之氣以生中土更用扶金壯水之意者恐金氣休囚不能生水則壬水不能合於丁火也其藥味有用酒炒用醋炒用土炒用生搗者精意所存學者當以意會不煩縷述也尉子三歲痰熱驚厥醫以除痰清熱之藥屢服無效脈象濡結面色浮黃案此症當降火以堅脾蓋脾滯則真火不行而濕注生痰也蒼朮二錢黑豆皮錢半土炒白芷二錢白蔻仁一錢白蘞二錢桑白皮一錢酒炒砂仁一錢薏苡仁一錢紅花錢半酒炒甘菊根一錢釋此驚蟄後四日方也月建卯木天運少角兼之木值天符木強火煽陽明客氣孤弱無依方中借金氣以平風木木平而火自安矣案云降火堅脾者火氣歸下則脾陰不滯而脾陽充實真火行而陰翳消濕痰自無猖獗之勢復用酒炒紅花者金品重疊則木必盤鬱而避克以此舒之所謂發其病而藥之也前方煎服一劑忽然目瞪肢厥氣息短促良久方蘇伊父委命任醫再服二劑稍覺痰降氣平略有生機服至六劑換方山萸肉錢半茯神錢半青木香一錢赤茯苓一錢青黛八分蘇葉一錢車前子八分黑山梔一錢澤瀉一錢白蘞六分肥玉竹一錢金石斛一錢當歸八分甘菊根八分蘆根八分釋此春分日方也陽明之疾未清太陽之氣將至故方以平木為主卻兼疏陽明之氣而清太陽之邪其用手少陰之藥者太陽屬壬水滋降丁火以合壬水自然木化成而青龍馴服矣前方服過八次病勢已平起居如常但目睛時定神智缺靈案此乃濕痰壅於包絡中焦而君火失令也青黛五錢木香五錢降香末五錢冬葵子八錢木通三錢黃柏三錢酒炒大厚朴五錢酒炒車前子四錢皮硝三錢鉤藤三錢麥門冬三錢白茯苓一兩木賊四錢白芷一兩白蔻仁三錢粉丹皮一錢貝母五錢蜜丸如小赤豆大每服二錢燈心湯下湯批接五行論曰火盛木燼木盛火遏此症即木盛火遏之象也方內疏木而不壯火者木疏則火自得位矣瀉水剋土無非此意須細會之釋此夏至前五日方也天符執法之候厥陰氣盛客運少宮失守其職土濕生痰隨木上湧方內用青黛鉤藤木賊調木而以疏理中土開通水道為主者土為木之妻水為木之母一以窮其源一以達其委也且土氣疏則戊土之合癸無難而君火自然得位水氣通則丁火之合壬不窒而風木無從太肆矣徐女周歲由外感而致壯熱腹痛喜按月餘頂心凸起病勢危篤醫藥無效脈滯澀面色青赤案此玉海之症其源深矣蓋首為陽冠腦為髓海陽蒸於上而氣不下降脈滯氣凝故有此象但人稚源深施治宜審此時且用緩筋達脈降氣滋營之法治之卻又不宜濃厚之味也生山梔一錢紫蘇一錢川芎一錢酒炒廣木香一錢粉丹皮一錢獨活一錢茯神錢半醋炒降香末一錢香附八分大白芍一錢骨碎補一錢半夏一錢黃連六分黃柏六分升麻四分鮮鱧魚腦一錢一劑分三次服釋此芒種後五日方也天符執法之候月建逢丁木火上炎升於上而困於下非常法所能治也故用緩木之品多兼太陽壬水之意水滋則火不上炎丁火下降合於壬水則木化成矣氣為陽降氣即以降火營為陰滋營即以滋水兼用中土之味者壬屬坎丁屬離交姤必藉黃婆也半夏生於午月感一陰而稟金土之氣能制風木併除痰濕升麻鱧腦取其引藥至於髓海之分非升陽也學者須善會之殷子周歲咳嗽喘急痰涎壅盛脈浮滑案此由肺氣不得舒達之故耳赤茯苓一錢桑白皮二錢桂枝八分茶葉一錢甘菊花錢半砂仁一錢酒炒黃芩五分麥門冬一錢桑枝一錢釋此寒露後七日方也丁系金兼木化之年上半歲天符在木金氣不能兼化至月臨酉戌天運太商加以太陰客氣生扶比合金氣焉有不盛者哉肺為辛金而屬太陰依運得氣清淨之域翻致盛滿而鬱故方用舒達清解之味也桂枝啓水中之生陽上交於肺且稟太陽之氣以配太陰取肺腎相交陰陽和洽之意砂仁導氣以歸腎酒製則行於至高之分引其氣以歸於下使金氣有所歸宿自無上浮之患矣洪氏四二産後月餘神倦咽乾肢體浮腫飲食減少時或作咳脈寸虛散關微遲尺沉細無力案此係肺經氣弱治之宜以土壯其上其母氣固水壯其下則子氣強此為相生相養之道也肉果一兩五錢麵包煨面同藥炒研和入砂仁一兩制炒同上歸尾兩半麥冬五兩酒炒川鬱金二兩蘇梗一兩杜仲兩五錢鹽水炒桑寄生二兩益母草四兩酒浸三日夜蜜丸淡鹽湯下每服四錢釋此霜降後五日方也運在太商氣在太陰金氣當旺而不旺由脾氣虛寒不足以生之腎氣虛弱復有以耗之也脾虛宜借在泉之相火以溫之腎虛宜疏太商之金氣以滋之曰土壯其上水壯其下者土為金之母水為金之子母肥則子壯子肥則母安母為上而子為下仰事俯育之義也且真火藏於水中氣即火也真陽之所化也火旺則土實水滋則金不泄所謂相生相養者以此氣不足則血亦滯故用歸尾調血中之氣使心腎交而氣血各有所歸耳此方與前方氣運相同而用藥相反觀此可以悟症脈之虛實寒熱宜辨晰於微茫類記於此以見揣時格理之貴於圓通也殷月峰記花嫗五十筋絡拘攣周身疼痛不時舉發脈緊細而弦左尺沉注左尺不應歲氣也案此脾經之風氣所致也淨鉤藤二兩香附兩五錢薑汁炒蘇葉一兩蘇梗一兩摩蘿藤兩半宣木瓜一兩半夏一兩木香五錢杜仲一兩酒炒桑白皮三兩絲瓜瓤一條炙存性研細末和入藥野菊根煎汁和蜜為丸每服四錢麥冬鉤藤湯送下湯批風之為病無所不至而少陽於腑又屬三焦方內用金水之藤蔓以治之非徒制脾風實以防少陽蓋三焦主周身之營衛脈絡恐丙火盛而風愈煽也釋此小雪前二日方也五氣太陰之末少陽在泉之令將至丸方自宜主之乃全方但借木氣以疏土兼調肺胃之金以防木火之爍復清少羽之水以養木而榮筋若不甚留心相火者以君相二脈未見火象不可攻伐無過且清金滋木亦以防之於未然自然天清地肅風定波平龍雷蟄伏矣況天符退位之後金氣得令已久惟嫌秋金之剋木不慮陽木之剋土故只疏土清金因以滋木此直捷了當之法也至於用藤蔓以行筋絡具相生相養之理治標而實治本其用金水之味入土臟而制風治本而實治標也已按丁巳年木運不及司天助之故得平氣而得成敷和之紀與諸天符之歲不同前各方平木之強多用扶金之味而不重剋木者此也內經丁巳年風化之歲三氣中運同屬陰木吾師用方真能與經旨相發明者與殷月峰記壬戌太陽司天中運太角太陰在泉木齊金化左寸不應初氣大寒交主厥陰客少陽二氣春分交主少陰客陽明三氣小滿交主少陽客太陽四氣大暑交主太陽客厥陰五氣秋分交主陽明客少陰終氣小雪交主太陽客太陰初運大寒交主少角客太角二運春分後十三日交主太徵客少徵三運芒種後十日交主少宮客太宮四運處暑後七日交主太商客少商終運立冬後四日交主少羽客太羽陸女十九手足瘛瘲忽然狂叫腹痛卒倒不省人事脈象結促案此郁毒也烏藥四錢鬼箭羽三錢鬱金三錢淨銀花錢半砂仁二錢粉甘草二錢甘遂六分大貝母二錢引用馬糞金汁或不能猝辨即用多年圊磚亦可或參用人中黃地丁木瓜柳柳蜂房蓮房多煎多服為妙釋此春分後十日方也木齊金化之年木氣本強但以太陽寒水在上其年又春行冬令木氣鬱而未舒節過春分天氣驟和主客之角運倏旺而間氣乃屬陽明故強木忤金交戰於胃陽之分此病象之所以暴也方用辛散扶金之法參以順氣平木之味兼用穢濁之物以解鬱毒相反之味以攻固結因時制宜之妙蔑以加矣前方一日夜灌過七八碗病勢稍減次日換方淡巴菰二錢大貝母三錢藝香二錢皮硝三錢紫花地丁二錢葛根二錢薤白三錢大戟八分白蘇子二錢陳佛手一錢雌黃一錢雄黃一錢劉寄奴二錢鑿頭木二錢緊服三劑釋用辛涼解毒之品以助金而平木意與前方相同但穢濁之味減而疏泄之味加者穢濁之味易致敗胃須用芳香解之胃氣方能起發蓋穢濁屬陰雖有解毒之利而亦有沉滯之害芳香屬陽雖有動火之弊而實有疏通之益此君子小人之分也譬如兵家之使詐使貪乃敵熾之時偶一用之平時究以忠廉為主邵氏卅五寒熱缺伸頭重身重項腫氣閉脈象數軟案此與前症勢異而理同時令之氣所感也如恐更有傳染者用大貫衆及大塊明礬青布包入水缸內浸之以供一家飲食之用可也貫衆二錢藝香一錢車前子二錢青木香二錢皮硝二錢薤白二錢山茨菰三錢粉甘草一錢乾薑一錢砂仁錢半枳殼一錢青蒿三錢澤瀉錢半釋此清明前四日方也其理與前方相似但毒輕而解毒之味亦輕乾薑味辛入胃能扶土以生金木齊金化之年剋土太過易見土鬱故藉此以宣之土受木克不能勝濕故澤瀉車前以治其標也時鄰近有患此症者即以茲方加減用之無不立愈半月以後氣候移而此方無捷效矣商子六歲素有腹痛之疾忽然寒熱往來痢下白沫腹痛更甚脈沉濡左寸尤甚案此時太陽將至而陽明之氣亦聚而上升但陽明燥氣須得太陰之氣以濡之而後水穀之氣方能四達今太陰與太陽兩持其偏故陽明少傳布之力耳蓋太陽之氣不達故鬱而為皮毛之熱太陰之氣互盤故鬱而為少腹之結其理本易見也但痧疹欲出而不能恐有下陷之患蒼朮厚朴陳皮大腹皮砂仁枳殼香附皮硝車前子蔞仁薤白紫蘇海桐皮生薑蔥白釋此立夏後二日方也天運少徵氣值陽明十餘日後方交太陽司天之令而此證感氣獨早亦客運之少徵有以引之耳金水子母同氣故陽明之燥氣愈升計惟有濡以太陰之濕土奈濕土又被強木所克其氣盤錮而不能上達故太陽太陰兩鬱而成夫婦反目之象陽明子水而母土職司調劑今水土各峙而陽明又為木火所炎此症之所以重也本方疏通太陰清理陽明使毒氣有路外達復用車前大腹者太陰惡濕且太陽之氣本於水府外行通體之皮毛也前方服過三劑痧疹略見痢亦稍稀案此時太陰之氣稍利毒亦漸出但又要周旋陽明送出太陽關耳紫花地丁二錢川芎二錢紫蘇錢半黃芩錢半白茯苓二錢人中黃三錢升麻錢二蔞仁錢二白頭翁一錢柳柳側柏葉為引隨服二三劑釋川芎稟陽明之金氣而能平木故用之較重白頭翁色白屬金能破積行淤而治腹痛故用以為使余皆疏散解毒之品耳前方服一劑後熱退痢止遂未再服數日後復寒熱間作其家延請殷月峰診視用養血健脾滋肺之藥調理草餘日瘧雖漸輕尚未全愈因復請診案此症原系太陽伏毒大約以前方藥力尚缺太陽度內余滯未清耳太陽本屬寒水其地屬純陰之分生生提出其臟必虛故瘧難猝已且因寒水凝結壅聚生痰故也方用分理陰陽微兼清補可也白芍四錢升麻七分上二味用壁土拌勻微灑水同入陰陽瓦上慢火焙乾白朮二錢土炒左紋秦艽一錢澤瀉二錢貝母二錢枸杞子錢半酒炒合歡皮三錢砂仁錢半土炒鬱金一錢鉤藤二錢蜜水炒陰陽水煎引用荷莖六錢服四劑後白朮砂仁各加一錢再服三劑此係土藥為君因太陽失度故用土以制水耳自記釋此芒種前一日方也太陽氣已交足故乘此天運太宮將至之候急於扶土土氣既固自足為水之垣而有岸闊潮平之樂矣古云雖有智慧不如乘勢其斯之謂與後此子瘧疾旋愈而腹痛永除誰謂草木之藥無濟於病哉蘇嫗五十四肢及身腫脹醫以金匱腎氣丸治之月餘不效脈沉澀獨右寸緊數案此疾正應太陽何時令之氣見之過遲而醫之又過遲乎今陽臟之氣鬱結故瀆道閉滯而淤仍亦太陽之火標郁其水本耳白蘇子錢二土炒茵陳三錢露蜂房一錢炙桔梗三錢蓮房二錢土拌炒獨活二錢殭蠶二錢土炒夏枯草錢半紫花地丁錢半乾薑七分此症似不必用於姜然陽鬱於外必虧於內故用以扶陽補土如外科之內托耳自記湯批按內經氣之遲速差凡三十度在天則有有餘不足之分在人則有臟氣通塞之別此症系太陽為陽明燥氣所逼鬱而不達故病象如此觀方內重用疏金土之味可見釋此夏至前一日方也金匱腎氣丸醫家持為腫脹主方不知腫脹一門其類十數而運氣之失度不與焉通套古方安能恰合乎蓋太陽太陰失配已久太陰之氣滯於中故太陽之徑隧壅閉不能通行皮毛且木齊金化之年木強而金土弱太陰濕金之氣不能助太陽以布散欲宣太陽之令須疏太陰之氣務使手太陰與足太陽相配合而後金水相涵太陽之本寒標陽不致兩橛也解得此理乃知此方清金平木利氣散毒之妙已前方服過五六劑飲食稍進神色似轉衆醫不解此方之理因請復診案此症起局原系時令實症但遏抑少陰過甚致水火不能相交而寒水遂以泛濫豈非人事之舛錯乎蝟皮二錢山茨菰三錢鬼箭羽二錢朴硝一錢面神麯四錢川芎一錢天花粉二錢枳殼一錢砂仁殼一錢甘草三錢釋此小暑前五日方也氣交之分中運主之中運木強太甚土憊金弱水不能依垣為固又不能藉母為養此太陽所以失度而濫也方用金水之味仍兼鋒刃之形者助金氣也然太陽之水必藉少陰之火而後成嚮明之治前此醫者攻伐無過致少陰下陷不能自立而為水配火衰而土愈郁故太陰之氣阻滯於中今太陰之氣少順自宜兼及少陰矣大約太陽之疾非疏理太陰調和少陰不為功臟腑陰陽之配合有正有變俱寓至理觀此可以類推宋姓卅二瘧疾燥熱無汗象似牡瘧脈濡數案濕氣在上而燥氣在下如霧如瀆之源不清且陰不歸陽而君火不下濟則上克也茯苓三錢茯神三錢蒼耳子三錢夏枯草三錢枯礬六分澤瀉三錢砂仁殼二錢馬兜鈴二錢木通一錢鬱金一錢瓜蔞仁二錢粉甘草八分豬苓二錢紫背浮萍四錢釋此小暑後四日方也溽暑之時月建原系濕土兼以天運之太宮客氣之太陽臨之此水濕之氣所以盛也第太陽之標熱甚則太陰之金受其剋制是以不能生水而三焦乏潤澤之資矣且液出於心而太陽屬水心與小腸相表裡少陰之氣下合於太陽亦能成既濟之功今為標熱所引翻致上炎故其象如此方內用紫背浮萍較重者上散太陽之邪且使水氣下行歸於瀆道也其餘扶金滲濕之味人所易曉惟蒼耳以去濕之性而寓平木之意取其形之多刺夏枯以純陽之體而兼清熱之用取其性之屬金也凡此皆因氣交之分中運木氣最強不可不防也後三日換方案暑濕大減惟有滯血使行方無後慮知母二錢黃柏三錢鹽水炒天花粉三錢澤瀉三錢雲苓四錢大白芍二錢銀花二錢人中黃一錢紫花地丁二錢甘草一錢茅根錢半蘆根三錢釋太陽失度少陰火動肺金受克胃陽水穀之腑為濕熱所滯故上膈有血熱血結之形方借寒水之氣以清解濕熱之毒微兼涼血散血之意所謂善用兵者無赫赫之功也其後瀉出滯血數塊竟無大患凡人感受六淫之邪致血熱妄動或上逆或下泄者泛常有之俗醫不考諸天時人事審其臟腑陰陽而概用沉寒滯重之味如犀角蘆薈黃連膽草等物旦旦伐之致成不起可悲也夫徐氏草五妊娠惡阻飲食不進精神疲倦脈象浮滑濡數無力案宜平木以滋土氣且時令適乘之尤恐更鬱而不達耳黑山梔二錢黑豆皮三錢黃芩二錢白朮三錢桑白皮二錢椿白皮二錢甘菊二錢甘草二錢紫荊皮二錢大薊根一錢黑料豆四錢炒焦丹皮三錢復用黑豆炒焦者兼滋土氣也釋此小暑後八日方也氣交之分中運主事司天太陽之標熱復挾心火而上浮於是火不能生土而太陰氣弱不能與太陽相配矣方用降火生土之法兼助金氣以平中運之強木使太陰之氣乘天運月建之時而蹶然興起然後坤道成而廣生之運無窮也師云時令乘之尤恐更郁者蓋恐四氣之厥陰將至復助中運而剋土也程女十七經閉腹痛飲食減少半載有餘脈寸口浮濡關尺俱澀案此疾原起於太陽太陽與太陰則身中乾坤也以其老而不用故不受汙濁而身中統攝手足六經之脈全在於此是以地氣上騰而陰位上天氣下降而陽位乎下無阻則泰有礙則否其道固然此症始於太陽之閉寒而太陰之納藏不順矣且用調和上下之法五靈脂三錢馬兜鈴二錢神麯三錢青蒿三錢澤瀉三錢紅曲三錢夜明砂二錢原蠶砂三錢烏賊骨二錢甘菊一錢地榆錢半女貞子二錢酒炒發垢五分絲綿灰一錢服八劑釋此小暑後五日方也疾起太陽太陰宜乘此運太宮司天太陽之氣以調之俾之上升下濟經所謂升降出入無氣不有即此義也他症當木齊金化之年又值風木將交自當預防木氣此則生氣全在厥陰蓋水滯則不能生木木弱則不能疏土太陽太陰之否隔其權恆在於木預培木氣使其易出於土則水非死水土非滯土而木亦無拂鬱之兼用二曲為使者火能生土引坤氣以上行用兜鈴澤瀉者導乾氣以下濟且能生水以養木也發垢絲灰取其味濁脂多故借其氣以益脂而行濁方內脂砂等物皆兼此意所謂以意用藥者也非格致功深曷克臻此又換方案金氣漸生之時其屬之人金者精也又經也考素問可知凡有其疾者金之氣大約受制於火而屈制於木且肺主一身卷舒之氣以陰而不能下濟於陽則陽位缺陰而陰精何由布乎其理可參也白花百合四錢紫花地丁二錢白茯苓四錢豬乳拌蒸北沙參三錢瓜血竭五分丹參三錢貝母三錢枳殼二錢紅花八分甜瓜蒂荷蒂為引服八劑釋此立秋前三日方也此時厥陰交足不患木氣之郁矣而主氣太陰之候秋金伏於土中未出故以預培金氣為主兼用養血活血者血即水也培金所以生水也引用瓜蒂荷蒂者水物乃金之子蒂則其華蓋也肺為五臟之華蓋用以引經恰合耳服前方經氣已通飲食未復案此厥陰舒而無力太陰鬱而少制也廣鬱金二錢砂仁錢半黑豆皮二錢紅曲三錢酒炒地骨皮三錢益智二錢麵煨山梔錢半炒黑五靈脂二錢夜明砂二錢合歡皮椿皮姜皮各一錢服八劑湯批經云主勝客則從此症恰當主勝客弱之時自宜以克主為事然經閉之疾究非外邪實證可比重用伐土之味恐致木根動搖方內惟用引木之法而無峻削太陰之品真能用經而不泥於經者釋此處暑前一日方也客氣厥陰加於主氣太陰之上秋木本弱不能制主主氣遂強而無制矣太陰主金土二臟土為金母方以益智砂仁生扶土氣卻以合歡椿皮助木以疏之則土不磽而生物金氣可從之而出即用壯水之品以生水亦不慮其致土之泥濘也偶因調攝失宜小腹復覺膨脹案此係金虧而土無所泄故盤鬱於下焦耳金石斛二錢馬兜鈴二錢鬱金二錢半砂仁三錢酒炒蘇梗二錢五靈脂三錢澤蘭二錢天花粉二錢枳殼二錢川芎三錢酒炒桔梗三錢引用荷葉連莖一大個服如上釋此秋分前三日方也客氣方交少陰君火前有厥陰之風木相之火氣爍金過甚此金之所以弱也方用舒金降氣之味人所易知惟澤蘭清少陰之火砂仁酒炒以收少陰之浮火歸縮于丹田川芎稟金氣而平木制之以酒俾行於至高之分引其氣以流布於周身咸以扶金而泄土非粗工所能窺其閫奧矣又換方案此時仍宜泄土以生金也澤蘭三錢白茯苓三錢陳皮二錢老松節二錢藕節三錢甘菊花一錢鬱金二錢半天花粉二錢砂仁二錢土炒枳殼二錢乳香四錢絹包入煎女貞子三錢酒炒皮硝八分蘇子錢二地榆二錢椿皮竹茹為引服六劑釋此寒露前六日方也時當少陽客氣之中火盛而土強金愈受郁矣方用澤蘭藕節砂仁降少陰也甘菊鬱金花粉清少商也余俱疏泄土氣之味耳又換方案此本土塞金燥之疾今土氣半舒矣須待土氣全舒而後金氣乃有藏身之處且有出身之原也澤瀉二錢大麥冬三錢紫蘇葉錢半蔞仁二錢松香錢半乳香錢半女貞子三錢地骨皮二錢廣藿香一錢紅曲三錢酒炒香附三錢酒炒大白芍錢半赤芍錢半絲瓜藤三錢摩蘿藤三錢服如上釋此立冬後二日方也半歲以後地氣主之今歲太陰在泉土臟有病者每滯而難舒此時少陰將衰而主客運逮交太羽月建亦屬亥水金氣生泄過甚母為子瘠只得以扶金為主而以疏土為輔焉十月號為小春乃木氣長生之地女貞摩蘿滋養金水而復兼木氣萌芽之意此所謂眼光四射心細如髮也又換方川芎二錢歸身三錢黑芝麻五錢柏子仁二錢楂肉四錢蒼朮二錢制女貞子三錢地骨皮三錢青黛二錢乳香四錢絹包旱蓮草二錢椿根皮一錢秦艽二錢白芍二錢梅杏蕊為引服十餘劑釋此小雪後五日方也在泉之氣得令而主氣之太陽受其制經所謂客勝主者是也方內重用楂肉乳香秦艽之類以泄土氣更重用芝麻及女貞旱蓮之類以壯水氣極得因時制宜之妙至用梅杏蕊以引木氣亦猶前方女貞摩蘿之意云又換方案此時可用從治之法預扶木氣恐春令屈曲而生氣不旺也蓋此時陽氣萌芽木氣蓄而未動天地之大德曰生木者東方之生氣也木為五行之長猶仁為衆善之元耳俗醫治婦女病亦每從木上生情未嘗非管窺之一得也青木香一兩木香一兩麵包煨青蒿兩五錢松節八錢桃脂五錢桑樹汁八錢柳眼五錢梅枝皮五錢海螵蛸五錢澤蘭一兩馬兜鈴一兩桔梗一兩鬱金一兩女貞子二兩上共為末每服六錢開水調下湯批按此症起於太陽而病之分野恰在太陰首一方通調上下以治其源以下重扶手太陰而微疏足太陰蓋肺朝百脈能滋津液而灌注於三焦肺氣不舒則脾經血滯不能下達矣世醫治經閉之法惟知活血破血而不知扶金泄土往往通而復塞漸成癆瘵蓋未稔病症節氣因時制宜之妙也釋此小寒後三日方也天地運氣如前但月建改屬醜土土氣更加滯重木齊金化之年正治原應扶金剋木今中運退令已久復恐土重金埋故反借木氣以疏之且來年癸亥厥陰為司天之令故預透其氣以疏土而提金亦以防在泉之不退位司天之不遷正也其旨微矣鄧姓卅二前有寒熱咽痛之疾勿藥自已神氣未復延至立秋後微覺頭運發熱亦不甚經意數日後偶因他出突然神昏氣喘瀉血吐血飲食不進延醫調治進以清暑小劑數帖病勢愈急脈象弦結案此疾起於陽明客令之時今乃郁久傳於厥陰也羚羊角八分鎊片人中黃三錢阿魏二錢藿香二錢鬼箭羽二錢煨木香三錢枳殼三錢麩炒茯苓三錢蒼朮二錢半薑汁炒陳蘿蔔菜四錢生薑汁錢半釋此處暑前五日方也月建申金申金屬陽明故陽明之疾乘時而發兼之客氣為厥陰用事厥陰者兩陰交盡也陽明者兩陽合明也以兩陽合明之盛而值兩陰交盡之令陰經且為陽氣所盤踞矣治法惟有開散陽明申金之郁疏泄太宮濕土之滯清理厥陰風木之邪而矣後二日換方案厥陰雖覺微舒而陽明盤踞如故仍宜順胃而疏肝使上焦不壅而歸於下焦也薤白三錢大貝母三錢大戟六分酒微炒桔梗二錢皮硝錢二枯礬八分馬兜鈴錢二粉丹皮三錢白茯苓錢半黃柏二錢鹽水炒青鹽八分神麯四錢生薑汁三錢竹瀝五匙釋用手足陽明之味宜矣而並及辛金者以木齊金化之年當秋金之月而行風木之令強賓奪主使清肅之令不能下濟故治之者不得不清降辛金助克乙木也蓋金清而後能生水故兼用鹹寒之味以咸能軟堅陽明盤踞之邪非此不足以泄之且咸為水味水行於地中而源於天漢所謂水天一氣也此症金氣撓阻水氣無根易所謂天與水違行者故必使天氣下降水氣上滋而後水天之氣乃克保守於清淨之區庶幾天水之訟轉而為水天之需耳後二日換方案此時上氣稍順而與下焦尚未能貫徹也當思用清下之法鮮首烏三錢制首烏三錢大青二錢川芎三錢皂角刺錢二紅曲二錢蒼朮二錢薑汁炒鬱金三錢青蒿二錢滑石二錢砂仁三錢麩炒紫花地丁二錢薤白二錢露蜂房燒焦八分用茶葉水少洗薰干入煎甘草一錢大田螺三個去靨入冰片枯礬少許取水和藥內服小蚌一個入麝八釐取水益母草一錢虎耳草一錢車前草一錢釋此方瀉熱清濕攻堅破結從金制木之理顯然易見而用藥之靈變開人無限法門後二日換方案此症系陽明鬱火所致其邪冒入最下之地故成水火不相濟之象其實舍解釋發舒之法無他道也莪朮二錢荊三稜錢二白茯苓四錢大青二錢土茯苓二錢柏子仁四錢澤瀉二錢紅曲三錢酒炒蔞仁三錢丹皮三錢炒山梔錢半大貝母二錢甘草一錢花粉錢半蚯蚓泥三錢釋此方多清手足厥陰之味而攻堅破積較前為甚蓋前方所攻尚在半表半裡之間而此方所攻卻在厥陰深處要總不外清金制木之意而已又換方案胃金之郁半舒而少陰少陽之氣不交故仍見沉霾耳黃連一錢胡黃連八分車前子三錢黃芩二錢黃柏三錢鹽水炒龜板三錢醋炙紫蘇枝錢半棗仁三錢青皮錢半茯苓二錢元參三錢鮮地骨皮三錢鮮生地三錢通草四分當歸川芎少許入水搗汁待藥熟濾入和服用以奉心化血也釋此處暑後五日方也二日之後天運當換少商故方內參用清理辛金之味但既用芩連而復重用歸芎者蓋君火由木而生相火寄於肝膽之間厥陰之氣不順則二火不交鬱而成燥金之勢且少陰少陽者實太陰太陽之用先天之乾坤後天之坎離也火氣不能伏藏於下水氣不能灌溉於上尚未成既濟之象耳後用丹元二參及香燥醒脾之味成功李子十四據病家言從八月初旬起似三日瘧不甚應期作時亦不甚重因未醫治九月底忽覺手足厥冷肢倦神疲終日昏睡不思飲食不能轉側亦不呻吟詰之不自知其病醫以開散之味治之愈加沉重脈象沉澀而結案此肝脾鬱極之症前醫治之門路卻是究竟脾郁未開只可盡力維持耳淡豆豉二錢神麯三錢廣藿香二錢青皮錢半桔梗二錢大貝母三錢蓮房三個海螵蛸一錢赤芍二錢白茯苓二錢茯神二錢大厚朴八分皮硝八分生蘿蔔汁四錢生薑汁五匙上二味和服釋此立冬後二日方也月建亥水運在少商之末氣屬少陰君火之時而病卻起於前此厥陰風木之令所感又系濕土在泉之氣五行龐雜莫可主持方用豆豉皮硝以解太陽寒水之邪應月建也桔梗貝母清少商辛金之郁因天運也神麯茯神赤芍解少陰君火之郁乘時令也海螵青皮蓮房清手足厥陰之邪顧來脈也厚朴藿香疏散太陰濕土之滯治感受之原也此所謂與物推移者也後三日換方案脾郁終未解得只肝鬱少舒耳且再用解毒散結之法羚羊角尖五分磨黃柏二錢薑黃一錢赤芍二錢烏藥錢半人中黃三錢皮硝一錢海浮石一錢川鬱金二錢木通八分當歸身二錢澤瀉二錢枳殼二錢服一劑後換用四逆湯加滋陰之味服二劑再看釋此時運交太羽則金運全退而水運為主矣但在泉之氣方來正盛客氣之君火為濕土所遏而不能下濟水氣亦微弱而未能上滋則猶未濟之時也中運木氣已退而木強金弱之年究以扶金泄土為要惟太羽為初交之運併入月建之亥水元英沍寒恐致沉陰窮固之患故間入四逆湯二劑俾水中生陽火氣起於釜底而太陰之凝滯已開病勢庶有轉機乎後二日換方案脾經沉鬱所以不能遽開者以濕土生痰之故痰壅於內則君火無所用其生生之力而壅滯也天南星一錢天花粉三錢鱉甲二錢皮硝二錢香附錢半薑汁炒黑芝麻一錢大青一錢黃柏一錢竹茹二錢元參二錢青鹽八分引用薑汁五匙竹瀝三匙生和入服釋木氣未舒之時則用庚以化乙扶金即所以舒木木氣將舒之候則用甲以化己滋木亦所以疏土然土氣之壅滯生痰又由火氣之不能下降水氣之不能上滋也方用益水扶木軟堅化痰之味其所以利導之者至矣後二日換方案衛氣凝結盤踞膜原不得透下耳天南星錢半當歸身三錢大戟六分紅花七分生熟首烏各錢五楂肉三錢皮硝錢五韭子二錢炒桃仁錢二分去皮尖炒竹瀝五匙半夏二錢制枳殼一錢麩炒川芎八分黑豆皮二錢陳倉米六錢二劑以後殷生可代診之如脈起可去大戟加入開胃生土之味成功有望矣釋前方滋木以備剋土之用今則直用木味以剋土矣蓋此症之標惟肝脾二臟之郁前此所以不能用木以泄土者以木氣未順金氣太弱冒昧用之不能疏土而反致忤金無根之金懼有中絶之虞故先用清金平木之法待木氣稍舒而金氣漸起而後可借木氣以導中宮之滯耳然至此而猶不忘保金之意此真能驪珠獨探者也後學可從此暗渡金針矣小雪日擬方呈政殷宅心遵教用藥數劑脈起病減奈胃氣一時難復因復録方請正師命加用川芎楂肉三劑而痊全方附録於下焦楂肉三錢川芎二錢益智仁二錢麵煨甘松錢二麵煨廣木香錢二麵煨青木香二錢青蒿錢二貝母二錢枳殼二錢陳佛手六分引用鮮橙皮二錢陳稻根五錢釋病情已近弩末故宅心敢遵教一試鉛刀而明白淺近無甚妙義不必強為注釋也按中元四緑統運壬戌流年九紫於統運為生氣故斯年木火氣盛鬱而成疾木忤土火爍金故陽明太陰見證居多吾師用方無非舒其鬱滯折其勝氣而補劑絶少亦以斯年元運有餘故也至久病虛損等症不在此例讀者慎無執焉
