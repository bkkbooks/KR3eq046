body:
  text: 卷二太乙移宮説經曰太乙常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居葉蟄之宮曰冬至太一天神之最貴者即北極也北極不動而運周天故太一遊宮終而復始也乾巽二宮各少一日者乾巽為天地之門戶又天地不足之方也合之共得三百六十有六日以盡一歲之數其曰九宮者土旺四維每季末十八日太一居於中宮也太一移日天必應之以風雨其日風雨調和則歲美民安少病先之則多雨後之則多旱冬至賊風自南來夜至則民臥而弗犯晝至則萬民懈惰而中於虛風至立春日賊風自西來又皆中之而溫疫生矣此萬民所以同病也冬至有變占在君春分占在相中宮占在吏秋分占在將夏至占在百姓所謂變者大風拔木揚沙之謂風從其所居之宮來為實風主生長萬物從其沖後來為虛風傷人者也蓋月建所在為實月建所沖為虛其傷人也應乎藏氣故大弱風舍於心謀風舍於脾剛風舍於肺折風舍於小腸大剛風舍於腎凶風舍於大腸嬰兒風舍於肝弱風舍於胃皆謂虛風也故聖人避風如避矢石焉其非八正虛風而賊風邪氣亦能病人來不以時亦無定位因人膚腠之開閉而中之至平居非關賊風而亦病者三虛之故也凡五少歲運不及並司天失守之年是謂乘年之衰每月望後則血虛氣去肉減膚縱是謂逢月之空主客相犯時令失正是謂失時之和然必精氣不充調攝失宜乃致病焉非是亦不病也歲候之法重在元曰風從南方來曰旱鄉從西方來曰白骨將國有殃人多死亡風從東方來國有大災微則否風從東南方行春有死亡天溫不風糴賤民不病天寒而風糴貴民多病惟北風為最甚以日之早晏定四時之死亡諸所謂風者皆折樹木揚沙石者也左右升降不前司天不遷正不退位解舊歲在泉之右間必升為新歲司天之左間辰戌歲木欲升而金窒抑之則木鬱而不前病在肝巳亥歲君火當升丑未歲相火當升而水窒抑之則火鬱而不前病在心與包絡子午歲土欲升而木抑之病在脾寅申歲金欲升而火抑之病在肺卯酉歲水欲升而土抑之病在腎及病之未發即所在之經刺以舒之藥餌調之須用其法舊歲司天之右間必降為新歲在泉之左間丑未歲木欲降而金窒抑之則木鬱當剋金以扶木治在手太陰手陽明寅申歲君火當降辰戌歲相火當降而水窒之則火鬱當剋水以救火治在足少陰足太陽卯酉歲土欲降而木窒之則土鬱當剋木以扶土治在足厥陰足少陽巳亥歲金欲降而火窒之則金鬱當剋火以存金治在心包絡手少陽子午歲水欲降而土抑之則水鬱當剋土以扶水治在足太陰足陽明折其所勝以舒本經之郁升之不前亦非一端或天星窒之或中運勝之或陰年氣衰司天未得遷正即左間未得升天降之不下亦非一端或地星窒之或中運勝之或去歲司天之氣有餘不退即右間不得降地更有升降俱不前者前則勝己者布其化後則鬱極而發已復大肆其威即氣交之變各各不同災有微甚也湯批按內經云氣交多主司天在泉之交而未及在泉復交司天之交以愚觀之左不升天其變應主三氣四氣之交右不降地其變應主終氣初氣之交以升天者在四氣降地者在初氣故也非特左右間有升降不前也司天亦有不遷正不退位之患辰戌年太陽司天至大寒交巳亥年厥陰司天乃太陽不退位而復布即厥陰不得遷正至子午年厥陰復布則少陰不遷正丑未年少陰復布則太陰不遷正寅申年太陰復布則少陽不遷正卯酉年少陽復布則陽明不遷正辰戌年陽明覆布則太陽不遷正不遷正者本年司天之氣有郁其過不盡在舊司天也當瀉新司天之郁以通之不退位者舊司天之氣有餘其過不盡在新司天也當折舊司天之氣有餘以退之二法不同各有精義若在泉遷正退位之化即地産物應可驗而得之然天尊地卑在泉之氣總不若司天權重故經未悉言也五運失守之説即前不退位不遷正之義也不退位不遷正病即見於本年者其患淺調之即已故五運不為失守若剛柔孤立歲運氣衰鬱極而發三年化為疫癘積之久則中之者深歲序再易邪化大行粗工不知呼寒呼熱究之本年運氣又復不侔遂謂運氣之説未足憑信不知病已受於三年前也假如甲子陽年土運太過子午則少陰司天陽明在泉陽明屬卯酉甲與己合則己卯為甲子在泉之化如上年癸亥司天之氣有餘者年雖交得甲子厥陰猶尚治天甲未得位地巳遷正陽明己卯在泉以癸亥之司天臨甲子之在泉則上癸下己不相奉和癸己相會土運大虛反受木勝即非太過土運既窒黃鐘不應木既勝而金來復而本年司天少陰之氣忽至則木反助火而金微木邪過甚而甲己之土皆失守矣後三年化成土疫晚至丁卯早至丙寅大小善惡推其司天在泉之氣與太一所居之宮土疫將至恐傷水藏當先補腎次泄脾氣又如甲至子合司天已交而下地己卯未得遷正舊歲癸亥在泉之戊寅少陽不退位甲戊不合即土運非過木乃乘虛而勝之即有金復三年之後亦化土癘治與土疫同假如丙寅陽年水運太過寅申則少陽司天厥陰在泉厥陰屬巳亥丙與辛合則辛巳為丙寅在泉之化如舊歲乙丑司天之氣有餘者年雖交得丙寅太陰尚猶治天丙未得位地已遷正厥陰辛巳在泉以乙丑之司天臨丙寅之在泉上乙下辛地不奉天乙辛相會水運大虛反受土勝即非太過太簇之管太羽不應土勝而雨化木復即風後三年化成水疫晚至己巳蚤至戊辰甚則速微則徐水疫將至恐傷火藏當先補心次泄腎氣又如丙至寅合司天已交下地辛巳未得遷正上年在泉之庚辰太陽不退位丙庚不合即水運小虛或有勝復三年化為水癘治如水疫假如庚辰陽年在泉為乙未舊歲己卯天數有餘陽明猶尚治天地已遷正乙未太陰司地天己卯而地乙未乙己相會金運太虛反受火勝即非太陽姑洗之管太商不應火勝水復三年化為金疫速徐同前金疫將至恐傷木藏當先補肝次泄肺氣又如庚至辰應司天已交下地乙未未得遷正上年在泉之甲午不退庚甲不合金運小虛有小勝或無復後三年化為金癘治如金疫假如壬午年在泉為丁西舊歲辛巳天數有餘厥陰猶尚治天地已遷正丁酉陽明司地天辛巳而地丁酉辛丁相會木運大虛反受金勝即非太過蕤賓之管太角不應金勝火復三年化為木疫木疫將至恐傷土藏當先補脾次泄肝氣又如壬至午應司天已交下地丁酉未得遷正上年在泉之丙申不退壬丙不合木運小虛有小勝小復後三年化為木癘狀如木疫治法同假如戊申年在泉為癸亥舊歲丁未天數有餘太陰猶尚治天地已遷正癸亥厥陰在泉天丁未而地癸亥丁癸相會火運大虛反受水勝夷則之管上徵不應三年化為火疫火疫將至恐傷金藏當先補肺次泄火氣又如戊至申應治天交司下地癸亥未得遷正上年在泉之壬戌太陽不退戊壬不合火運小虛有小勝或無復後三年化為火癘治如火疫蓋上干為剛下干為柔上干失位柔地獨主其氣不正故有邪犯下干失守天運孤立柔不附剛亦足致戾也夫陽年為太過太過者氣盛經曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之太過之與不及若是其懸殊也一經上下失守反為大虛敵得乘之郁為疫癘五太如此五少可知陽年若此陰年可知雖氣有微甚差有淺深或太過而反虛或不及而得位各隨其年之氣候而靜而驗之剛柔失位則律呂異音剛柔將合則音律先同明哲之士固可豫決於先幾也附疫由人事論內經所載五疫之發皆由五干剛柔失守然天時人事恆相附麗如影隨形如響隨聲不得謂天失其度致生災疢而與人事無涉也歷觀往古政治修和則民無夭札燮理乖方則瘡痍時起天有顯道應如桴鼓即如歲歉谷踴民用乏食賑恤不時流離轉徙以粳秕比為餅餌以草木為糗粱肢體疲弱藏氣虛耗六氣偶舛疾病繁興或狂徒不懲弄弋潢池蹂躪我禾稼虔劉我婦子百姓嗟怨呼天莫訴五內抑鬱精氣先傷時令失正邪慝內干或戍亭鄣或築城堡或浚河渠或修堤防動大衆興大役司事者失御下之道寒暑足以侵其體飢渴足以賊其臟勞苦足以疲其筋骨而且思慮傷脾恐懼傷腎忿怒傷肝憂思傷心於邑傷肺當是時也運氣之相值或有偏衰偏盛之處皆足致災有不待三年者蓋疫也者郁也五行鬱則求伸五臟鬱則求舒其鬱既甚其發必暴鬱則傷己發則傷己之所勝重傷其臟而疫斯盛矣是知剛柔失守三年來復為天運之戾氣而血氣耗越召殃招尤為人事之失調也不稔剛柔之義則五行迷瞢治療無方不識人事之説則妄測天運施治寡效昔金末造元兵南下汴都戒嚴解圍之後京師大疫東垣先生制普濟消毒飲全活甚衆是真得天時人事之全者至內經所載避疫之法及方系後人傅會增附未足據用愚謂避疫之法無過塞精固氣寡欲清心為渡世之津梁御災之祕鑰蓋人定勝天而五行之戾氣罔敢幹焉若疫將發而思豫卻之方當求諸運氣及人事所以化疫之由而折其勝氣資其化氣乃克有濟如執一術以求吻合吾恐操刀而學割傷人必多也運氣總論在昔洪荒肇啓歷度未彰天以無心而成化人以順受而得正沿至軒皇風氣漸開疾疢間作乃警乃咨延訪廷臣惟岐伯雷公鬼臾區諸賢聖不憚煩賾縷述條陳而五運六氣之説以明如六節臟象天元紀五運行六微旨六元正紀氣交變至真要五常政諸論連篇纍幅旨深詞奧其間正變盛衰之義不下千百條愚者昧焉廢而不講而拘墟之流執其一端不能會通用多窒凝是皆未達運氣之大旨而徒事枝節之末務者也經曰得其要者一言而終不知其要流散無窮然則欲窮運氣之説當求至簡至要之方矣經曰有餘而往不足隨之不足而往有餘從之言氣運之迭為消長也未至而至此謂太過則薄其所不勝而乘其所勝命曰氣淫至而不至此謂不及則所勝妄行而所生受病所不勝薄之命曰氣迫太過不及之外復有平氣之紀蓋太過有制不及得助也然太過之歲其氣專一即非有制而施其正化不必致疾惟亢則害斯承乃制耳不及之歲勝己者來兼化其氣較弱又且駁雜不純其生變也較太過之歲為多和則為化為政氣之常也不和則為勝為復氣之變也勝甚則復甚勝微則復微歲運太過則運星北越畏星失色而兼其母氣相得則各行以道不及則包兼其所不勝太者之至徐而常少者之至暴而亡六元正紀大論曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也惡所不勝歸所和同隨運歸從而生其病也故上勝則天氣降而下下勝則地氣遷而上勝多少而差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分微紀七分其差可見此之謂也數之始起於上而終於下歲半之前天氣主之歲半之後地氣主之上下交互氣交主之謂司天主上半年在泉主下半年中運主三氣四氣之交也夫六氣之用各歸不勝而為化故太陰雨化施於太陽太陽寒化施於少陰少陰熱化施於陽明陽明燥化施於厥陰厥陰風化施於太陰各命所在之方月徵之風溫春化同熱曛夏化同燥清煙露秋化同雲雨昏埃長夏化同寒氣霜雪冰冬化同勝與復同其歲有不病而臟氣不應不用者天氣制之氣有所從也火司天而金從木眚木司天而土從水眚水司天而火從金眚金司天而木從土眚土司天而水從火眚亦惟歲氣弱而天氣強為然否則不必爾矣主勝逆客臟從高者抑之下者舉之有餘者折之不足者補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之六氣之勝則所勝者傷臟氣應焉復亦如之勝復之作動不當位或後時而至衰盛異也寒暑溫涼盛衰之用其在四維差凡三十度也勝氣未盡復而再勝復氣未盡勝而再復必相當而後已五郁之見皆有先兆土鬱之發云橫天山蜉蝣生滅其氣四金鬱之發山澤焦枯土凝霜滷其氣五水鬱之發太虛深玄氣猶麻散微見而隱色黑微黃木鬱之發長川草偃柔葉呈陰松吟高山虎嘯岩岫火鬱之發華髮水凝山川冰雪焰陽午澤其氣四木發無時水隨火也然此亦惟五運之郁如是若兼齊二化及六氣之勝復則不能拘定蓋勝氣多屬前三氣復氣多屬後三氣或亦有待主客之氣而發者所謂當其時則甚也勝為本年天度之災變其機難測復則可操券而待矣主客之氣雖勝無復時過則已謂六步之轉換也運氣相臨不期而至驗之之法無過天星脈應物産氣候數者水曰辰星火曰熒惑木曰歲星金曰太白土曰鎮星氣盛則明衰則暗厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長至而至者和至而不至來氣不及未至而至來氣有餘也木應肝其主目其谷麻其果李其實核其蟲毛其畜雞其色蒼其味酸其應角火應心其主舌其穀麥其果杏其實絡其蟲羽其畜羊其色赤其味苦其音徵土應脾其主口其谷稷其果棗其實肉其蟲倮其畜牛其色黃其味甘其音宮金應肺其主鼻其谷稻其果桃其實殼其蟲介其畜馬其色白其味辛其音商水應腎其主二陰其谷豆其果栗其實濡其蟲鱗其畜彘其色黑其味鹹其音羽木應春其氣端其用曲直其化生榮其政發散其候溫和其令風火應夏其氣高其用燔灼其化蕃茂其政明曜其候炎暑其令熱土應長夏其氣平其用高下其化豐滿其政安靜其候溽蒸其令濕金應秋其氣潔其用散落其化堅斂其政徑肅其候清切其令燥水應冬其氣明其用沃衍其化凝堅其政流演其候凝肅其令寒氣平則各應其所屬盛則兼其所勝衰則兼所不勝焉六氣之化配乎五運故少陰不司歲運之氣化亦以君火為萬化之本尊無不統不屑屑於紀歲也然六步之中未嘗不分司其事第熱之與火微分淺深少陰所至為暄為舒榮為形見為熱生為飛羽少陽所至為炎暑為行出為蕃鮮為火生為薄翼君位臣則順臣位君則逆君火以明相火以位為稍異焉耳即此以觀生剋制化之理盈餘消息之幾可微會而得若求其病之迹象與證之繁瑣當更考本經原文而潛心探索之尺幅之中未能遍及也附化數生成説經曰太過者其數成不及者其數生故五太之年化必成數五少之年化必生數也惟戊寅戊申二太徵年用生數土言生數不言成數者土即地也有地即有土矣不待十數而始成也司天在泉仿此辰戌之紀司天之化用成數惟二庚年用生數在泉皆用生數土故也卯酉之紀司天之化用成數惟二乙年用生數在泉乙癸四年用生數丁己辛六年用成數寅申之紀司天之化用生數惟二庚年用成數在泉戊庚丙用生數壬甲用成數丑未之紀司天之化皆用生數土故也在泉用生數二乙年用成數子午之紀生成間化壬甲丙六年屬生數戊庚四年屬成數司天在泉同巳亥之紀亦生成間化丁己辛六年上生而下成癸乙四年上成而下生經所云寒化六寒化一者以五行生成之數言之化屬生數者其氣未盛其用未宏故其化微化屬成數者其氣已壯其用大光故其化甚然其間應成而反生應生而反成變化錯綜莫可端倪求之六氣盛衰之迹多有未合蓋天地之陰陽有非可按部推測者矣流年災宮説九宮見前圖經於五少之年必著災宮己年災五宮乙年災七宮丁年災三宮辛年災一宮癸年災九宮謂本年氣弱則所勝者災之惟二四六八四隅宮經不言災然以理揆之五正有災四應何獨不然竊意太過之年經不言災而亢則有害豈無方位即五少之例推之五太必災其所勝之宮或災其應宮無應宮則災正宮如木太過則災二宮五宮八宮火太過則災六宮七宮土太過則災一宮金太過則災三宮四宮水太過則災九宮制則災其本宮不及之年勝則災其本宮復則災其勝己之宮或正宮或應宮九宮有災始與大造無私之意相符經不言者舉一可以隅反也第災宮之説往往不驗蓋時際升平環宇遍蒸和煦而運遭百六幽遐共患艱虞元運有盛衰又非災宮之説所得拘矣至如應災每宮而反災他宮者此或三年被鬱而發於今年或本年六氣偏勝各有方月推驗之法不在此例方月圖説經之言運氣詳矣即其説而推之往往不驗蓋天下之大不下萬餘里或南旱而北水或西熱而東寒氣候不齊災祥各別同在六合之中五運司歲寧有彼此之殊六步紀功應無參差之驗而不侔若此遂謂運氣之説不足憑信是皆未達方月之旨而尋其究竟也經曰六氣之用各歸不勝而為化各命其所在以徵之以主氣言厥陰初氣居東北二氣少陰居東南三氣少陽居正南四氣太陰居西南五氣陽明居西北六氣太陽居正北方月之有常者如是假如子午年少陰司天則太陽在東北為初氣厥陰在東南為二氣少陰在正南為司天太陰在西南為四氣少陽在西北為五氣陽明在正北為在泉客氣之方月如是若歸所不勝而為化則客氣之太陽寒化當施於正南少陰西北少陽之位或施於主氣少陰少陽之位候之當在初氣六十日內下五氣仿此至天災流行有非可一端求者有司天之災有在泉之災有間氣之災有中運之災有三年郁發之災所災之方或六氣所屬或五運所主或十二辰所指月亦如之各歸所不勝而為化此其大較也然經之所著乃五行生剋之理陰陽勝復之義言理而不言數數有不應而理無或息氣變則無方不可災無時不可災氣平則應災之方不必災應災之月不必災學者當於臨時驗五行之盛衰六氣之強弱病證之形勢脈法之應否上觀天星俯察物産按其方定其月即理以徵數庶乎得之如拘執經文按年豫決是猶刻舟求劍守株待兔之智也附山川方隅氣候不同論經曰天不足西北左寒而右涼地不滿東南右熱而左溫高者氣寒下者氣熱崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天此地理之常生化之道也王氏以中原之地剖為三分以南北言其一者自漢蜀江至南海二者自漢江至平遙縣三者自平遙北山至蕃界北海南方大熱中分寒熱兼半北分大寒南北分外寒熱尤極大熱之分其寒微大寒之分其熱微以東西言之其一者自汧源縣西至沙州二者自開封縣西至汧源三者自開封縣東至滄海也東分大溫中分溫涼兼半西分大涼大溫之分其寒五分之二大涼之分其熱五分之二溫涼分外溫涼尤極變為大暄大寒也以氣候驗之自開封至汧源氣候正與歷候同自開封東行校之每一百里秋氣至晚一日春氣至早一日自汧源西行校之每四十里春氣發晚一日秋氣至早一日南行北行莫不皆然愚謂氣候道里之説未必盡準而崇卑高下地裡之偏勝天氣亦因而異其化則有確不可易者以中宮之寒見於坎宮則為不及見於離宮則為太過中宮之熱見於坎宮則為太過見於離宮則為不及溫涼如之四隅從同故每宮之地分為小九宮其寒熱溫涼之辨義亦相通即一郡一縣高下懸殊何獨不然要而言之西北多山東南多水西北多燥東南多濕高山多雪平川多雨高山多寒平川多熱五行偏治六氣淫勝有由來矣他如東方魚鹽之域濱海傍水民食魚而嗜咸西方沙石之域水土剛強民陵居而多風北方地高陵居風寒冰洌民樂野處而乳食南方地下水土弱霧露之所聚民嗜酸而食方域既殊賦稟各別性情囿於嗜好血氣安於習俗而疾病之中人因之然西北之地未嘗無水東南之地未嘗無山南方多熱不無水土偏寒之方北方多寒不無氣候偏溫之邑況一山之巔面南則熱面北則寒一水之涯陽方則溫陰方則涼小而驗諸數十里之近大而徵諸萬餘里之遙其象不同其義則一關津之所樊界山谷之所阻隔封疆之所剖劃道里之所毗連皆所以分畛域而異風土也世之醫士足不出乎州郡而欲以身歷之境著書立説播之天下傳之後世以一概百以近概遠吾未見其有濟於世也故不稔運氣之説則臨事無定識不明方隅之理則拘墟而鮮通學運氣之學者惟即方隅之不同以求其與運氣之相合庶無謬舉也夫手太陽小腸足太陽膀胱手少陽三焦足少陽膽經手陽明大腸足陽明胃經手太陰肺經足太陰脾經手少陰心經足少陰腎經手厥陰心包絡足厥陰肝經左尺以候水右尺以候火大腸從金膀胱從水亦候於左尺小腸屬火亦候於右尺也五臟合五行屬陰腎癸水心丁火肝乙木肺辛金脾己土心包絡亦作丁六腑屬陽胃戊膽甲大腸庚小腸丙膀胱壬三焦亦作丙十二經配天干歌甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦陽腑須歸丙包絡從陰丁火旁脈説難經曰三部者寸關尺也九候者三部之浮中沉也蓋肺朝百脈十二經雖不盡走手而無不現於氣口之動脈後世因之以為診家捷法寸為陽為上部左寸心部也其候在心與心包絡右寸肺部也其候在肺與胸中主頭項以至心胸之分關為陰陽之中為中部左關肝部也其候在肝膽右關脾部也其候在脾胃主臍腹胠脅之分尺為陰為下部左尺腎部也其候在腎與膀胱大腸右尺三焦部也其候在腎與三焦命門小腸主腰足脛股之分三部中各有三候三而三之是為九候浮主皮膚候表及腑中主肌肉以候胃氣沉主筋骨候里及臟經曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此七診之義也厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長此六氣之脈也春脈如弦夏脈如鉤秋脈如浮冬脈如石此四時之脈也平人之常氣稟於胃無胃者逆逆者死胃者長夏之脈微軟而和故弦鉤毛石必得胃氣始為平脈但弦但鉤但毛但石即真臟脈見而不弦不鉤不毛不石亦為穀氣不至也脈要曰春不沉夏不弦秋不數冬不澀是謂四塞謂失所生之氣也沉弦數澀甚曰病是又進一解矣脈經論脈止二十四種脈訣亦然其中長短數散四種或棄或取余謂脈無定數惟即其脈而象之而名以立焉占病之法又在診者之活變而善悟不可執一端而遽定其表里寒熱虛實也如浮脈舉之有餘按之不足其病在表然浮而有力為洪無力為芤遲大為虛柔細為濡概言表可乎沉脈重手按至筋骨乃得其病在裡然有力為實無力為虛亦有寒邪外感脈見沉緊者可概言里乎遲脈一息三至去來極慢決為寒矣然亦有浮遲沉遲兼滑兼細之別可一例施乎數脈一息六至俗以為熱矣然遲冷數熱之説內經未言凡寒邪外感必暴見數緊陽虛陰虛或見細數無力或見數而弦滑惟洪滑有力者為真熱可妄言熱乎至於來盛去衰為洪陽實陰虛氣實血虛之象也浮沉皆得大而長微弦為實洪滑有力為諸實熱等證沉弦有力為諸痛滯等證也前卻流利如珠應指為滑多為痰壅之象過甚則為邪熱細而遲短且散如輕刀刮竹如雨沾沙為澀為氣血俱虛之候按之不移如張弓弦為弦為肝邪也浮大而軟按之中空兩邊實為芤為失血也來往有力堅摶抗指為緊乃陰邪搏激之候小駛於遲一息四至應指和緩往來甚勻為緩為溫瘧初退之象輕診則見重按如欲絶者微也往來如絲而常有者細也皆陰陽俱虛也弦而兼芤如按鼓皮革也似沉似伏實大微弦牢也革浮牢沉革虛牢實革為失血牢為裡實也極軟而浮細為濡極軟而沉細為弱濡為血虛為傷濕弱為氣虛為陽陷又如過於本位為長主有餘之病不及本位為短主不及之病遲大而軟按之無力為虛渙漫不收無統紀無拘束為散虛為血虛散為氣血敗散也重按著骨指下截動者為伏主腹痛及傷寒將汗之候數見於關如豆大而無頭尾厥厥動搖者為動主陰陽相搏為痛為驚之象去來數時一止復來為促主陽盛之病去來緩時一止復來為結主陰盛之病至於代脈之義又非一端有脈本平勻而忽強忽弱者乃形體之代非謂止也有胃氣者生無胃氣者死又若脾主四季而隨時更代者乃氣候之代亦非止也惟根結篇曰五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣豫之短期此至數之代也其間似是而非動多模糊惟在以意逆之取其相似者參酌而定以主名而後得脈之真是否則拘墟寡當鮮不敗乃事矣二十七脈之説似可該脈之情態矣以言乎診家之大法尚為末盡蓋脈之數有限而病之情無窮一脈不止一病而一病或兼數脈後世方書家因病以方方而附會脈訣以合之其實證與脈違貽誤匪淺夫脈之理微未易憑信故古人言脈必曰脈色或為色澤或為色夭青黃赤白黑主五臟之病而內經必視其尺之色脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩大小滑澀亦莫不然靈樞論疾診尺篇論之尤詳所當參考望其色矣復聞其聲聲洪亮者為陽為熱為有餘聲微弱者為陰為寒為不足而宮商角徵羽五音配乎五臟即其音所偏而知其臟之所害此又一法也他若內因外因不內外因或起於數載之前或起於數日之內或寒或熱或飽悶或善飢或某時疼痛或某肢不利惟憑問以明也然三者之雜取終必於切而決焉是分之則切為四診之一而合之則切為四診之大成也可輕言脈哉後世言脈家有以春夏秋冬四時之脈為四診者有以形體至數舉按去來為四診者有以四方風土高寒卑濕為四診者以余觀之皆當採用而鄙義更有四診之説問之同志一曰會神二曰審時三曰宗理四曰參究蓋脈以神氣為主得神者昌失神者亡同一脈證而有神無神之後效判然霄壤況脈之體狀遲與緩相似沉與實相似芤與革相似弱與虛相似若此者比比皆然其間辨別惟在一點神氣診者以己之神會脈之神以脈之神定脈之名而後病證有確見也脈各有時六十首王之説謂冬至後六十日少陽王又六十日陽明王又六十日太陽王又六十日太陰王又六十日少陰王又六十日厥陰王也又如主運客運起於大寒每運各司七十二日主氣客氣亦起於大寒每氣各司六十日或為南政或為北政值何時會應得何脈歲氣天和在所當審又有神與形色相謬而與天和王時又不能相印合者只得決之以一定之理蓋斯病不應有斯脈斯脈不應見斯時會神審時大費周章然脈有百端而理惟一致或舍證從脈或舍脈從時惟求理足不尚牽合經曰天地之變無以脈診此之謂也其有理解難明者則當博稽諸説參互放訂以曲盡病之情態素問靈樞扁鵲仲景外如王叔和脈經戴同父脈訣刊誤及近時李瀕湖脈學張叔承六要診法皆所當切究而撮其精也備此四法則庶乎無操刀學割之譏矣上古診疾之法人迎寸口分候陰陽人迎足陽明胃脈在喉之兩旁非後世之誤為左為人迎者也經曰人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛名曰溢陽溢陽為外格脈口一盛病在足厥陰一盛而躁病在手心主脈口二盛病在足少陰二盛而躁病在手少陰脈口三盛病在足太陰三盛而躁病在手太陰脈口四盛名曰溢陰溢陰為內關人迎寸口俱盛四倍以上命曰關格關格者與之短期故瀉表補里瀉里補表如肝與膽胃與脾之類陽病則二瀉一補陰病則二補一瀉其法簡而易明又軒岐脈法三部而各三候之上部天兩額之動脈頷厭之分足少陽之所行上部地兩頰之動脈地倉大迎之分足陽明之所行上部人耳前之動脈和髎之分手少陽之所行中部天手太陰也在經渠之次中部地手陽明也在合谷之次中部人手少陰也在神門之次下部天足厥陰也五里之分女子取大沖下部地足少陰也太溪之分下部人足太陰也箕門之分大都手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹故人迎以候陽寸口以候陰三部之天地人以候一身之氣分而候之脈之真體乃得後世並十二經脈皆決於寸口法則捷而指愈晦矣世有奇傑之士取則先民即委而窮源吾所深望也夫風寒熱濕火燥為本三陰三陽為標相為表裡者為中氣義出六微旨臟府為本居里十二經為標居表表裡相絡為中氣前圖言天氣此圖言人身也六氣本標中從化解附治病標本説少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從中氣也至真要大論云夫少陽太陰從本者以少陽本火而標陽太陰本濕而標陰標本同氣故當從本不言中氣者少陽之中厥陰木也木火同氣木從火化矣太陰之中陽明燥也土金相生燥從濕化矣故不從中也少陰太陽從本從標者以少陰本熱而標陰太陽本寒而標陽標本異氣故或從本或從標不言中者少陰之中太陽水也太陽之中少陰火也同於本則異於標同於標則異於本故不從也至陽明厥陰不從標本從乎中者以陽明之中太陰濕土也亦燥從濕化矣厥陰之中少陽火也亦以木從火化矣故不從標本而從中氣也歸六氣於火濕總萬象於陰陽是誠順時診疾之大法矣夫百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者而總以治本為急務惟中滿及大小便不利則不論標本而先治之外此未聞焉是故病發而有餘先治其本固其臟氣之虛者客病雖強不能傷其真元誠為至當不易之法惟病發而不足則先治其標亦以客邪易退臟氣可徐徐而復故先標而後本也謹察間甚以意調之間者並行甚者獨行遵經施治自無謬誤世之醫者動曰急則治其標胡弗取靈素而詳觀之也十二經氣血多少歌陽明多血兼多氣太陽厥陰少氣行二少太陰單少血六經氣血本天成六氣十二經相病説附傳經説十二經相為表裡以其經絡相通此病則可移於彼彼病亦可移於此如肺絡大腸大腸亦絡肺之類是也而六氣之相病亦莫不然如太陽與太陰為夫婦太陽之氣方張而太陰之經不配是為夫制其婦太陰之氣方張而太陽之經不配是為婦凌其夫陽明與厥陰亦為夫婦少陽與少陰亦為夫婦其義亦然即太陽與厥陰少陰陽明與少陰亦有夫婦之義焉或氣盛而經衰或經盛而氣衰因相犯而為病惟陽明與太陰少陽與太陰厥陰陽少陰老無相配之義焉其有少陰厥陰氣至而太陰不配則為妾加於妻少陽陽明氣至而太陽不配則為弟忤其兄亦見為病惟少陽與少陰又有君臣之別君強臣弱則安君弱臣強則危故相火氣盛而君火經弱往往有兀臬不安之象又非第夫婦之謂矣十二經配乎五行相順而生母肥則子壯母瘦則子弱故虛則補其母實則瀉其子然亦有子實而母弱者母為子而泄氣太過也則又當瀉其子而補其母母實而子弱者母氣壅而不能哺其子也則又當泄其母而養其子子母遞嬗生克互用或母育子腹或子食母氣精義無窮具詳五行論內至有病經相近則有移病之説如肺為諸臟華蓋有系通於心肝心居肺管之下膈膜之上有系通於腎肝脾脾與胃同膜而附其上之左胃之下口即小腸上口小腸下口即大腸上口小腸下口為水分穴稍偏為膀胱上際當大腸之前有下口無上口水液別回腸隨氣泌滲而入腎系通於心而上連於髓海心包絡一名手心主即經之所謂膻中在心橫膜之上有細筋膜如絲而與心肺相連肝居膈下其繫上絡心肺膽在肝短葉之間三焦為人身三元之氣總領五臟六腑營衛經絡內外左右上下而灌溉宣導於周身者也故病淺則病其本官甚則移於他官醫者識其本病而兼悉其相移之故則病無遁情矣至經所謂腎移寒熱於脾脾移寒熱於肝肝移寒熱於心心移寒熱於肺肺移寒熱於腎胞移熱於膀胱膀胱移熱於小腸小腸移熱於大腸大腸移熱於胃胃移熱於膽膽移熱於腦皆由氣厥之故具載素問氣厥篇所當參考至傷寒傳經之説經謂傷寒一日巨陽受之二日陽明受之三日少陽受之四日太陰受之五日少陰受之六日厥陰受之先自三陽之表後入三陰之裡此陰陽先後之常序也然觀東垣曰太陽者巨陽也膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰巡經傳太陽傳少陽膽木者名曰越經傳太陽傳少陰腎水者名曰表裡傳太陽傳太陰脾土者名曰誤下傳太陽傳厥陰肝木者名曰巡經得度傳又陶節庵曰風寒之初中人也無常或自太陽始日傳一經或有間經而傳者或有傳至二三經止者或有終始只在一經者或有越經而傳者或有初入太陽便入少陰而成陰證者或有直中陰經而成寒證者又有兩經三經齊病不傳者為合病一經先病未盡又過一經之傳者為並病所以有太陽陽明合病有太陽少陽合病有少陽陽明合病有三陽合病三陽若與三陰合病即是兩感所以三陰無合併例也經言其常二子言其變學者通觀而詳察之或宜汗或宜泄或宜補陰以發表或宜扶正以驅邪虛實既辨經脈無舛證雖百變理惟一致耳不知乎此而疑寒疑熱疑陰疑陽吾恐其動輒貽疚也經絡相交十二經絡始於手太陰其支者交於手陽明手陽明之支者交於足陽明足陽明之支者交於足太陰足太陰之支者交於手少陰手少陰無支者直自本經交於手太陽手太陽之支者交於足太陽足太陽之支者交於足少陰足少陰之支者交於手厥陰手厥陰之支者交於手少陽手少陽之支者交於足少陽足少陽之支者交於足厥陰足厥陰之支者行督任二脈下注肺中而復交於手太陰也奇經八脈略人身有經脈絡脈直行曰經經凡十二經之絡於別經者為絡絡凡十六蓋十二經各有一絡而足太陰絡曰公孫復有脾之大絡曰大包足陽明絡曰豐隆復有胃之大絡曰虛里並任絡尾翳督絡長強為十六絡絡之巨者曰大絡次曰別絡小曰孫絡皆正經之支流而維絡於周身者也正經之外復有奇經正經之脈隆盛則溢於奇經猶夫溝渠水盛溢而為湖澤不拘制於正經無表裡配合故謂之奇凡八脈陰維陽維陰蹻陽蹻沖任督帶也陽維陰維者維絡於身溢蓄不能環流灌溉諸經者也陽維起於諸陽之會由外踝而上行衛分與手足三陽相維而足太陽少陽則始終相聯附者寒熱之證惟二經有之故陽維為病亦苦寒熱陰維起於諸陰之交由內踝而上行營分交於三陰而與任脈同歸其病多屬心痛蓋少陰厥陰任脈之氣上衝而然暴痛無熱久痛無寒按之少止者為虛不可按者為實陰蹻者足少陰之別脈陽蹻者足太陽之別脈皆出於足外踝上屬於目內眥陽蹻在肌肉之上陽脈所行通貫六腑主持諸表陰蹻在肌肉之下陰脈所行通貫五臟主持諸里陰蹻為病陰急則陰厥脛直五絡不通陽蹺為病陽急則狂走目不昧陰病則熱陽病則寒素問繆刺篇曰邪客於足陽之蹻脈令人目痛從內眥始靈樞經曰目中赤痛從內眥始取之陰蹻又曰陰蹻陽蹻陰陽相交陽入陰陰出陽交於目鋭眥故衛氣留於陰不得行於陽則陰盛而陰蹻滿陽氣虛則目閉衛氣留於陽不得入於陰則陽盛而陽蹻蹈陰氣虛則目不瞑也治當補其不足瀉其有餘以通其道而去其邪而已沖為經脈之海又曰血海其脈與任脈皆起於少腹之內胞中其浮而外者上行絡於唇口足少陰腎脈與衝脈合而盛大故曰太衝難經曰衝脈為病逆氣而裡急當隨寒熱虛實治之不可妄行汗下也任為陰脈之海任衛之別絡曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔素問曰任脈為病男子內結七疝女子帶下瘕聚督乃陽脈之海其脈起於腎下胞中其別者自長強走任脈任督二脈一源二歧一行於腹一行於脊人身之有任督猶天地之有子午也素問曰督脈實則脊強反折虛則頭重帶脈起於季脅圍身一周如束帶然帶之為病腹滿溶溶如坐水中婦人小腹痛裡急後重瘛瘲月事不調赤白帶下沖任督三脈同起而異行一源而三歧皆絡於帶脈因諸經上下往來或有凝澀衛氣下陷滯於帶脈之分蘊釀而成病赤白以時下或由諸經濕熱或由下元虛拎子宮濕淫或由思慕無窮發為白淫者執赤熱白寒之説則貽誤千秋矣按陰維脈發於足少陰築賓穴會足太陰厥陰少陰陽明於府舍又會足太陰於大橫腹哀又會足厥陰於期門與任脈會於天突廉泉陽維脈發於足太陽金門穴會足少陽於陽交又會足少陽於居髎上會手陽明手足太陽於臂臑與手少陽會於臑會天髎會手足少陽足陽明於肩井會手太陽陽蹻於臑俞會手足少陽於風池與手足少陽陽明五脈會於陽白陰蹻者足少陰之別脈上行屬目內眥與手足太陽足陽明陽蹻五脈會於睛明而上行陽蹻者足太陽之別脈會手太陽陽維於臑俞會手陽明於巨骨會手陽明少陽於肩髃會手足陽明任脈於地倉同足陽明上而行巨髎復會任脈於承泣至目內眥與手足太陽足陽明陰蹻五脈會於睛明穴沖與任同起少腹其浮外者起於足陽明穴之氣衝會足少陰於氣穴任由少腹之內會陰之分上行同足厥陰太陰少陰並行腹裡循關元會足少陽衝脈於陰交會足太陰於下脘會手太陽少陽足陽明於中脘上喉嚨會陰維於天突廉泉上頤循承漿與手足陽明督脈會督脈會少陰於股內廉與手足三陽會合上啞門會陽維入系舌本至風府會足太陽陽維同入腦中至神庭為足太陽督脈之會與任脈足陽明交會而終帶脈起於足厥陰之章門穴同足少陽帶脈穴又與足少陽會於五樞奇經會於正經若干條奇經會於奇經若干條故正經之病或流於奇經奇經之病亦通於正經沖之病或合於任任之病或兼乎督學者當察脈審證不可執一也奇經診法岐伯曰前部橫於寸口丸丸者任脈也動苦少腹痛逆氣搶心胸拘急不得俯仰三部俱浮直上直下者督脈也動苦腰脊強痛不得俯仰大人癲小兒癇三部俱牢直上直下者衝脈也動苦胸中有寒疝前部左右彈者陽蹻也動苦腰脊痛癲癇僵仆羊鳴偏枯𤸷痹身體強中部左右彈者帶脈也動苦少腹痛引命門女子月事不來絶繼復下令人無子男子少腹拘急或失精也後部左右彈者陰蹻也動苦癲癇寒熱皮膚強痹少腹裡急腰胯相連痛男子陰疝女子滿不下從少陰斜至太陽者陰蹻也動苦顛仆羊鳴手足相引甚者失音不能言肌肉痹癢從少陽斜至厥陰者陰維也動苦癲癇僵仆羊鳴失音肌肉痹癢汗出惡風按氣口一脈分為九道正經奇經皆取診焉乃岐伯祕授黃帝之訣也正經有三部九候之法而奇經無傳故節録於此以為診家一助云藥説一自炎帝嘗藥辨性以前民用區以三品共三百六十種而疾若得所療焉自是以降品類日繁注述日富如弘景蘇恭陳藏器及近時李瀕湖諸家搜羅入帙者不下萬數然品類愈繁而考核愈難精一物也而以為溫者數家以為涼者數家以為甘者數家以為酸者又數家各執一説不相下後世學者目迷五色何所適從余謂審藥之法凡列神農經者遵經無疑其在各家本草中義惟一致者自當從同惟立論不一而無可據者則先會其立名之意一物一名有取其形者有取其臭者有取其味者有取其性者有取其義者皆宜參互而考訂之其有名義莫解而無從印證者則當辨其色與臭味五色五臭五味皆應乎五行五行應乎五臟六腑凡物莫逃乎五行五行各有其性而為陰為陽判然兩途既得其五行之性而復識其陰陽之所屬則甘酸辛苦鹹升降寒熱之分皎然在目又考其生之所自孰得正氣而生孰得間氣而生孰得駁雜之氣而生而性之所近或喜燥或喜濕或喜寒或喜熱兼此數者庶無大謬至如諸書所傳之品其考察非不精到而揆之今日往往不合者則時為之也天地之氣應乎物産天度日差而西地氣日動而南以乾坤之清寧尚有變易而況於物乎物之變者無他純者日薄駁者日峻也本經所載輕身延年神仙者無慮數十種今試服之其效未必如此之神而毒藥之傷人沾吻而立殞至今未艾即此以觀而用藥之道可知況乎一物不産於一方而一方即具有一性優者無多而劣者充肆本草注其優之所長而鋪戶則以劣者射利粗工不稔藥品第據方書而用之是猶紙上談兵而不識風雲蛇鳥為何狀者矣夫牛溲馬勃未嘗不與參耆同功顧用之何如耳地道不同性情略似優者可治重病劣者用調輕疾辨之之法在按籍而核其形似氣味乃為得之他如山陬海澨之地人戶僻處市儈往往以毫不相近之贋物希覓蠅頭病家值此視鉤吻為黃精啜之而不疑其害可勝言哉故立方之時當審方隅之風氣淳漓市肆之採買遠近擇便而用之其貽誤於斯民者或稍從末減云爾對證發藥之語人人解道第不知其所謂證者何證而所謂藥者何藥也夫藥之寒熱補瀉之辨易明而經絡上下之用難晰以太陽之品施之少陽之經以少陽之品施之陽明之經雖同一發表之味而本經之邪不退他經之表已虛是為攻伐無過推之十二經莫不皆然即藥對經用似可無憾而藥有升降清濁之不同宜升而反降宜清而反濁亦為藥不中病是故知證而不知藥是猶知射而不知的也或曰古人遇一證必立一方證既審矣按籍而用方何誤之有嗚呼此庸醫之所藉口而世人隱受其毒而不知者也古人去今幾何時矣其立方之時三元運氣之盛衰果與今適合耶五運太少之強弱六氣左右之分司果與此日不殊耶古人所生之地果與吾今日施治之方隅不異古人所用之藥果與吾今日所用之藥之地道不錯耶且陽臟陰臟各有偏勝五行衰旺體有分屬內經所以有二十五人之別若二十五人同患一證即同用一方其盡合耶亦不盡合耶子輿氏曰能與人以規矩不能使人巧古人立方不過與人以規矩而已非謂為鐵版注腳也上古聖人井田封建法制盡善後人神明其意而用之最為上理若規規焉反今從古鮮有不致決裂者寧獨用藥而可執方乎且藥之為物生生不窮古人所用之品有至今日而莫覓其種者矣今日所出之品有古人所莫識為何物者矣如必執方是神農仲景而後無藥也有是理乎況十步之內必有香草皆可儲為藥籠中物而土産新鮮之品功用較勝胡弗與市肆者參用歟近世庸工用藥之謬尤有大可怪者古人注本草或曰為外科之要藥或曰為女科之要藥原其本旨無非便後學之採取非截然分男婦內外大小之科謂不可通用也今則分門別類界劃井然痘疹瘡瘍諸家所用之味不逾數十種若為外此非所應用者而方家亦因之而不敢攙入間見一通用者必群然目笑之亦烏知用藥者用其性也非因其科也如若所云是歸芍無與於男子而乳沒無當於內證也古人有知恐亦嗤後人之愚而悔其立説之贅矣藥法摘録經云陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味厚則泄薄則通氣薄則發泄厚則發熱氣味辛甘發散為陽酸苦湧泄為陰夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄欲令脾實氣無滯飽無久坐食無太酸肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之開腠理致津液通氣也肝欲散急食辛以散之用辛補之酸瀉之心欲軟急食鹹以軟之用鹹補之甘瀉之脾欲緩急食甘以緩之用苦瀉之甘補之肺欲收急食酸以收之用酸補之辛瀉之腎欲堅急食苦以堅之用苦補之咸瀉之辛走氣氣平無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁厥陰在泉為酸化少陰在泉為苦化太陰在泉為甘化少陽在泉為苦化陽明在泉為辛化太陽在泉為咸化木位之主其瀉以酸其補以辛火位之主其瀉以甘其補以咸土位之主其瀉以苦其補以甘金位之主其瀉以辛其補以酸水位之主其瀉以咸其補以苦厥陰之客以辛補之以酸瀉之以甘緩之少陰之客以咸補之以甘瀉之以酸收之太陰之客以甘補之以苦瀉之以甘緩之少陽之客以咸補之以甘瀉之以咸軟之陽明之客以酸補之以辛瀉之以苦泄之太陽之客以苦補之以咸瀉之以苦堅之以辛潤之陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央酸傷筋辛勝酸苦傷氣咸勝苦甘傷脾酸勝甘辛傷皮毛苦勝辛咸傷血甘勝咸肥者令人內熱甘者令人中滿
